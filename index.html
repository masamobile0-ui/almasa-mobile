<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#11151c">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- ===== PWA ===== -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="الماسة موبايل">
    
    <title>الماسة موبايل - نظام إدارة الصيانة v6.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        /* ===== ROOT ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-2: #21262d;
            --surface-3: #30363d;
            --border: #30363d;
            --text: #f0f6fc;
            --text-dim: #8b949e;
            --text-faint: #484f58;
            --accent: #f0883e;
            --accent-2: #3fb950;
            --accent-3: #58a6ff;
            --danger: #f85149;
            --gold: #d29922;
            --shadow: 0 8px 32px rgba(0,0,0,.5);
            --radius: 16px;
            --radius-sm: 10px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-top: env(safe-area-inset-top, 0px);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .light-mode {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --surface-2: #e8ecf0;
            --surface-3: #d4d9e0;
            --border: #c8ced6;
            --text: #1a1a2e;
            --text-dim: #5a6270;
            --text-faint: #8a92a0;
            --shadow: 0 8px 32px rgba(0,0,0,.12);
        }
        html, body { height: 100%; margin: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            transition: var(--transition);
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--surface); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 99px; }

        #app {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            padding-bottom: calc(90px + var(--safe-bottom));
            position: relative;
        }

        /* ===== TOPBAR ===== */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            padding: calc(12px + var(--safe-top)) 16px 12px;
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        .light-mode .topbar {
            background: rgba(240, 242, 245, 0.85);
        }
        .topbar-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .shop-name {
            font-size: 18px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), #d4772e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .shop-sub {
            font-size: 11px;
            color: var(--text-dim);
        }
        .view-title {
            font-size: 17px;
            font-weight: 800;
        }
        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition);
        }
        .icon-btn:active { transform: scale(0.92); }
        .icon-btn:hover { border-color: var(--accent); }

        /* ===== LOCK SCREEN ===== */
        .lock-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .lock-screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.05);
        }
        .lock-screen .lock-icon {
            font-size: 56px;
            margin-bottom: 12px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .lock-screen h2 {
            font-size: 20px;
            font-weight: 900;
            margin-bottom: 4px;
        }
        .lock-screen p {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 18px;
        }
        .lock-screen .pin-input {
            width: 200px;
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 10px;
            padding: 12px 16px;
            background: var(--surface-2);
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: monospace;
            direction: ltr;
            transition: border-color 0.3s ease;
        }
        .lock-screen .pin-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .lock-screen .pin-input.error {
            border-color: var(--danger);
            animation: shake 0.4s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .lock-screen .pin-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 260px;
            margin: 14px auto 0;
        }
        .lock-screen .pin-pad button {
            padding: 14px;
            font-size: 22px;
            font-weight: 800;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }
        .lock-screen .pin-pad button:active {
            transform: scale(0.92);
            background: var(--accent);
            color: #1a1a2e;
        }
        .lock-screen .pin-pad .clear-btn {
            background: rgba(248, 81, 73, 0.12);
            color: var(--danger);
            border-color: rgba(248, 81, 73, 0.3);
        }
        .lock-screen .pin-pad .enter-btn {
            background: var(--accent);
            color: #1a1a2e;
            border-color: var(--accent);
        }
        .lock-screen .lock-error {
            font-size: 13px;
            color: var(--danger);
            margin-top: 10px;
            min-height: 24px;
        }
        .lock-screen .role-indicator {
            font-size: 12px;
            color: var(--text-faint);
            margin-top: 10px;
            padding: 4px 16px;
            border-radius: 99px;
            background: var(--surface-2);
            border: 1px solid var(--border);
        }

        /* ===== MAIN ===== */
        main { padding: 12px 16px 8px; }

        /* ===== STATS ===== */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 14px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 14px;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }
        .stat-card:active { transform: scale(0.98); }
        .stat-card .bar {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
        }
        .stat-num {
            font-size: 22px;
            font-weight: 800;
            line-height: 1.1;
        }
        .stat-label {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        /* ===== SECTION ===== */
        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 4px 2px 10px;
        }
        .section-head h3 {
            font-size: 14px;
            font-weight: 800;
        }
        .section-head a {
            font-size: 12px;
            color: var(--accent);
            cursor: pointer;
            text-decoration: none;
        }

        /* ===== CARDS ===== */
        .card-list { display: flex; flex-direction: column; gap: 8px; }
        .device-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 14px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }
        .device-card:active { transform: scale(0.98); }
        .device-card.delivered {
            border-color: var(--accent-2);
            background: rgba(63, 185, 80, 0.06);
        }
        .device-card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }
        .device-title { font-weight: 800; font-size: 14px; }
        .device-customer { font-size: 12px; color: var(--text-dim); }
        .device-issue {
            font-size: 13px;
            color: var(--text-dim);
            margin: 4px 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .device-foot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
        }
        .device-price { font-weight: 700; font-size: 14px; color: var(--accent); }
        .device-date {
            font-size: 10px;
            color: var(--text-faint);
            margin-top: 4px;
        }

        /* ===== BADGE ===== */
        .badge {
            font-size: 10px;
            font-weight: 800;
            padding: 3px 10px;
            border-radius: 99px;
            white-space: nowrap;
            border: 1px solid transparent;
        }

        /* ===== STEPPER ===== */
        .stepper {
            display: flex;
            align-items: center;
            gap: 2px;
            flex: 1;
            max-width: 120px;
        }
        .stepper-step {
            display: flex;
            align-items: center;
            flex: 1;
            position: relative;
        }
        .stepper-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-faint);
            transition: var(--transition);
            flex-shrink: 0;
        }
        .stepper-step.done .stepper-dot {
            background: var(--accent-2);
        }
        .stepper-line {
            flex: 1;
            height: 2px;
            background: var(--text-faint);
            margin: 0 2px;
            transition: var(--transition);
        }
        .stepper-step.done .stepper-line {
            background: var(--accent-2);
        }

        /* ===== BUTTONS ===== */
        .btn {
            border: none;
            border-radius: var(--radius-sm);
            padding: 11px 16px;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            transition: var(--transition);
            cursor: pointer;
            font-family: inherit;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary {
            background: var(--accent);
            color: #1a1a2e;
        }
        .btn-primary:hover { background: #e07a2e; }
        .btn-ghost {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { background: var(--surface-3); }
        .btn-danger {
            background: rgba(248, 81, 73, 0.12);
            color: var(--danger);
            border: 1px solid rgba(248, 81, 73, 0.3);
        }
        .btn-success {
            background: var(--accent-2);
            color: #1a1a2e;
        }
        .btn-success:hover { background: #36a34a; }
        .btn-gold {
            background: var(--gold);
            color: #1a1a2e;
        }
        .btn-gold:hover { background: #b8881e; }
        .btn-sm {
            padding: 6px 12px;
            font-size: 11px;
            width: auto;
        }
        .btn-wa {
            background: rgba(37, 211, 102, 0.12);
            color: #25D366;
            border: 1px solid rgba(37, 211, 102, 0.3);
        }
        .btn-firebase {
            background: rgba(255, 193, 7, 0.12);
            color: #FFC107;
            border: 1px solid rgba(255, 193, 7, 0.3);
        }
        .btn-install {
            background: rgba(63, 185, 80, 0.12);
            color: var(--accent-2);
            border: 1px solid rgba(63, 185, 80, 0.3);
        }
        .btn-manager {
            background: rgba(210, 153, 34, 0.12);
            color: var(--gold);
            border: 1px solid rgba(210, 153, 34, 0.3);
        }
        .btn-cashier {
            background: rgba(88, 166, 255, 0.12);
            color: var(--accent-3);
            border: 1px solid rgba(88, 166, 255, 0.3);
        }

        .form-actions {
            display: flex;
            gap: 8px;
            margin-top: 14px;
        }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 30;
            max-width: 480px;
            margin: 0 auto;
            background: rgba(22, 27, 34, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            padding: 6px 4px calc(6px + var(--safe-bottom));
            display: flex;
            align-items: center;
            justify-content: space-around;
        }
        .light-mode .bottom-nav {
            background: rgba(240, 242, 245, 0.92);
        }
        .nav-btn {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            color: var(--text-faint);
            font-size: 8px;
            font-weight: 700;
            padding: 4px 4px;
            flex: 1;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            position: relative;
        }
        .nav-btn .nav-icon {
            font-size: 18px;
            line-height: 1.2;
        }
        .nav-btn.active { color: var(--accent); }
        .nav-btn .badge-nav {
            position: absolute;
            top: 0;
            right: 4px;
            background: var(--danger);
            color: #fff;
            font-size: 8px;
            font-weight: 800;
            padding: 1px 5px;
            border-radius: 99px;
            min-width: 16px;
            text-align: center;
        }
        .fab {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a1a2e;
            font-size: 26px;
            box-shadow: 0 6px 20px rgba(240, 136, 62, 0.35);
            margin-top: -28px;
            flex: none;
            cursor: pointer;
            transition: var(--transition);
        }
        .fab:active { transform: scale(0.92); }
        .fab:hover { box-shadow: 0 8px 28px rgba(240, 136, 62, 0.5); }

        /* ===== SHEET ===== */
        .sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 40;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .sheet-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        .sheet {
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            background: var(--surface);
            border-radius: 20px 20px 0 0;
            border: 1px solid var(--border);
            border-bottom: none;
            padding: 8px 16px calc(20px + var(--safe-bottom));
            transform: translateY(30px);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .sheet-overlay.open .sheet {
            transform: translateY(0);
        }
        .sheet-handle {
            width: 36px;
            height: 4px;
            background: var(--text-faint);
            border-radius: 99px;
            margin: 6px auto 12px;
            opacity: 0.5;
        }
        .sheet-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .sheet-head h3 {
            font-size: 16px;
            font-weight: 800;
            margin: 0;
        }
        .sheet-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface-2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            color: var(--text-dim);
            font-family: inherit;
            transition: var(--transition);
        }
        .sheet-close:hover { background: var(--surface-3); }

        /* ===== FORM ===== */
        .field { margin-bottom: 11px; }
        .field label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dim);
            margin-bottom: 4px;
        }
        .field input, .field textarea, .field select {
            width: 100%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            transition: border-color 0.2s ease;
        }
        .field input:focus, .field textarea:focus, .field select:focus {
            outline: none;
            border-color: var(--accent);
        }
        .field textarea {
            resize: vertical;
            min-height: 56px;
            line-height: 1.5;
        }
        .field-row {
            display: flex;
            gap: 8px;
        }
        .field-row .field { flex: 1; margin-bottom: 0; }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-row .k {
            font-size: 12px;
            color: var(--text-dim);
        }
        .detail-row .v {
            font-size: 13px;
            font-weight: 700;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dim);
        }
        .empty-state .empty-icon { font-size: 48px; margin-bottom: 8px; }
        .empty-state h4 {
            color: var(--text);
            font-size: 14px;
            margin: 0 0 4px;
        }
        .empty-state p {
            font-size: 12px;
            margin: 0;
            line-height: 1.6;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: calc(100px + var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--surface-2);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 700;
            box-shadow: var(--shadow);
            z-index: 60;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
            border: 1px solid var(--border);
            max-width: 90%;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== TECH BADGE ===== */
        .tech-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 700;
            background: rgba(88, 166, 255, 0.12);
            color: var(--accent-3);
            border: 1px solid rgba(88, 166, 255, 0.25);
        }

        /* ===== CHIPS ===== */
        .chip-row {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 4px;
            margin-bottom: 12px;
            -webkit-overflow-scrolling: touch;
        }
        .chip-row::-webkit-scrollbar { height: 2px; }
        .chip {
            flex: none;
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 700;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-dim);
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            white-space: nowrap;
        }
        .chip:active { transform: scale(0.95); }
        .chip.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #1a1a2e;
        }

        /* ===== BARCODE ===== */
        .barcode-container {
            background: white;
            padding: 14px;
            border-radius: var(--radius-sm);
            text-align: center;
            margin: 8px 0;
        }
        .barcode-container svg { max-width: 100%; }

        /* ===== SYNC BAR ===== */
        .sync-status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 14px;
            background: var(--surface-2);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            margin-bottom: 10px;
        }
        .sync-status-bar .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .sync-status-bar .status-dot.online { background: var(--accent-2); }
        .sync-status-bar .status-dot.offline { background: var(--danger); }
        .sync-status-bar .status-dot.syncing {
            background: var(--accent);
            animation: pulse 1s infinite;

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        .sync-status-bar .status-text {
            font-size: 12px;
            font-weight: 700;
        }
        .sync-status-bar .status-label {
            font-size: 10px;

        /* ===== SCANNER OVERLAY ===== */
        .barcode-scanner-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0,0,0,0.9);

            align-items: center;

        .scanner-header h3 { font-size: 16px; font-weight: 800; margin: 0; }
        .scanner-header button {
            background: none;
            border: none;

            font-size: 24px;
            cursor: pointer;
            padding: 4px 8px;

        #scanner-reader { flex: 1; min-height: 200px; }

            color: rgba(255,255,255,0.6);

        /* ===== CART ===== */
        .cart-item {

        .cart-item .item-name { flex: 1; font-weight: 700; font-size: 13px; }
        .cart-item .item-qty { font-weight: 700; font-size: 14px; min-width: 24px; text-align: center; }

        .cart-item .cart-qty-btn {

        .cart-remove-btn {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 16px;
            cursor: pointer;

        .cart-total {
            display: flex;
            justify-content: space-between;
            padding: 10px 4px;
            font-size: 16px;
            font-weight: 900;
            border-top: 2px solid var(--accent);
            margin-top: 4px;
        }
        .cart-total .total-amount { color: var(--accent); }

        /* ===== COUPON ===== */
        .coupon-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: var(--surface-2);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            margin-bottom: 6px;
        }
        .coupon-card .code {
            font-weight: 800;
            font-size: 14px;
            font-family: monospace;
            color: var(--accent);
        }

        /* ===== OTHER ===== */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 14px 0;
        }
        .fb-info-box {
            background: rgba(255, 193, 7, 0.06);
            border: 1px dashed rgba(255, 193, 7, 0.2);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            margin: 8px 0;
            font-size: 12px;
            color: var(--text-dim);
            line-height: 1.8;
        }
        .fb-info-box strong { color: var(--gold); }
        .sub-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-dim);
            margin: 8px 0 4px;
        }
        .report-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .part-remove-btn {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 14px;
            cursor: pointer;
            padding: 2px 6px;
        }

        /* ===== INSTALL BANNER ===== */
        .install-banner {
            position: fixed;
            bottom: calc(90px + var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 14px;
            width: 90%;
            max-width: 440px;
            display: none;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow);
        }
        .install-banner.show { display: flex; }
        .install-banner .install-icon { font-size: 28px; flex: none; }
        .install-banner .install-text { flex: 1; font-size: 12px; line-height: 1.3; }
        .install-banner .install-text strong { display: block; font-size: 13px; }
        .install-banner .install-close {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
        }
        .install-banner .install-btn {
            background: var(--accent);
            color: #1a1a2e;
            border: none;
            border-radius: var(--radius-sm);
            padding: 6px 14px;
            font-weight: 800;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
        }

        /* ===== PRINT ===== */
        @media print {
            #app, .toast, .bottom-nav, .topbar, #sheet-root, .sheet-overlay, .lock-screen, .install-banner {
                display: none !important;
            }
            #barcode-print-area {
                display: block !important;
                position: fixed !important;
                inset: 0 !important;
                background: #fff !important;
                padding: 20px !important;
                margin: 0 !important;
                z-index: 9999 !important;
            }
            body { background: #fff !important; color: #000 !important; }
        }

        @media (min-width: 481px) {
            .bottom-nav { border-radius: 16px 16px 0 0; }
            .sheet { border-radius: 20px 20px 16px 16px; border: 1px solid var(--border); margin-bottom: 12px; }
            .sheet-overlay { align-items: center; }
        }
        @media (max-width: 380px) {
            .field-row { flex-direction: column; gap: 0; }
            .stat-grid { grid-template-columns: 1fr 1fr; gap: 6px; }
            .stat-num { font-size: 18px; }
            .device-title { font-size: 13px; }
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- Lock Screen -->

        <div class="topbar" id="topbar"></div>

        <div class="bottom-nav" id="bottom-nav">
            <button class="nav-btn active" data-view="dashboard">
                <span class="nav-icon">🏠</span>

            <button class="nav-btn" data-view="devices">

    <div id="sheet-root"></div>
    <div class="toast" id="toast"></div>
    <div id="barcode-print-area" style="display:none;"></div>

    <script>
        (function() {
            "use strict";

            // ============================================================
            //  DATA LAYER
            // ============================================================
            let DATA = {
                repairs: JSON.parse(localStorage.getItem('rt_repairs') || '[]'),
                customers: JSON.parse(localStorage.getItem('rt_customers') || '[]'),
                inventory: JSON.parse(localStorage.getItem('rt_inventory') || '[]'),
                sales: JSON.parse(localStorage.getItem('rt_sales') || '[]'),
                technicians: JSON.parse(localStorage.getItem('rt_technicians') || '[]'),
                coupons: JSON.parse(localStorage.getItem('rt_coupons') || '[]'),
                expenses: JSON.parse(localStorage.getItem('rt_expenses') || '[]'),
                recurringExpenses: JSON.parse(localStorage.getItem('rt_recurring_expenses') || '[]'),
                restockList: JSON.parse(localStorage.getItem('rt_restock_list') || '[]'),
                suppliers: JSON.parse(localStorage.getItem('rt_suppliers') || '[]'),
                wholesaleCustomers: JSON.parse(localStorage.getItem('rt_wholesale_customers') || '[]'),
                settings: JSON.parse(localStorage.getItem('rt_settings') || '{"shopName":"الماسة موبايل","currency":"د.أ"}'),
                tombstones: JSON.parse(localStorage.getItem('rt_tombstones') || '{}')
            };

            const COLLECTIONS = {
                repairs: 'rt_repairs',
                customers: 'rt_customers',
                inventory: 'rt_inventory',
                sales: 'rt_sales',
                technicians: 'rt_technicians',
                coupons: 'rt_coupons',
                expenses: 'rt_expenses',
                recurringExpenses: 'rt_recurring_expenses',
                restockList: 'rt_restock_list',
                suppliers: 'rt_suppliers',
                wholesaleCustomers: 'rt_wholesale_customers',
                settings: 'rt_settings',
                tombstones: 'rt_tombstones'
            };

            // Records a per-item deletion so that an older/incomplete copy of a
            // collection synced from another device can never silently bring a
            // deleted (or, symmetrically, a still-missing) record back. This
            // replaces "last write wins whole-array overwrite" with a proper
            // per-record merge, which is what was actually losing data.
            function recordTombstone(collectionName, id) {
                if (!id) return;
                if (!DATA.tombstones[collectionName]) DATA.tombstones[collectionName] = {};
                DATA.tombstones[collectionName][id] = Date.now();
                localStorage.setItem('rt_tombstones', JSON.stringify(DATA.tombstones));
                if (firebaseInitialized && firestore) {
                    syncToFirebase('rt_tombstones', DATA.tombstones);
                }
            }

            // Merges an incoming array (from Firestore) into the local array by
            // record id instead of replacing the whole array. Whichever side has
            // the newer updatedAt/createdAt per record wins; tombstoned ids are
            // always excluded. This is always safe to run — it can only add
            // missing records or upgrade a record to a newer version, never
            // silently drop newer local data the way a full overwrite could.
            function mergeArrayData(name, remoteArr) {
                if (!Array.isArray(remoteArr)) return;
                const tomb = DATA.tombstones[name] || {};
                const localArr = Array.isArray(DATA[name]) ? DATA[name] : [];
                const map = new Map();
                localArr.forEach(item => { if (item && item.id) map.set(item.id, item); });
                remoteArr.forEach(item => {
                    if (!item || !item.id || tomb[item.id]) return;
                    const existing = map.get(item.id);
                    if (!existing) { map.set(item.id, item); return; }
                    const rTime = item.updatedAt || item.createdAt || 0;
                    const lTime = existing.updatedAt || existing.createdAt || 0;
                    if (rTime > lTime) map.set(item.id, item);
                });
                const merged = Array.from(map.values()).filter(item => !tomb[item.id]);
                DATA[name] = merged;
                localStorage.setItem(COLLECTIONS[name], JSON.stringify(merged));
            }

            // Tombstones are unioned (never overwritten) since a deletion made on
            // any device must permanently stick everywhere. Newly-learned remote
            // tombstones are also applied to strip that record from any local
            // array it might still be lingering in.
            function mergeTombstones(remoteTomb) {
                if (!remoteTomb || typeof remoteTomb !== 'object') return;
                let changed = false;
                Object.keys(remoteTomb).forEach(coll => {
                    if (!DATA.tombstones[coll]) DATA.tombstones[coll] = {};
                    const remoteCollTomb = remoteTomb[coll] || {};
                    Object.keys(remoteCollTomb).forEach(id => {
                        if (!DATA.tombstones[coll][id]) {
                            DATA.tombstones[coll][id] = remoteCollTomb[id];
                            changed = true;
                        }
                    });
                });
                if (changed) {
                    localStorage.setItem('rt_tombstones', JSON.stringify(DATA.tombstones));
                    Object.keys(DATA.tombstones).forEach(coll => {
                        if (Array.isArray(DATA[coll])) {
                            const tomb = DATA.tombstones[coll];
                            const filtered = DATA[coll].filter(item => !item || !tomb[item.id]);
                            if (filtered.length !== DATA[coll].length) {
                                DATA[coll] = filtered;
                                localStorage.setItem(COLLECTIONS[coll], JSON.stringify(filtered));
                            }
                        }
                    });
                }
                return changed;
            }

            function saveCollection(name, data) {
                if (name === 'settings' && data && typeof data === 'object') {
                    data.updatedAt = Date.now();
                }
                DATA[name] = data;
                localStorage.setItem(COLLECTIONS[name], JSON.stringify(data));
                if (firebaseInitialized && firestore) {
                    syncToFirebase(COLLECTIONS[name], data);
                }
            }

            function getCollection(name) { return DATA[name] || []; }

            function uid() { return Date.now() + '-' + Math.random().toString(36).slice(2, 9); }

            function todayStr() {
                const d = new Date();
                const off = d.getTimezoneOffset();
                const local = new Date(d.getTime() - off * 60000);
                return local.toISOString().slice(0, 10);
            }

            function fmtDate(s) { if (!s) return '—'; const p = s.split('-'); return p[2] + '/' + p[1] + '/' + p[0]; }

            function money(n) { return (Number(n) || 0).toLocaleString('en-US') + ' ' + DATA.settings.currency; }

            function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) { return ({ '&': '&amp;',
                        '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]; }); }

            // ============================================================
            //  STATUS
            // ============================================================
            const STATUS = {
                received: { label: 'مستلم', color: '#58a6ff' },
                in_progress: { label: 'قيد العمل', color: '#f0883e' },
                waiting_parts: { label: 'بانتظار القطع', color: '#8b949e' },
                ready: { label: 'جاهز للتسليم', color: '#3fb950' },
                delivered: { label: 'تم التسليم', color: '#484f58' }
            };
            const STATUS_ORDER = ['received', 'in_progress', 'waiting_parts', 'ready', 'delivered'];

            function getCustomer(id) {
                return DATA.customers.find(c => c.id === id) || null;
            }

            function getInventoryItem(id) {
                return DATA.inventory.find(i => i.id === id) || null;
            }

            function badge(status) {
                const s = STATUS[status];
                if (!s) return '<span class="badge">غير معروف</span>';
                return `<span class="badge" style="background:${s.color}33;color:${s.color};border-color:${s.color}66">${s.label}</span>`;
            }

            function stepper(status) {
                const idx = STATUS_ORDER.indexOf(status);
                let html = '<div class="stepper">';
                for (let i = 0; i < STATUS_ORDER.length; i++) {
                    const s = STATUS_ORDER[i];
                    const done = i <= idx;
                    html += `<div class="stepper-step ${done ? 'done' : ''}">`;
                    html += `<span class="stepper-dot"></span>`;
                    if (i < STATUS_ORDER.length - 1) html += `<span class="stepper-line"></span>`;
                    html += '</div>';
                }
                html += '</div>';
                return html;
            }

            // ============================================================
            //  TOAST
            // ============================================================
            let toastTimer = null;

            function toast(msg) {
                const el = document.getElementById('toast');
                el.textContent = msg;
                el.classList.add('show');
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
            }

            // ============================================================
            //  NAVIGATION
            // ============================================================
            let currentView = 'dashboard';

            function navigate(view) {
                if (!isUnlocked) { showLockScreen(); return; }
                currentView = view;
                renderAll();
                window.scrollTo(0, 0);
                document.querySelectorAll('.nav-btn').forEach(b => {
                    b.classList.toggle('active', b.getAttribute('data-view') === view);
                });
            }

            // ============================================================
            //  LOCK SCREEN
            // ============================================================
            let isUnlocked = false;
            const MAX_ATTEMPTS = 5;
            const LOCKOUT_MS = 60000; // 60 seconds

            // Session role is determined ONLY by which PIN successfully unlocked
            // the app (see verifyPin). It is never persisted and can never be
            // changed by simply clicking a button — this closes the privilege
            // escalation hole where a cashier could self-promote to manager.
            let sessionRole = 'cashier';
            let pinInput = null;
            let lockError = null;

            // Lockout state is persisted to localStorage so refreshing the page
            // can't be used to reset failed-attempt counters.
            function getSecurityState() {
                try {
                    return JSON.parse(localStorage.getItem('rt_pin_security') || '{"attempts":0,"lockUntil":0}');
                } catch (e) { return { attempts: 0, lockUntil: 0 }; }
            }
            function setSecurityState(state) {
                localStorage.setItem('rt_pin_security', JSON.stringify(state));
            }

            function showLockScreen() {
                const lock = document.getElementById('lock-screen');
                lock.classList.remove('hidden');
                pinInput = document.getElementById('pin-input');
                lockError = document.getElementById('lock-error');
                if (pinInput) { pinInput.value = '';
                    pinInput.focus();
                    pinInput.classList.remove('error'); }
                if (lockError) lockError.textContent = '';
                reflectLockoutState();
                updateRoleIndicator();
            }

            function reflectLockoutState() {
                const state = getSecurityState();
                if (state.lockUntil && Date.now() < state.lockUntil) {
                    const secs = Math.ceil((state.lockUntil - Date.now()) / 1000);
                    if (lockError) lockError.textContent = '❌ تم تجاوز عدد المحاولات. حاول بعد ' + secs + ' ثانية';
                }
            }

            function hideLockScreen() {
                document.getElementById('lock-screen').classList.add('hidden');
                isUnlocked = true;
                renderAll();
            }

            function updateRoleIndicator() {
                const el = document.getElementById('role-indicator');
                if (!el) return;
                const role = getUserRole();
                el.textContent = role === 'manager' ? '👨‍💼 مدير' : '🧑‍💼 كاشير';
                el.style.color = role === 'manager' ? 'var(--gold)' : 'var(--accent-2)';
            }

            function verifyPin(pin) {
                const state = getSecurityState();
                if (state.lockUntil && Date.now() < state.lockUntil) {
                    const secs = Math.ceil((state.lockUntil - Date.now()) / 1000);
                    if (lockError) lockError.textContent = '❌ تم تجاوز عدد المحاولات. حاول بعد ' + secs + ' ثانية';
                    return false;
                }
                // Role is derived strictly from which valid PIN was entered —
                // there is no separate "become manager" action anywhere else.
                let matchedRole = null;
                if (DATA.settings.managerPin && pin === DATA.settings.managerPin) matchedRole = 'manager';
                else if (DATA.settings.userPin && pin === DATA.settings.userPin) matchedRole = 'cashier';

                if (matchedRole) {
                    setSecurityState({ attempts: 0, lockUntil: 0 });
                    sessionRole = matchedRole;
                    if (lockError) lockError.textContent = '';
                    hideLockScreen();
                    toast('✅ مرحباً بك!');
                    return true;
                }

                const attempts = (state.attempts || 0) + 1;
                if (attempts >= MAX_ATTEMPTS) {
                    setSecurityState({ attempts: 0, lockUntil: Date.now() + LOCKOUT_MS });
                } else {
                    setSecurityState({ attempts: attempts, lockUntil: 0 });
                }
                if (pinInput) pinInput.classList.add('error');
                if (lockError) {
                    if (attempts >= MAX_ATTEMPTS) {
                        lockError.textContent = '❌ تم تجاوز عدد المحاولات. حاول بعد ' + Math.ceil(LOCKOUT_MS / 1000) + ' ثانية';
                    } else {
                        lockError.textContent = '❌ رقم سري غير صحيح. متبقي ' + (MAX_ATTEMPTS - attempts) + ' محاولات';
                    }
                }
                setTimeout(() => { if (pinInput) pinInput.classList.remove('error'); }, 500);
                return false;
            }

            function setupPinPad() {
                const pinInput = document.getElementById('pin-input');
                const error = document.getElementById('lock-error');

                document.querySelectorAll('.pin-pad button[data-pin]').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const state = getSecurityState();
                        if (state.lockUntil && Date.now() < state.lockUntil) { reflectLockoutState(); return; }
                        if (pinInput) {
                            const val = pinInput.value;
                            if (val.length < 6) {
                                pinInput.value = val + this.getAttribute('data-pin');
                                pinInput.classList.remove('error');
                            }
                            if (error) error.textContent = '';
                        }
                    });
                });

                document.getElementById('pin-clear').addEventListener('click', function() {
                    if (pinInput) { pinInput.value = pinInput.value.slice(0, -1);
                        pinInput.classList.remove('error'); }
                    if (error) error.textContent = '';
                });

                document.getElementById('pin-enter').addEventListener('click', function() {
                    if (pinInput) verifyPin(pinInput.value);
                });

                if (pinInput) {
                    pinInput.addEventListener('keydown', e => { if (e.key === 'Enter') verifyPin(this.value); });
                    pinInput.addEventListener('input', function() {
                        this.classList.remove('error');
                        if (error) error.textContent = '';
                        if (this.value.length === 6) verifyPin(this.value);
                    });
                }
            }

            // ============================================================
            //  USER ROLE
            // ============================================================
            // The role is whatever verifyPin() determined for this session —
            // it is intentionally NOT read from persisted settings, so it can't
            // be tampered with by editing localStorage or clicking a UI toggle.
            function getUserRole() { return isUnlocked ? sessionRole : 'cashier'; }

            function isManager() { return getUserRole() === 'manager' && isUnlocked; }

            function requireAuth(role) {
                if (!isUnlocked) { showLockScreen(); return false; }
                if (role === 'manager' && !isManager()) {
                    toast('⚠️ هذه الميزة متاحة للمدير فقط');
                    return false;
                }
                return true;
            }

            // ============================================================
            //  FIREBASE
            // ============================================================
            let firebaseInitialized = false;
            let firestore = null;
            let syncStatus = 'offline';
            let syncUnsubscribe = null;
            let retryTimeout = null;
            let retryCount = 0;
            const MAX_RETRY = 5;

            // ============================================================
            //  USB DIRECT PRINTING (TSPL) — Xprinter XP-365B and similar
            //  thermal label printers. Bypasses the browser print dialog by
            //  sending raw TSPL commands straight to the printer over
            //  WebUSB. Requires the printer's Windows driver to be replaced
            //  with WinUSB via Zadig once, and only works in Chrome/Edge.
            // ============================================================
            let usbPrinterDevice = null;
            let usbPrinterEndpoint = null;

            async function connectUsbPrinter() {
                if (!('usb' in navigator)) {
                    toast('⚠️ متصفحك ما بيدعم الطباعة المباشرة (WebUSB). استخدم Chrome أو Edge على كمبيوتر.');
                    return null;
                }
                try {
                    let device = usbPrinterDevice;
                    if (device) {
                        try { await device.open(); } catch (e) { device = null; usbPrinterDevice = null; }
                    }
                    if (!device) {
                        const known = await navigator.usb.getDevices();
                        device = known[0] || null;
                    }
                    if (!device) {
                        device = await navigator.usb.requestDevice({ filters: [{}] });
                    }
                    if (!device.opened) await device.open();
                    if (device.configuration === null) await device.selectConfiguration(1);

                    let ifaceNumber = null, epOut = null;
                    for (const iface of device.configuration.interfaces) {
                        for (const alt of iface.alternates) {
                            const out = alt.endpoints.find(e => e.direction === 'out');
                            if (out) { ifaceNumber = iface.interfaceNumber; epOut = out.endpointNumber; break; }
                        }
                        if (epOut !== null) break;
                    }
                    if (ifaceNumber === null) {
                        toast('⚠️ ما قدرت ألاقي منفذ إرسال بيانات على هالجهاز — تأكد إنها طابعة وإن التعريف WinUSB مركّب (Zadig)');
                        return null;
                    }
                    try { await device.claimInterface(ifaceNumber); } catch (e) {
                        // already claimed (e.g. reconnect) — ignore
                    }
                    usbPrinterDevice = device;
                    usbPrinterEndpoint = epOut;
                    return device;
                } catch (e) {
                    console.warn('USB printer connect error:', e);
                    if (e.name !== 'NotFoundError') {
                        toast('⚠️ تعذّر الاتصال بالطابعة: ' + e.message);
                    }
                    return null;
                }
            }

            async function sendTsplToPrinter(tsplString) {
                let device = usbPrinterDevice;
                if (!device) device = await connectUsbPrinter();
                if (!device) return false;
                try {
                    const data = new TextEncoder().encode(tsplString);
                    await device.transferOut(usbPrinterEndpoint, data);
                    return true;
                } catch (e) {
                    console.warn('USB print error:', e);
                    toast('⚠️ خطأ أثناء الطباعة: ' + e.message);
                    usbPrinterDevice = null;
                    return false;
                }
            }

            // Builds raw TSPL for one barcode label. Label size/gap come from
            // settings (defaults 40×30mm, 2mm gap — common Xprinter roll size)
            // so Masa can tune it from ⚙️ الإعدادات without touching code.
            function buildBarcodeTspl(item, count) {
                const code = generateBarcode(item);
                const w = DATA.settings.labelWidthMm || 40;
                const h = DATA.settings.labelHeightMm || 30;
                const gap = DATA.settings.labelGapMm != null ? DATA.settings.labelGapMm : 2;
                const nameEsc = String(item.name || '').replace(/["\\]/g, '');
                let tspl = `SIZE ${w} mm,${h} mm\r\nGAP ${gap} mm,0 mm\r\nDIRECTION 1\r\nCLS\r\n`;
                tspl += `TEXT 16,10,"3",0,1,1,"${nameEsc}"\r\n`;
                tspl += `BARCODE 16,45,"128",50,1,0,2,2,"${code}"\r\n`;
                if (item.price) {
                    tspl += `TEXT 16,110,"2",0,1,1,"${money(item.price)}"\r\n`;
                }
                tspl += `PRINT 1,${Math.max(1, parseInt(count) || 1)}\r\n`;
                return tspl;
            }

            async function printBarcodeUsb(item, count) {
                toast('⏳ جاري الاتصال بالطابعة...');
                const tspl = buildBarcodeTspl(item, count);
                const ok = await sendTsplToPrinter(tspl);
                if (ok) toast('✅ تم إرسال ' + (parseInt(count) || 1) + ' نسخة للطابعة');
            }

            function initFirebase() {
                const config = DATA.settings.firebaseConfig;
                if (!config || !config.projectId || !config.apiKey) {
                    updateSyncStatus('offline', 'غير متصل - إعدادات مفقودة');
                    return;
                }
                try {
                    if (typeof firebase === 'undefined') {
                        console.warn('Firebase SDK not loaded');
                        updateSyncStatus('offline', 'SDK غير محمل');
                        return;
                    }
                    if (firebase.apps.length === 0) {
                        firebase.initializeApp({
                            apiKey: config.apiKey,
                            projectId: config.projectId,
                            authDomain: config.projectId + '.firebaseapp.com'
                        });
                    }
                    firestore = firebase.firestore();
                    firestore.enablePersistence({ synchronizeTabs: true }).catch(() => {});
                    firebaseInitialized = true;
                    updateSyncStatus('online', 'متصل');
                    setupRealtimeSync();
                    setupConnectionHandlers();
                    toast('🔥 تم الاتصال بـ Firebase');
                    syncFromFirebase();
                } catch (e) {
                    console.warn('Firebase init error:', e);
                    updateSyncStatus('offline', 'خطأ في الاتصال');
                    if (retryCount < MAX_RETRY) {
                        retryCount++;
                        clearTimeout(retryTimeout);
                        retryTimeout = setTimeout(() => {
                            toast('🔄 محاولة إعادة الاتصال... (' + retryCount + '/' + MAX_RETRY + ')');
                            initFirebase();
                        }, 5000 * retryCount);
                    }
                }
            }

            function setupRealtimeSync() {
                if (syncUnsubscribe) { syncUnsubscribe();
                    syncUnsubscribe = null; }
                if (!firestore) return;
                try {
                    syncUnsubscribe = firestore.collection('rt_shop_data')
                        .onSnapshot(snapshot => {
                            let changes = 0,
                                deletions = 0;
                            snapshot.docChanges().forEach(change => {
                                const key = change.doc.id;
                                const data = change.doc.data().data;
                                if (change.type === 'removed') {
                                    handleRemoteDeletion(key);
                                    deletions++;
                                    return;
                                }
                                if (!data) return;
                                if (key === 'rt_settings') {
                                    const remoteTime = change.doc.data().updatedAtServer || change.doc.data()
                                        .updatedAtLocal || 0;
                                    const localTime = getLocalTimestamp(key);
                                    if (remoteTime > localTime) {
                                        setLocalData(key, data);
                                        changes++;
                                    }
                                } else {
                                    // Arrays and tombstones always merge — merging
                                    // is non-destructive so there's no need (and
                                    // no safe way) to gate it by a whole-collection
                                    // timestamp.
                                    setLocalData(key, data);
                                    changes++;
                                }
                            });
                            if (changes > 0 || deletions > 0) {
                                let msg = '🔄 تم التحديث من السحابة';
                                if (changes > 0) msg += ' (' + changes + ' عناصر)';
                                if (deletions > 0) msg += ' (' + deletions + ' حذف)';
                                toast(msg);
                                renderAll();
                            }
                            updateSyncStatus('online', 'متصل');
                            retryCount = 0;
                        }, err => {
                            console.warn('Firebase listener error:', err);
                            updateSyncStatus('offline', 'خطأ في المزامنة');
                            if (retryCount < MAX_RETRY) {
                                retryCount++;
                                clearTimeout(retryTimeout);
                                retryTimeout = setTimeout(() => setupRealtimeSync(), 5000 * retryCount);
                            }
                        });
                } catch (e) { console.warn('Error setting up realtime sync:', e); }
            }

            function setupConnectionHandlers() {
                const handleOnline = () => {
                    if (firebaseInitialized && firestore) { setupRealtimeSync();
                        syncFromFirebase();
                        toast('🔄 تم استعادة الاتصال، جارٍ المزامنة...'); } else { initFirebase(); }
                };
                const handleOffline = () => { updateSyncStatus('offline', 'غير متصل - لا يوجد إنترنت'); };
                window.removeEventListener('online', handleOnline);
                window.removeEventListener('offline', handleOffline);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                if (!navigator.onLine) handleOffline();
            }

            function updateSyncStatus(status, label) {
                syncStatus = status;
                const el = document.querySelector('.sync-status-bar');
                if (!el) return;
                const dot = el.querySelector('.status-dot');
                if (dot) {
                    dot.className = 'status-dot';
                    if (status === 'online') dot.classList.add('online');
                    else if (status === 'syncing') dot.classList.add('syncing');
                    else dot.classList.add('offline');
                }
                const text = el.querySelector('.status-text');
                if (text) text.textContent = label || (status === 'online' ? 'متصل' : status === 'syncing' ?
                    'جارٍ المزامنة...' : 'غير متصل');
            }

            function syncToFirebase(key, data) {
                if (!firebaseInitialized || !firestore) return;
                updateSyncStatus('syncing', 'جارٍ الحفظ...');
                firestore.collection('rt_shop_data').doc(key).set({
                    data: data,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAtLocal: Date.now(),
                    updatedAtServer: firebase.firestore.FieldValue.serverTimestamp()
                }).then(() => { updateSyncStatus('online', 'متصل'); }).catch(err => {
                    console.warn('Firebase sync error:', err);
                    updateSyncStatus('offline', 'خطأ في الحفظ');
                    if (retryCount < MAX_RETRY) {
                        retryCount++;
                        clearTimeout(retryTimeout);
                        retryTimeout = setTimeout(() => syncToFirebase(key, data), 3000 * retryCount);
                    }
                });
            }

            function syncFromFirebase() {
                if (!firebaseInitialized || !firestore) return;
                updateSyncStatus('syncing', 'جارٍ التحميل...');
                firestore.collection('rt_shop_data').get().then(snapshot => {
                    let changes = 0;
                    const docs = snapshot.docs.slice().sort((a, b) => (a.id === 'rt_tombstones' ? -1 : b.id ===
                        'rt_tombstones' ? 1 : 0));
                    docs.forEach(doc => {
                        const key = doc.id;
                        const data = doc.data().data;
                        if (!data) return;
                        if (key === 'rt_settings') {
                            const remoteTime = doc.data().updatedAtServer || doc.data().updatedAtLocal || 0;
                            const localTime = getLocalTimestamp(key);
                            if (remoteTime > localTime) { setLocalData(key, data);
                                changes++; }
                        } else {
                            setLocalData(key, data);
                            changes++;
                        }
                    });
                    if (changes > 0) { toast('🔄 تم تحديث ' + changes + ' عناصر من السحابة');
                        renderAll(); }
                    updateSyncStatus('online', 'متصل');
                    retryCount = 0;
                }).catch(err => {
                    console.warn('Firebase fetch error:', err);
                    updateSyncStatus('offline', 'خطأ في التحميل');
                    if (retryCount < MAX_RETRY) {
                        retryCount++;
                        clearTimeout(retryTimeout);
                        retryTimeout = setTimeout(() => syncFromFirebase(), 3000 * retryCount);
                    }
                });
            }

            function getLocalTimestamp(key) {
                const map = {
                    'rt_repairs': DATA.repairs,
                    'rt_customers': DATA.customers,
                    'rt_inventory': DATA.inventory,
                    'rt_sales': DATA.sales,
                    'rt_technicians': DATA.technicians,
                    'rt_coupons': DATA.coupons,
                    'rt_expenses': DATA.expenses,
                    'rt_recurring_expenses': DATA.recurringExpenses,
                    'rt_restock_list': DATA.restockList,
                    'rt_suppliers': DATA.suppliers,
                    'rt_wholesale_customers': DATA.wholesaleCustomers,
                    'rt_settings': DATA.settings
                };
                const item = map[key] || null;
                if (Array.isArray(item) && item.length > 0) {
                    let maxTime = 0;
                    for (const el of item) {
                        const t = el.updatedAt || el.createdAt || 0;
                        if (t > maxTime) maxTime = t;
                    }
                    return maxTime;
                }
                if (key === 'rt_settings' && item && typeof item === 'object') {
                    return item.updatedAt || 0;
                }
                return 0;
            }

            function handleRemoteDeletion(key) {
                const map = {
                    'rt_repairs': 'repairs',
                    'rt_customers': 'customers',
                    'rt_inventory': 'inventory',
                    'rt_sales': 'sales',
                    'rt_technicians': 'technicians',
                    'rt_coupons': 'coupons',
                    'rt_expenses': 'expenses',
                    'rt_recurring_expenses': 'recurringExpenses',
                    'rt_restock_list': 'restockList',
                    'rt_suppliers': 'suppliers',
                    'rt_wholesale_customers': 'wholesaleCustomers'
                };
                const name = map[key];
                if (name) {
                    DATA[name] = [];
                    localStorage.setItem(key, JSON.stringify([]));
                } else {
                    localStorage.removeItem(key);
                }
                toast('🗑️ تم حذف البيانات عن بُعد: ' + key);
            }

            function setLocalData(key, data) {
                if (!data && data !== null) return;
                const map = {
                    'rt_repairs': 'repairs',
                    'rt_customers': 'customers',
                    'rt_inventory': 'inventory',
                    'rt_sales': 'sales',
                    'rt_technicians': 'technicians',
                    'rt_coupons': 'coupons',
                    'rt_expenses': 'expenses',
                    'rt_recurring_expenses': 'recurringExpenses',
                    'rt_restock_list': 'restockList',
                    'rt_suppliers': 'suppliers',
                    'rt_wholesale_customers': 'wholesaleCustomers'
                };
                const name = map[key];
                if (name && Array.isArray(data)) {
                    mergeArrayData(name, data);
                } else if (key === 'rt_tombstones' && typeof data === 'object') {
                    mergeTombstones(data);
                } else if (key === 'rt_settings' && typeof data === 'object') {
                    const oldConfig = DATA.settings.firebaseConfig;
                    const oldUserPin = DATA.settings.userPin;
                    const oldManagerPin = DATA.settings.managerPin;
                    DATA.settings = data;
                    if (!DATA.settings.firebaseConfig || !DATA.settings.firebaseConfig.projectId) {
                        DATA.settings.firebaseConfig = oldConfig;
                    }
                    // Never let an older/incomplete remote settings doc wipe out
                    // locally-known login PINs — a missing PIN here would lock
                    // the manager out of their own device.
                    if (!DATA.settings.userPin && oldUserPin) DATA.settings.userPin = oldUserPin;
                    if (!DATA.settings.managerPin && oldManagerPin) DATA.settings.managerPin = oldManagerPin;
                    localStorage.setItem(key, JSON.stringify(DATA.settings));
                }
            }

            // ============================================================
            //  PWA INSTALL
            // ============================================================
            let deferredPrompt = null;

            function setupPWAInstall() {
                const banner = document.getElementById('install-banner');
                if (window.matchMedia('(display-mode: standalone)').matches) { banner.classList.remove('show'); return; }
                if (localStorage.getItem('pwa_banner_dismissed') === 'true') return;

                window.addEventListener('beforeinstallprompt', function(e) {
                    e.preventDefault();
                    deferredPrompt = e;
                    setTimeout(() => {
                        if (localStorage.getItem('pwa_banner_dismissed') !== 'true') {
                            banner.classList.add('show');
                        }
                    }, 2000);
                });

                document.getElementById('install-btn').addEventListener('click', function() {
                    if (deferredPrompt) {
                        deferredPrompt.prompt();
                        deferredPrompt.userChoice.then(choice => {
                            if (choice.outcome === 'accepted') toast('✅ تم تثبيت التطبيق بنجاح!');
                            else toast('❌ تم إلغاء التثبيت');
                            deferredPrompt = null;
                            banner.classList.remove('show');
                            localStorage.setItem('pwa_banner_dismissed', 'true');
                        });
                    } else {
                        toast('📱 استخدم قائمة المتصفح > "تثبيت التطبيق"');
                    }
                });

                document.getElementById('install-close').addEventListener('click', function() {
                    banner.classList.remove('show');
                    localStorage.setItem('pwa_banner_dismissed', 'true');
                    toast('🔕 تم إخفاء رسالة التثبيت');
                });

                window.addEventListener('appinstalled', function() {
                    toast('✅ تم تثبيت التطبيق بنجاح!');
                    banner.classList.remove('show');
                    localStorage.setItem('pwa_banner_dismissed', 'true');
                });
            }
