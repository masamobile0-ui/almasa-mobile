                if (overdueList.length > 0) {
                    html += '<div style="background:rgba(239,91,91,.08);border:1px solid rgba(239,91,91,.25);border-radius:14px;padding:12px 14px;margin-bottom:14px">';
                    html += '<div style="font-size:13px;font-weight:800;color:var(--danger);margin-bottom:8px">⚠️ ' + overdueList.length + ' جهاز تجاوز تاريخ الوعد</div>';
                    for (var oi = 0; oi < Math.min(overdueList.length, 3); oi++) {
                        html += '<div style="font-size:12px;color:var(--text-dim);padding:3px 0;border-bottom:1px solid rgba(239,91,91,.12)" data-open-device="' + overdueList[oi].r.id + '" style="cursor:pointer">' +
                            '📱 ' + esc(overdueList[oi].r.deviceType) + ' — ' + esc(overdueList[oi].c.name) + ' (وعد: ' + fmtDate(overdueList[oi].r.promiseDate) + ')</div>';
                    }
                    if (overdueList.length > 3) html += '<div style="font-size:11px;color:var(--text-faint);padding-top:6px">و ' + (overdueList.length - 3) + ' أخرى...</div>';
                    html += '</div>';
                }

                // تنبيه نقص المخزون
                var lowStockList = invLowStockList();
                if (lowStockList.length > 0) {
                    html += '<div style="background:rgba(255,138,61,.08);border:1px solid rgba(255,138,61,.3);border-radius:14px;padding:12px 14px;margin-bottom:14px;cursor:pointer" id="dash-low-stock">';
                    html += '<div style="font-size:13px;font-weight:800;color:var(--accent);margin-bottom:8px">📦 ' + lowStockList.length + ' صنف بحاجة لإعادة تعبئة المخزون</div>';
                    for (var li = 0; li < Math.min(lowStockList.length, 3); li++) {
                        var liItem = lowStockList[li];
                        html += '<div style="font-size:12px;color:var(--text-dim);padding:3px 0;border-bottom:1px solid rgba(255,138,61,.12)">' +
                            '📦 ' + esc(liItem.name) + ' — الكمية المتبقية: <b style="color:var(--danger)">' + (Number(liItem.qty) || 0) + '</b></div>';
                    }
                    if (lowStockList.length > 3) html += '<div style="font-size:11px;color:var(--text-faint);padding-top:6px">و ' + (lowStockList.length - 3) + ' أصناف أخرى...</div>';
                    html += '</div>';
                }

                // إضافة زر تثبيت المظهر
                html +=
                    '<div style="margin-top:12px;display:flex;gap:8px;justify-content:center;font-size:11px;color:var(--text-faint)">';
                html +=
                    '<button class="btn btn-sm btn-ghost" id="theme-toggle-footer" style="width:auto">🌓 تغيير المظهر</button>';
                html += '</div>';

                return html;
            }

            /* ====================== DEVICES VIEW ====================== */
            function renderDevices() {
                var filters = [
                    ['all', 'الكل'],
                    ['received', 'مستلم'],
                    ['in_progress', 'قيد العمل'],
                    ['waiting_parts', '⏳ بانتظار القطع'],
                    ['ready', 'جاهز'],
                    ['delivered', '✅ تم التسليم']
                ];
                var list = [];
                for (var i = 0; i < repairs.length; i++) {
                    list.push(repairs[i]);
                }
                list.sort(function(a, b) {
                    // الأجهزة المثبتة أولاً
                    if (a.pinned && !b.pinned) return -1;
                    if (!a.pinned && b.pinned) return 1;
                    return b.createdAt - a.createdAt;
                });

                if (deviceFilter !== 'all') {
                    list = list.filter(function(r) { return r.status === deviceFilter; });
                }
                if (deviceSearch.trim()) {
                    var q = deviceSearch.trim().toLowerCase();
                    list = list.filter(function(r) {
                        var c = getCustomer(r.customerId) || { name: '', phone: '' };
                        return (r.deviceType || '').toLowerCase().includes(q) || (r.issue || '').toLowerCase()
                            .includes(q) || (c.name || '').toLowerCase().includes(q) || (c.phone || '')
                            .includes(q) || (r.imei || '').includes(q);
                    });
                }

                var html = '<div class="search-wrap">' + ICONS.search +
                    '<input class="search-input" id="device-search" placeholder="🔍 ابحث باسم الزبون، الجهاز، العطل، أو IMEI" value="' +
                    esc(deviceSearch) + '" aria-label="بحث في الأجهزة"></div>';

                html += '<div class="chip-row" id="device-filters" role="tablist">';
                for (var i = 0; i < filters.length; i++) {
                    var f = filters[i];
                    var active = deviceFilter === f[0] ? 'active' : '';
                    html += '<button class="chip ' + active + '" data-filter="' + f[0] + '" role="tab">' + f[1] +
                    '</button>';
                }
                html += '</div>';

                if (list.length) {
                    html += '<div style="font-size:11px;color:var(--text-faint);margin-bottom:8px">' + list.length +
                        ' جهاز</div>';
                    html += '<div class="card-list">';
                    for (var i = 0; i < list.length; i++) {
                        html += deviceCardHTML(list[i]);
                    }
                    html += '</div>';
                } else if (repairs.length === 0) {
                    html += emptyState('emptyDevice', 'لا توجد أجهزة بعد', 'اضغط زر + لإضافة أول جهاز للصيانة');
                } else {
                    html += emptyState('emptyDevice', 'لا نتائج مطابقة', 'جرّب كلمة بحث أو فلتر مختلف');
                }
                return html;
            }

            /* ====================== CUSTOMERS VIEW ====================== */
            function renderCustomers() {
                var list = [];
                for (var i = 0; i < customers.length; i++) {
                    list.push(customers[i]);
                }
                list.sort(function(a, b) { return b.createdAt - a.createdAt; });

                if (customerSearch.trim()) {
                    var q = customerSearch.trim().toLowerCase();
                    list = list.filter(function(c) { return (c.name || '').toLowerCase().includes(q) || (c.phone || '')
                            .includes(q); });
                }

                var html = '<div class="search-wrap">' + ICONS.search +
                    '<input class="search-input" id="customer-search" placeholder="🔍 ابحث بالاسم أو رقم الهاتف" value="' +
                    esc(customerSearch) + '" aria-label="بحث في الزبائن"></div>';

                if (list.length) {
                    html += '<div class="card-list">';
                    for (var i = 0; i < list.length; i++) {
                        html += customerCardHTML(list[i]);
                    }
                    html += '</div>';
                } else if (customers.length === 0) {
                    html += emptyState('emptyCustomer', 'لا يوجد زبائن بعد', 'يُضاف الزبون تلقائياً عند إدخال أول جهاز له');
                } else {
                    html += emptyState('emptyCustomer', 'لا نتائج مطابقة', 'جرّب اسماً أو رقماً مختلفاً');
                }
                return html;
            }

            function customerCardHTML(c) {
                var rs = repairsForCustomer(c.id);
                var delivCnt = 0;
                for (var i = 0; i < rs.length; i++) { if (rs[i].status === 'delivered') delivCnt++; }
                var tier = getLoyaltyTier(delivCnt);
                var loyalBadge = tier.minVisits > 0 ? ' ' + getLoyaltyBadgeHTML(delivCnt) : '';
                var loyaltyRing = tier.minVisits > 0 ? '<div class="loyalty-ring"></div>' : '';
                var initials = (c.name || '?').trim().slice(0, 1);
                var totalSpent = 0;
                for (var i = 0; i < rs.length; i++) {
                    if (rs[i].status === 'delivered') totalSpent += Number(rs[i].finalPrice) || 0;
                }

                return '<div class="customer-card"><div class="avatar" data-open-customer="' + c.id + '" aria-label="' +
                    esc(c.name) + '">' + loyaltyRing + esc(initials) +
                    '</div><div class="customer-info" data-open-customer="' + c.id + '"><div class="customer-name">' +
                    esc(c.name) + loyalBadge + '</div><div class="customer-meta">' + delivCnt +
                    ' زيارة · ' + money(totalSpent) + ' · ' + esc(c.phone) + '</div></div><a class="call-btn" href="tel:' +
                    esc(c.phone) + '" aria-label="اتصال">' + ICONS.phone + '</a></div>';
            }

            /* ====================== REPORTS VIEW ====================== */
            function periodStart(period) {
                var now = new Date();
                if (period === 'today') { var d = new Date(now);
                    d.setHours(0, 0, 0, 0); return d; }
                if (period === 'week') { var d = new Date(now);
                    d.setDate(d.getDate() - 7); return d; }
                if (period === 'month') { var d = new Date(now);
                    d.setMonth(d.getMonth() - 1); return d; }
                if (period === 'quarter') { var d = new Date(now);
                    d.setMonth(d.getMonth() - 3); return d; }
                return null;
            }

            function inPeriod(dateStr, start) {
                if (!start) return true;
                if (!dateStr) return false;
                return new Date(dateStr + 'T00:00:00') >= start;
            }

            // نفس فكرة inPeriod لكن للطوابع الزمنية (timestamp) المستخدمة في فواتير المبيعات
            function inPeriodTs(ts, start) {
                if (!start) return true;
                if (!ts) return false;
                return ts >= start.getTime();
            }

            function renderReports() {
                var start = periodStart(reportPeriod);
                var periods = [
                    ['today', 'اليوم'],
                    ['week', 'أسبوع'],
                    ['month', 'شهر'],
                    ['quarter', 'ربع سنة'],
                    ['all', 'الكل']
                ];

                var intake = [],
                    delivered = [];
                for (var i = 0; i < repairs.length; i++) {
                    if (inPeriod(repairs[i].receivedDate, start)) intake.push(repairs[i]);
                    if (repairs[i].status === 'delivered' && inPeriod(repairs[i].deliveredDate, start)) delivered.push(
                    repairs[i]);
                }

                var revenue = 0,
                    profit = 0,
                    totalCost = 0;
                for (var i = 0; i < delivered.length; i++) {
                    var finalPrice = Number(delivered[i].finalPrice) || 0;
                    var partsCost = Number(delivered[i].partsCost) || 0;
                    revenue += finalPrice;
                    profit += finalPrice - partsCost;
                    totalCost += partsCost;
                }

                var issueCounts = {};
                for (var i = 0; i < intake.length; i++) {
                    var k = (intake[i].issue || 'غير محدد').trim();
                    issueCounts[k] = (issueCounts[k] || 0) + 1;
                }
                var topIssues = Object.entries(issueCounts).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 5);

                var deviceCounts = {};
                for (var i = 0; i < intake.length; i++) {
                    var k = (intake[i].deviceType || 'غير محدد').trim();
                    deviceCounts[k] = (deviceCounts[k] || 0) + 1;
                }
                var topDevices = Object.entries(deviceCounts).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 5);

                var customerCounts = {};
                for (var i = 0; i < intake.length; i++) {
                    customerCounts[intake[i].customerId] = (customerCounts[intake[i].customerId] || 0) + 1;
                }
                var topCustomers = Object.entries(customerCounts).sort(function(a, b) { return b[1] - a[1]; }).slice(0,
                5);
                topCustomers = topCustomers.map(function(item) {
                    var c = getCustomer(item[0]);
                    return [c ? c.name : '—', item[1]];
                });

                // متوسط وقت الإصلاح
                var totalDays = 0,
                    countWithDays = 0;
                for (var i = 0; i < delivered.length; i++) {
                    if (delivered[i].receivedDate && delivered[i].deliveredDate) {
                        var startDate = new Date(delivered[i].receivedDate);
                        var endDate = new Date(delivered[i].deliveredDate);
                        var days = Math.floor((endDate - startDate) / (1000 * 60 * 60 * 24));
                        if (days >= 0) { totalDays += days;
                            countWithDays++; }
                    }
                }
                var avgDays = countWithDays > 0 ? (totalDays / countWithDays).toFixed(1) : '—';

                var html = '<div class="period-row">';
                for (var i = 0; i < periods.length; i++) {
                    var p = periods[i];
                    var active = reportPeriod === p[0] ? 'active' : '';
                    html += '<button class="chip ' + active + '" data-period="' + p[0] + '">' + p[1] + '</button>';
                }
                html += '</div>';

                html +=
                    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">';
                html +=
                    '<div class="report-card" style="padding:12px;margin:0"><div class="report-big"><span class="num">' +
                    intake.length + '</span><span class="lbl">📥 جهاز استُلم</span></div></div>';
                html +=
                    '<div class="report-card" style="padding:12px;margin:0"><div class="report-big"><span class="num">' +
                    delivered.length + '</span><span class="lbl">✅ جهاز سُلّم</span></div></div>';
                html += '</div>';

                html += '<div class="stat-grid">';
                html += '<div class="stat-card"><span class="bar" style="background:var(--accent-2)"></span><div class="stat-num">' +
                    money(revenue) + '</div><div class="stat-label">💰 إجمالي الإيرادات</div></div>';
                html += '<div class="stat-card"><span class="bar" style="background:var(--accent)"></span><div class="stat-num">' +
                    money(profit) + '</div><div class="stat-label">📈 صافي الربح</div></div>';
                html += '<div class="stat-card"><span class="bar" style="background:var(--accent-3)"></span><div class="stat-num">' +
                    money(totalCost) + '</div><div class="stat-label">🔧 تكلفة القطع</div></div>';
                html += '<div class="stat-card"><span class="bar" style="background:var(--gold)"></span><div class="stat-num">' +
                    avgDays + '</div><div class="stat-label">⏳ متوسط أيام الإصلاح</div></div>';
                html += '</div>';

                html += barCard('🛠️ الأعطال الأكثر شيوعاً', topIssues);
                html += barCard('📱 الأجهزة الأكثر صيانة', topDevices);
                html += barCard('🏆 أفضل الزبائن تعاملاً', topCustomers);

                /* ----- تقرير المبيعات (بيع الأصناف/المخزون) ----- */
                var periodSales = sales.filter(function(s) { return inPeriodTs(s.createdAt, start); });
                var salesRevenue = 0,
                    retailRevenue = 0,
                    wholesaleRevenue = 0;
                var productCounts = {};
                for (var i = 0; i < periodSales.length; i++) {
                    var s = periodSales[i];
                    salesRevenue += s.total;
                    if (s.saleType === 'wholesale') wholesaleRevenue += s.total;
                    else retailRevenue += s.total;
                    for (var j = 0; j < s.items.length; j++) {
                        var nm = s.items[j].name || 'غير محدد';
                        productCounts[nm] = (productCounts[nm] || 0) + (Number(s.items[j].qty) || 0);
                    }
                }
                var topProducts = Object.entries(productCounts).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 5);

                var wcCounts = {};
                for (var i = 0; i < periodSales.length; i++) {
                    var s = periodSales[i];
                    if (s.saleType === 'wholesale' && s.customerId) {
                        wcCounts[s.customerId] = (wcCounts[s.customerId] || 0) + (Number(s.total) || 0);
                    }
                }
                var topWholesaleCustomers = Object.entries(wcCounts).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 5);
                topWholesaleCustomers = topWholesaleCustomers.map(function(item) {
                    var c = getWholesaleCustomer(item[0]);
                    return [c ? c.name : '—', item[1]];
                });

                html += '<div class="section-head" style="margin:22px 0 10px"><h3>🛍️ تقرير المبيعات</h3></div>';
                html += '<div class="stat-grid">';
                html += '<div class="stat-card"><span class="bar" style="background:var(--accent)"></span><div class="stat-num">' +
                    periodSales.length + '</div><div class="stat-label">🧾 عدد الفواتير</div></div>';
                html += '<div class="stat-card"><span class="bar" style="background:var(--accent-2)"></span><div class="stat-num">' +
                    money(salesRevenue) + '</div><div class="stat-label">💰 إجمالي إيرادات المبيعات</div></div>';
                html += '<div class="stat-card"><span class="bar" style="background:var(--gold)"></span><div class="stat-num">' +
                    money(retailRevenue) + '</div><div class="stat-label">🏪 بيع داخل المحل</div></div>';
                html += '<div class="stat-card"><span class="bar" style="background:var(--accent-3)"></span><div class="stat-num">' +
                    money(wholesaleRevenue) + '</div><div class="stat-label">📦 بيع جملة</div></div>';
                html += '</div>';
                html += barCard('🔥 المنتجات الأكثر مبيعاً', topProducts);
                html += barCard('👥 أفضل عملاء الجملة', topWholesaleCustomers);

                /* ----- تقرير المخزون ----- */
                var invTotalItems = inventory.length;
                var invTotalQty = 0,
                    invTotalValue = 0,
                    invLowCount = 0,
                    invOutCount = 0;
                for (var i = 0; i < inventory.length; i++) {
                    var itQty = Number(inventory[i].qty) || 0;
                    invTotalQty += itQty;
                    invTotalValue += itQty * (Number(inventory[i].price) || 0);
                    var lvl = invLevel(inventory[i]);
                    if (lvl === 'low') invLowCount++;
                    if (lvl === 'out') invOutCount++;
                }

                html += '<div class="section-head" style="margin:22px 0 10px"><h3>📦 تقرير المخزون</h3></div>';
                html += '<div class="stat-grid">';
                html += '<div class="stat-card"><span class="bar" style="background:var(--accent-3)"></span><div class="stat-num">' +
                    invTotalItems + '</div><div class="stat-label">🗃️ عدد الأصناف</div></div>';
                html += '<div class="stat-card"><span class="bar" style="background:var(--accent)"></span><div class="stat-num">' +
                    invTotalQty + '</div><div class="stat-label">🔢 إجمالي القطع</div></div>';
                html += '<div class="stat-card"><span class="bar" style="background:var(--accent-2)"></span><div class="stat-num">' +
                    money(invTotalValue) + '</div><div class="stat-label">💵 قيمة المخزون</div></div>';
                html += '<div class="stat-card"><span class="bar" style="background:var(--danger)"></span><div class="stat-num">' +
                    (invLowCount + invOutCount) + '</div><div class="stat-label">⚠️ أصناف منخفضة/نافدة</div></div>';
                html += '</div>';

                /* ----- تقرير المرتجعات والتوالف ----- */
                var periodStockLog = stockLog.filter(function(l) { return inPeriodTs(l.createdAt, start); });
                var returnMoves = periodStockLog.filter(function(l) { return l.kind === 'return'; });
                var damagedMoves = periodStockLog.filter(function(l) { return l.kind === 'damaged'; });
                var returnQty = returnMoves.reduce(function(sum, l) { return sum + (Number(l.qty) || 0); }, 0);
                var damagedQty = damagedMoves.reduce(function(sum, l) { return sum + (Number(l.qty) || 0); }, 0);

                html += '<div class="section-head" style="margin:22px 0 10px"><h3>↩️ المرتجعات والتوالف</h3></div>';
                html += '<div class="stat-grid">';
                html += '<div class="stat-card"><span class="bar" style="background:var(--gold)"></span><div class="stat-num">' +
                    returnMoves.length + '</div><div class="stat-label">↩️ عمليات مرتجع (' + returnQty + ' قطعة)</div></div>';
                html += '<div class="stat-card"><span class="bar" style="background:var(--danger)"></span><div class="stat-num">' +
                    damagedMoves.length + '</div><div class="stat-label">❌ عمليات تالف (' + damagedQty + ' قطعة)</div></div>';
                html += '</div>';
                html += '<button class="btn btn-ghost btn-sm" id="open-stock-log-from-reports" style="margin-bottom:6px;width:100%">📋 عرض سجل المرتجعات والتوالف الكامل (' + stockLog.length + ')</button>';

                // إضافة زر تصدير تقرير
                html +=
                    '<button class="btn btn-ghost" id="export-report" style="margin-top:6px">' + ICONS.download +
                    ' تصدير التقرير (CSV)</button>';

                return html;
            }

            function barCard(title, rows) {
                if (!rows.length) return '<div class="report-card"><div class="section-head" style="margin:0 0 4px"><h3>' +
                    title + '</h3></div><p style="font-size:12.5px;color:var(--text-dim);margin:6px 0 0">لا توجد بيانات كافية بعد لهذه الفترة.</p></div>';
                var max = 1;
                for (var i = 0; i < rows.length; i++) {
                    if (rows[i][1] > max) max = rows[i][1];
                }
                var html = '<div class="report-card"><div class="section-head" style="margin:0 0 12px"><h3>' + title +
                    '</h3></div>';
                for (var i = 0; i < rows.length; i++) {
                    var name = esc(rows[i][0]);
                    var ct = rows[i][1];
                    var pct = (ct / max * 100).toFixed(0);
                    html += '<div class="bar-row"><div class="bar-row-top"><span class="nm">' + name +
                        '</span><span class="ct">' + ct + '</span></div><div class="bar-track"><div class="bar-fill" style="width:' +
                        pct + '%"></div></div></div>';
                }
                html += '</div>';
                return html;
            }

            /* ====================== INVENTORY VIEW ====================== */
            function invStatusBadge(item) {
                var lvl = invLevel(item);
                var map = {
                    out: { c: 'var(--danger)', l: '⛔ نفدت الكمية' },
                    low: { c: 'var(--danger)', l: '⚠️ كمية منخفضة' },
                    warn: { c: 'var(--accent)', l: '🔶 تقترب من النفاد' },
                    ok: { c: 'var(--accent-2)', l: '✅ متوفر' }
                };
                var m = map[lvl];
                return '<span class="badge" style="background:' + m.c + '33;color:' + m.c + ';border-color:' + m.c + '66">' + m.l + '</span>';
            }

            function inventoryCardHTML(item) {
                var lvl = invLevel(item);
                var borderColor = (lvl === 'low' || lvl === 'out') ? 'var(--danger)' : (lvl === 'warn' ? 'var(--accent)' : 'var(--border)');
                var qty = Number(item.qty) || 0;
                var min = invMinQty(item);
                var priceHtml = item.price ? '<span style="font-size:11px;color:var(--text-faint)">سعر القطعة: ' + money(item.price) + '</span>' : '';
                var typeHtml = item.type ? '<span style="font-size:10.5px;color:var(--accent-3);background:rgba(91,141,239,.12);border-radius:6px;padding:2px 7px;font-weight:700">' + esc(item.type) + '</span>' : '';
                var barcodeHtml = item.barcode ? '<span style="font-size:10.5px;color:var(--text-faint);font-family:monospace">🏷️ ' + esc(item.barcode) + '</span>' : '';
                return '<div class="device-card" style="border-color:' + borderColor + (lvl === 'low' || lvl === 'out' ? ';background:rgba(239,91,91,.06)' : '') + '" data-inv-id="' + item.id + '">' +
                    '<div class="device-card-top"><div><p class="device-title">' + esc(item.name) + (typeHtml ? ' ' + typeHtml : '') + '</p>' +
                    '<p class="device-customer">' + priceHtml + (item.notes ? ' <span style="font-size:11px;color:var(--text-faint)">· ' + esc(item.notes) + '</span>' : '') + '</p>' +
                    (barcodeHtml ? '<p class="device-customer" style="margin-top:2px">' + barcodeHtml + '</p>' : '') +
                    '</div>' +
                    invStatusBadge(item) + '</div>' +

            function renderInventory() {
                var list = [];
                for (var i = 0; i < inventory.length; i++) list.push(inventory[i]);

                if (inventorySearch.trim()) {
                    var q = inventorySearch.trim().toLowerCase();
                    list = list.filter(function(it) {
                        return (it.name || '').toLowerCase().includes(q) || (it.notes || '').toLowerCase().includes(q) || (it.barcode || '').toLowerCase().includes(q);
                    });
                }

                if (inventoryTypeFilter) {
                    list = list.filter(function(it) { return it.type === inventoryTypeFilter; });
                }

                list.sort(function(a, b) {
                    var la = invLevel(a), lb = invLevel(b);
                    var order = { out: 0, low: 1, warn: 2, ok: 3 };
                    if (order[la] !== order[lb]) return order[la] - order[lb];
                    return (a.name || '').localeCompare(b.name || '', 'ar');
                });

                var html = '<div class="search-wrap">' + ICONS.search +
                    '<input class="search-input" id="inventory-search" placeholder="🔍 ابحث في المخزون" value="' +
                    esc(inventorySearch) + '" aria-label="بحث في المخزون"></div>';

                var typeFilterOptions = '<option value="">كل الأنواع</option>';
                for (var tfi = 0; tfi < INVENTORY_TYPES.length; tfi++) {
                    var tfOpt = INVENTORY_TYPES[tfi];
                    typeFilterOptions += '<option value="' + esc(tfOpt) + '"' + (inventoryTypeFilter === tfOpt ? ' selected' : '') + '>' + esc(tfOpt) + '</option>';
                }
                html += '<div class="field" style="margin-bottom:12px"><label for="inventory-type-filter">تصفية حسب نوع القطعة</label><select id="inventory-type-filter">' + typeFilterOptions + '</select></div>';

                html += '<button class="btn btn-primary" id="add-inventory-item" style="margin-bottom:8px">' + ICONS.plus + ' إضافة صنف جديد</button>';
                html += '<button class="btn btn-outline-gold" id="open-stocktake" style="margin-bottom:8px">' + ICONS.box + ' 📷 وضع الجرد بالباركود</button>';
                html += '<button class="btn btn-ghost btn-sm" id="open-stock-log" style="margin-bottom:12px;width:100%">📋 سجل المرتجعات والتوالف (' + stockLog.length + ')</button>';

                var lowCount = invLowStockList().length;
                if (lowCount > 0) {
                    html += '<div style="background:rgba(239,91,91,.08);border:1px solid rgba(239,91,91,.25);border-radius:12px;padding:10px 12px;margin-bottom:12px;font-size:12.5px;color:var(--danger);font-weight:700">⚠️ يوجد ' + lowCount + ' صنف بكمية منخفضة أو منتهي</div>';
                }

                if (list.length) {
                    html += '<div style="font-size:11px;color:var(--text-faint);margin-bottom:8px">' + list.length + ' صنف</div>';
                    html += '<div class="card-list">';
                    for (var i = 0; i < list.length; i++) html += inventoryCardHTML(list[i]);
                    html += '</div>';
                } else if (inventory.length === 0) {
                    html += emptyState('emptyBox', 'المخزون فارغ', 'أضف أول صنف لبدء متابعة الكميات والتنبيهات');
                } else {
                    html += emptyState('emptyBox', 'لا نتائج مطابقة', 'جرّب كلمة بحث مختلفة');
                }
                return html;
            }

                openSheet(html);
                document.getElementById('sheet-close').onclick = closeSheet;

                document.getElementById('inv-generate-barcode').onclick = function() {
                    document.getElementById('inv-barcode').value = generateUniqueBarcode();
                    toast('✅ تم توليد رقم باركود جديد');
                };

                document.getElementById('inv-scan-barcode').onclick = function() {
                    scanOnceInto(function(code) {
                        var barcodeInput = document.getElementById('inv-barcode');
                        if (barcodeInput) barcodeInput.value = code;
                        toast('✅ تم مسح الباركود');
                    });

                document.getElementById('inventory-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    var name = document.getElementById('inv-name').value.trim();
                    var type = document.getElementById('inv-type').value;
                    var barcode = document.getElementById('inv-barcode').value.trim();
                    var qty = parseInt(document.getElementById('inv-qty').value, 10);
                    var min = document.getElementById('inv-min').value;
                    var price = parseFloat(document.getElementById('inv-price').value) || 0;
                    var notes = document.getElementById('inv-notes').value.trim();
                    if (!name) { toast('يرجى إدخال اسم الصنف'); return; }
                    if (isNaN(qty) || qty < 0) qty = 0;

                    if (barcode) {
                        var dup = findInventoryByBarcode(barcode);
                        if (dup && (!editing || dup.id !== item.id)) {
                            toast('⚠️ هذا الباركود مستخدم بالفعل لصنف "' + dup.name + '"');
                            return;
                        }
                    }

                    if (editing) {
                        item.name = name;
                        item.type = type;
                        item.barcode = barcode;
                        item.qty = qty;

                        item.price = price;
                        item.notes = notes;
                        item.updatedAt = Date.now();
                    } else {
                        item = {
                            id: uid(),
                            name: name,
                            type: type,
                            barcode: barcode,
                            qty: qty,
                            minQty: min !== '' ? parseInt(min, 10) : LOW_STOCK_DEFAULT,
                            price: price,
                            notes: notes,
                            createdAt: Date.now(),
                            updatedAt: Date.now()
                        };
                        inventory.push(item);
                    }
                    saveInventory();
                    closeSheet();
                    navigate('inventory');

                    if (lvl === 'low' || lvl === 'out') {

                            navigate('inventory');

            /* ====================== مرتجع وتالف ====================== */
            // kind: 'return' (مرتجع، يُضاف للمخزون) أو 'damaged' (تالف، يُخصم من المخزون)
            function openStockMovementForm(itemId, kind) {
                var item = getInventoryItem(itemId);
                if (!item) return;
                var isReturn = kind === 'return';
                var title = isReturn ? '↩️ تسجيل مرتجع' : '❌ تسجيل صنف تالف';

                var html = '<div class="sheet-handle"></div><div class="sheet-head"><h3>' + title +
                    '</h3><button class="icon-btn" id="sheet-close" aria-label="إغلاق">' + ICONS.close + '</button></div>';
                html += '<form id="stock-move-form" novalidate>';
                html += '<div class="field"><label>الصنف</label><div style="font-weight:800;padding:6px 0">' + esc(item.name) + '</div></div>';
                html += '<div class="field"><label for="sm-qty">الكمية</label><input type="number" id="sm-qty" required min="1" placeholder="1" value="1"></div>';
                html += '<div class="field"><label for="sm-note">ملاحظة (اختياري)</label><textarea id="sm-note" placeholder="' +
                    (isReturn ? 'مثال: مرتجع من الزبون' : 'مثال: كسر أثناء التركيب') + '"></textarea></div>';
                html += '<div style="font-size:12px;color:var(--text-faint);margin-bottom:10px">' +
                    (isReturn ? '↩️ سيتم إضافة الكمية إلى المخزون الحالي (' + (Number(item.qty) || 0) + ')' : '❌ سيتم خصم الكمية من المخزون الحالي (' + (Number(item.qty) || 0) + ') كتالف') + '</div>';
                html += '<div class="form-actions"><button type="submit" class="btn ' + (isReturn ? 'btn-primary' : 'btn-danger') + '">' +
                    (isReturn ? '↩️ تسجيل المرتجع' : '❌ تسجيل التالف') + '</button></div>';
                html += '</form>';

                openSheet(html);
                document.getElementById('sheet-close').onclick = closeSheet;

                document.getElementById('stock-move-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    var qty = parseInt(document.getElementById('sm-qty').value, 10);
                    var note = document.getElementById('sm-note').value.trim();
                    if (isNaN(qty) || qty <= 0) { toast('يرجى إدخال كمية صحيحة'); return; }
                    if (!isReturn && qty > (Number(item.qty) || 0)) { toast('⚠️ الكمية المطلوبة أكبر من الكمية المتوفرة حالياً'); return; }

                    var delta = isReturn ? qty : -qty;
                    adjustInventoryQty(item.id, delta, true);
                    stockLog.unshift({ id: uid(), itemId: item.id, itemName: item.name, kind: kind, qty: qty, note: note, createdAt: Date.now() });
                    saveStockLog();

                    closeSheet();
                    navigate('inventory');
                    toast(isReturn ? '✅ تم تسجيل المرتجع وإضافة الكمية للمخزون' : '✅ تم تسجيل الصنف كتالف وخصم الكمية من المخزون');
                });
            }

                        html += '<span style="font-size:11px;color:var(--text-faint)">' + dateStr + '</span></div>';

                applyTheme();
                renderTopbar();

                    navBtns[i].classList.toggle('active', navBtns[i].getAttribute('data-nav') === currentView);
                }

                else if (currentView === 'devices') main.innerHTML = renderDevices();
                else if (currentView === 'customers') main.innerHTML = renderCustomers();

                else if (currentView === 'reports') main.innerHTML = renderReports();
                else if (currentView === 'inventory') main.innerHTML = renderInventory();
                attachMainListeners();

                if (currentView === 'dashboard') {
                    setTimeout(function() {
                        var chartData = [];
                        for (var d = 6; d >= 0; d--) {
                            var dateObj = new Date();
                            dateObj.setDate(dateObj.getDate() - d);
                            var ds = dateObj.toISOString().slice(0, 10);

            function exportReportCSV() {
                var headers = ['التاريخ', 'الجهاز', 'الزبون', 'العطل', 'الحالة', 'السعر', 'الربح'];
                var rows = [];
                for (var i = 0; i < repairs.length; i++) {
                    var r = repairs[i];
                    var c = getCustomer(r.customerId);
                    var profit = (Number(r.finalPrice) || 0) - (Number(r.partsCost) || 0);
                    rows.push([
                        r.receivedDate || '',
                        r.deviceType || '',
                        c ? c.name : '—',
                        r.issue || '',
                        STATUS[r.status] ? STATUS[r.status].label : r.status,
                        r.finalPrice || r.expectedPrice || 0,
                        profit
                    ]);
                }
                var csv = headers.join(',') + '\n' + rows.map(function(row) {
                    return row.map(function(val) { return '"' + val + '"'; }).join(',');
                }).join('\n');

                // إضافة قسم فواتير المبيعات (بيع الأصناف) في نفس ملف التصدير
                var saleHeaders = ['التاريخ', 'نوع البيع', 'الأصناف', 'الإجمالي'];
                var saleRows = [];
                for (var si = 0; si < sales.length; si++) {
                    var s = sales[si];
                    var itemsStr = s.items.map(function(l) { return l.name + ' ×' + l.qty; }).join(' | ');
                    saleRows.push([
                        new Date(s.createdAt).toLocaleString('ar'),
                        s.saleType === 'wholesale' ? 'بيع جملة' : 'بيع داخل المحل',
                        itemsStr,
                        s.total
                    ]);
                }
                csv += '\n\n"تقرير المبيعات"\n' + saleHeaders.join(',') + '\n' + saleRows.map(function(row) {
                    return row.map(function(val) { return '"' + val + '"'; }).join(',');
                }).join('\n');

                var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
                var link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'تقرير-الصيانة-' + todayStr() + '.csv';
                link.click();
                URL.revokeObjectURL(link.href);
                toast('✅ تم تصدير التقرير');
            }

            function attachMainListeners() {
                var deviceCards = document.querySelectorAll('[data-open-device]');
                for (var i = 0; i < deviceCards.length; i++) {
                    deviceCards[i].addEventListener('click', function() {
                        openDeviceDetail(this.getAttribute('data-open-device'));
                    });
                }

                var customerAvatars = document.querySelectorAll('[data-open-customer]');
                for (var i = 0; i < customerAvatars.length; i++) {
                    customerAvatars[i].addEventListener('click', function() {
                        openCustomerDetail(this.getAttribute('data-open-customer'));
                    });
                }

                var seeAll = document.getElementById('see-all-devices');
                if (seeAll) seeAll.onclick = function() { navigate('devices'); };

                var addFirst = document.getElementById('add-first-device');
                if (addFirst) addFirst.onclick = function() { openDeviceForm(); };

                var dSearch = document.getElementById('device-search');
                if (dSearch) {
                    dSearch.oninput = function(e) {
                        deviceSearch = e.target.value;
                        renderDeviceListOnly();
                    };
                }

                var cSearch = document.getElementById('customer-search');
                if (cSearch) {
                    cSearch.oninput = function(e) {
                        customerSearch = e.target.value;
                        renderCustomerListOnly();
                    };
                }

                var filters = document.getElementById('device-filters');
                if (filters) {
                    var filterBtns = filters.querySelectorAll('[data-filter]');
                    for (var i = 0; i < filterBtns.length; i++) {
                        filterBtns[i].onclick = function() {
                            deviceFilter = this.getAttribute('data-filter');
                            renderAll();
                        };
                    }
                }

                var periodBtns = document.querySelectorAll('[data-period]');
                for (var i = 0; i < periodBtns.length; i++) {
                    periodBtns[i].onclick = function() {
                        reportPeriod = this.getAttribute('data-period');
                        renderAll();
                    };
                }

                var dashLowStock = document.getElementById('dash-low-stock');
                if (dashLowStock) dashLowStock.onclick = function() { navigate('inventory'); };

                // ===== المخزون =====
                var invSearch = document.getElementById('inventory-search');
                if (invSearch) {
                    invSearch.oninput = function(e) {
                        inventorySearch = e.target.value;
                        renderInventoryListOnly();
                    };
                }

                var invTypeFilter = document.getElementById('inventory-type-filter');
                if (invTypeFilter) {
                    invTypeFilter.onchange = function(e) {
                        inventoryTypeFilter = e.target.value;
                        renderInventoryListOnly();
                    };
                }

                var addInvBtn = document.getElementById('add-inventory-item');
                if (addInvBtn) addInvBtn.onclick = function() { openInventoryItemForm(); };

                var stocktakeBtn = document.getElementById('open-stocktake');

                    });

                var salePriceEditEls = document.querySelectorAll('.sale-price-edit');
                for (var spe = 0; spe < salePriceEditEls.length; spe++) {
                    salePriceEditEls[spe].onclick = function() {
                        openEditCartLinePrice(Number(this.getAttribute('data-idx')));
                    };
                }

                var saleQtyBtns = document.querySelectorAll('.sale-qty-btn');
                for (var sq = 0; sq < saleQtyBtns.length; sq++) {
                    saleQtyBtns[sq].onclick = function() {
                        var idx = Number(this.getAttribute('data-idx'));
                        var delta = Number(this.getAttribute('data-delta'));
                        var l = saleCart[idx];
                        if (!l) return;
                        if (delta > 0 && l.qty + 1 > l.available) { toast('🚫 لا توجد كمية كافية من "' + l.name + '"'); return; }
                        l.qty += delta;
                        if (l.qty <= 0) saleCart.splice(idx, 1);
                        refreshSalesScreenIfActive();
                    };
                }
                var saleRmBtns = document.querySelectorAll('.sale-remove-btn');
                for (var sr = 0; sr < saleRmBtns.length; sr++) {
                    saleRmBtns[sr].onclick = function() {
                        var idx = Number(this.getAttribute('data-idx'));
                        saleCart.splice(idx, 1);
                        refreshSalesScreenIfActive();
                    };
                }

                var saleClearBtn = document.getElementById('sale-clear-cart');
                if (saleClearBtn) {
                    saleClearBtn.onclick = function() {
                        if (saleCart.length === 0) return;
                        if (!confirm('⚠️ سيتم تفريغ السلة بالكامل. متابعة؟')) return;
                        saleCart = [];
                        refreshSalesScreenIfActive();
                    };
                }

                var saleCompleteBtn = document.getElementById('sale-complete');
                if (saleCompleteBtn) saleCompleteBtn.onclick = function() { requirePin(completeSale, 'إتمام عملية البيع (فاتورة جديدة)'); };

                var invEditBtns = document.querySelectorAll('[data-inv-edit]');
                for (var i = 0; i < invEditBtns.length; i++) {
                    invEditBtns[i].addEventListener('click', function() {
                        var invId = this.getAttribute('data-inv-edit');
                        requirePin(function() { openInventoryItemForm(invId); }, 'تعديل صنف في المخزون');

                }

                var invPrintBarcodeBtns = document.querySelectorAll('[data-inv-print-barcode]');
                for (var i = 0; i < invPrintBarcodeBtns.length; i++) {
                    invPrintBarcodeBtns[i].addEventListener('click', function() {
                        var it = getInventoryItem(this.getAttribute('data-inv-print-barcode'));
                        if (it) printInventoryBarcode(it);
                    });
                }

                var invDeleteBtns = document.querySelectorAll('[data-inv-delete]');
                for (var i = 0; i < invDeleteBtns.length; i++) {
                    invDeleteBtns[i].addEventListener('click', function() {
                        var id = this.getAttribute('data-inv-delete');
                        requirePin(function() {
                            var it = getInventoryItem(id);
                            if (!it) return;
                            if (confirm('هل تريد حذف "' + it.name + '" من المخزون نهائياً؟')) {
                                markDeleted('inventory', id);
                                inventory = inventory.filter(function(x) { return x.id !== id; });
                                saveInventory();
                                renderInventoryListOnly();
                                toast('🗑️ تم حذف الصنف من المخزون');
                            }
                        }, 'حذف صنف من المخزون');
                    });
                }

                var invPlusBtns = document.querySelectorAll('[data-inv-plus]');
                for (var i = 0; i < invPlusBtns.length; i++) {
                    invPlusBtns[i].addEventListener('click', function() {
                        var invId = this.getAttribute('data-inv-plus');
                        requirePin(function() {
                            adjustInventoryQty(invId, 1, true);
                            renderInventoryListOnly();
                        }, 'زيادة كمية صنف في المخزون');
                    });
                }

                var invMinusBtns = document.querySelectorAll('[data-inv-minus]');
                for (var i = 0; i < invMinusBtns.length; i++) {
                    invMinusBtns[i].addEventListener('click', function() {
                        var invId = this.getAttribute('data-inv-minus');
                        requirePin(function() {
                            adjustInventoryQty(invId, -1, false);
                            renderInventoryListOnly();
                        }, 'إنقاص كمية صنف في المخزون');
                    });
                }

                var invReturnBtns = document.querySelectorAll('[data-inv-return]');
                for (var i = 0; i < invReturnBtns.length; i++) {
                    invReturnBtns[i].addEventListener('click', function() {

                var invDamagedBtns = document.querySelectorAll('[data-inv-damaged]');
                for (var i = 0; i < invDamagedBtns.length; i++) {
                    invDamagedBtns[i].addEventListener('click', function() {
                        var invId = this.getAttribute('data-inv-damaged');

            function renderDeviceListOnly() {

                main.innerHTML = renderDevices();

                if (inp) { inp.focus(); if (caret !== null) inp.setSelectionRange(caret, caret); }

            function renderCustomerListOnly() {
                var main = document.getElementById('app-main');
                var active = document.activeElement;
                var caret = active && active.id === 'customer-search' ? active.selectionStart : null;
                main.innerHTML = renderCustomers();
                attachMainListeners();
                var inp = document.getElementById('customer-search');
                if (inp) { inp.focus(); if (caret !== null) inp.setSelectionRange(caret, caret); }

            /* ====================== SHEETS ====================== */
            function openSheet(html) {
                var root = document.getElementById('sheet-root');
                root.innerHTML = '<div class="sheet-overlay" id="sheet-overlay"><div class="sheet">' + html +
                '</div></div>';
                var ov = document.getElementById('sheet-overlay');
                requestAnimationFrame(function() { ov.classList.add('open'); });
                ov.addEventListener('click', function(e) { if (e.target === ov) closeSheet(); });
            }

            function closeSheet() {
                var ov = document.getElementById('sheet-overlay');
                if (!ov) return;
                ov.classList.remove('open');
                setTimeout(function() { document.getElementById('sheet-root').innerHTML = ''; }, 250);
            }

            /* ---------- Device Form ---------- */
            function openDeviceForm(repairId) {
                var editing = !!repairId;
                var r = editing ? repairs.find(function(x) { return x.id === repairId; }) : null;
                var c = editing ? getCustomer(r.customerId) : null;
                var status = r ? r.status : 'received';

                var html = '<div class="sheet-handle"></div><div class="sheet-head"><h3>' + (editing ?

                html +=
                    '<div class="field"><label for="f-imei">رقم IMEI / Serial</label><input type="text" id="f-imei" placeholder="رقم الجهاز التسلسلي" value="' +

                    esc(r ? r.issue : '') + '</textarea></div>';

                // ===== مدة متوقعة + قطع غيار =====
                html += '<div class="field-row">';
                html += '<div class="field"><label for="f-days">المدة المتوقعة (أيام)</label><input type="number" id="f-days" placeholder="مثال: 2" value="' +
                    (r ? (r.estimatedDays || '') : '') + '"></div>';
                html +=
                    '<div class="field"><label for="f-parts-need">القطع المطلوبة</label><input type="text" id="f-parts-need" placeholder="مثال: شاشة، بطارية" value="' +
                    esc(r ? (r.partsNeeded || '') : '') + '"></div>';
                html += '</div>';

                // ===== تاريخ + سعر =====
                html += '<div class="field-row"><div class="field"><label for="f-received">تاريخ الاستلام</label><input type="date" id="f-received" value="' +
                    (r ? r.receivedDate : todayStr()) + '"></div>';
                html +=
                    '<div class="field"><label for="f-expected">السعر المتوقع</label><input type="number" inputmode="decimal" id="f-expected" placeholder="0" value="' +
                    (r ? (r.expectedPrice || '') : '') + '"></div></div>';

                // ===== ضمان =====
                html +=
                    '<div class="field"><label for="f-warranty">مدة الضمان (أيام)</label><input type="number" id="f-warranty" placeholder="مثال: 30" value="' +

                // ===== ملاحظات =====
                html +=
                    '<div class="field"><label for="f-notes">ملاحظات</label><textarea id="f-notes" placeholder="أي تفاصيل إضافية">' +
                    esc(r ? r.notes : '') + '</textarea></div>';

                // ===== فني + تاريخ الوعد =====
                html += '<div class="field-row">';
                html += '<div class="field"><label for="f-tech">👨‍🔧 الفني المسؤول</label><input type="text" id="f-tech" placeholder="اسم الفني" list="tech-list" value="' + esc(r ? (r.technician || '') : '') + '"><datalist id="tech-list">' + (settings.technicians || ['أبو أحمد','محمد','خالد']).map(function(t){ return '<option value="' + esc(t) + '">'; }).join('') + '</datalist></div>';
                html += '<div class="field"><label for="f-promise">📅 تاريخ الوعد</label><input type="date" id="f-promise" value="' + esc(r ? (r.promiseDate || '') : '') + '"></div>';
                html += '</div>';
                html += '<div class="field"><label for="f-internal">🔒 ملاحظة داخلية</label><textarea id="f-internal" placeholder="ملاحظات للفني فقط، لا تظهر للزبون" style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;color:var(--text);font-size:13px;resize:vertical;min-height:44px">' + esc(r ? (r.internalNote || '') : '') + '</textarea></div>';

                // ===== صورة =====
                html +=
                    '<div class="field"><label for="f-image">صورة الجهاز</label><input type="file" id="f-image" accept="image/*"></div>';
                if (r && r.image) html +=
                    '<div style="margin-top:6px"><img src="' + r.image +
                    '" style="max-width:80px;max-height:80px;border-radius:8px;border:1px solid var(--border)"></div>';

                // ===== تثبيت =====
                html +=
                    '<div class="field" style="display:flex;align-items:center;gap:10px;margin-top:4px"><label style="margin:0;cursor:pointer"><input type="checkbox" id="f-pinned" ' +
                    (r && r.pinned ? 'checked' : '') + '> 📌 تثبيت الجهاز في أعلى القائمة</label></div>';

                // ===== الحالة =====
                html += '<div class="divider"></div>';
                html += '<span class="sub-label">📊 حالة الصيانة</span>';
                html += '<div class="status-chips" id="status-chips" role="radiogroup">';
                for (var i = 0; i < STATUS_ORDER.length; i++) {
                    var s = STATUS_ORDER[i];
                    var sel = status === s;
                    var style = sel ? 'background:' + STATUS[s].color + ';border-color:' + STATUS[s].color : '';
                    html += '<button type="button" class="status-chip ' + (sel ? 'sel' : '') + '" data-status="' + s +
                        '" role="radio" style="' + style + '">' + STATUS[s].label + '</button>';
                }
                html += '</div>';

                var custForDiscount = c || (editing ? null : null);
                var prevDelivered = 0;
                if (custForDiscount) {
                    for (var vi = 0; vi < repairs.length; vi++) {
                        if (repairs[vi].customerId === custForDiscount.id && repairs[vi].status === 'delivered' && (!
                                editing || repairs[vi].id !== repairId)) prevDelivered++;
                    }
                }
                var tier = getLoyaltyTier(prevDelivered);
                var loyaltyDiscount = tier.discount || 0;
                var loyaltyBanner = tier.minVisits > 0 ?
                    '<div style="background:rgba(61,220,132,.1);border:1px solid rgba(61,220,132,.3);border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12.5px;color:var(--accent-2);display:flex;align-items:center;gap:8px"><span style="font-size:16px">' +
                    tier.emoji + '</span><span>عميل <b>' + tier.label + '</b>! لديه <b>' + prevDelivered +

                    (prevDelivered >= 2 ?
                        '<div style="background:rgba(91,141,239,.08);border:1px solid rgba(91,141,239,.25);border-radius:10px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:var(--accent-3)">⭐ ' +
                        prevDelivered + ' زيارة — بعد ' + (LOYALTY_TIERS[1].minVisits - prevDelivered) +

                        '');

                html += '<div id="delivery-fields" style="display:' + (status === 'delivered' ? 'block' : 'none') +
                    '; margin-top:14px">';
                html += loyaltyBanner;
                html += '<div class="field-row"><div class="field"><label for="f-final">السعر قبل الخصم</label><input type="number" inputmode="decimal" id="f-final" placeholder="0" value="' +
                    (r ? (r.priceBeforeDiscount || r.finalPrice || '') : '') + '" oninput="calcFinalPrice()"></div>';
                html +=
                    '<div class="field"><label for="f-discount">الخصم %</label><input type="number" inputmode="decimal" id="f-discount" placeholder="0" min="0" max="100" value="' +
                    (r ? (r.discountPct !== undefined ? r.discountPct : loyaltyDiscount) : loyaltyDiscount) +
                    '" oninput="calcFinalPrice()" style="border-color:' + (loyaltyDiscount > 0 ?
                        'var(--accent-2)' : '') + '"></div></div>';
                html +=
                    '<div class="field"><label for="f-final-calc" style="display:flex;justify-content:space-between"><span>السعر النهائي</span><span id="discount-preview" style="color:var(--accent-2);font-size:11px"></span></label>';
                html +=
                    '<input type="number" inputmode="decimal" id="f-final-calc" placeholder="0" value="' + (r ? (r
                        .finalPrice || '') : '') +
                    '" style="border-color:var(--accent-2);font-weight:800"></div>';
                html +=
                    '<div class="field"><label for="f-parts">تكلفة القطع</label><input type="number" inputmode="decimal" id="f-parts" value="' +

                html += '<div class="field"><label for="f-delivered">تاريخ التسليم</label><input type="date" id="f-delivered" value="' +

                var selectedStatus = status;

                for (var i = 0; i < statusChips.length; i++) {

                        selectedStatus = this.getAttribute('data-status');

                        for (var j = 0; j < chips.length; j++) {
                            var s2 = chips[j].getAttribute('data-status');
                            var sel2 = s2 === selectedStatus;
                            chips[j].classList.toggle('sel', sel2);
                            chips[j].setAttribute('aria-checked', sel2 ? 'true' : 'false');

                            chips[j].style.borderColor = sel2 ? STATUS[s2].color : '';

                            if (fd && !fd.value) fd.value = todayStr();
                            var ff = document.getElementById('f-final');
                            var fe = document.getElementById('f-expected');
                            if (ff && !ff.value && fe && fe.value) { ff.value = fe.value; }

                            var phoneVal = (document.getElementById('f-cphone') || { value: '' }).value.trim();
                            var cFound = findCustomerByPhone(phoneVal);
                            if (cFound) {
                                var cnt = getDeliveredCount(cFound.id, editing ? repairId : null);
                                var tier2 = getLoyaltyTier(cnt);
                                var discEl2 = document.getElementById('f-discount');

                if (editing) {

                            renderAll();

                document.getElementById('device-form').onsubmit = function(e) {
                    e.preventDefault();
                    if (isSubmitting) return;
                    isSubmitting = true;
                    var submitBtn = document.getElementById('device-submit');
                    if (submitBtn) submitBtn.disabled = true;

                    var name = document.getElementById('f-cname').value.trim();
                    var phone = document.getElementById('f-cphone').value.trim();
                    var deviceType = document.getElementById('f-device').value.trim();
                    var imei = document.getElementById('f-imei').value.trim();
                    var issue = document.getElementById('f-issue').value.trim();
                    var receivedDate = document.getElementById('f-received').value || todayStr();
                    var expectedPrice = Number(document.getElementById('f-expected').value) || 0;
                    var notes = document.getElementById('f-notes').value.trim();
                    var estimatedDays = Number(document.getElementById('f-days').value) || 0;
                    var partsNeeded = document.getElementById('f-parts-need').value.trim();
                    var warrantyDays = Number(document.getElementById('f-warranty').value) || 0;
                    var pinned = document.getElementById('f-pinned').checked;

                    if (!name || !phone || !deviceType || !issue) {
                        toast('الرجاء ملء جميع الحقول المطلوبة (*)');
                        isSubmitting = false;
                        if (submitBtn) submitBtn.disabled = false;
                        return;
                    }
                    if (!validatePhone(phone)) {
                        toast('رقم الهاتف غير صحيح (7-12 أرقام)');
                        isSubmitting = false;
                        if (submitBtn) submitBtn.disabled = false;
                        return;
                    }

                    var fileInput = document.getElementById('f-image');
                    var imageData = r ? r.image : null;

                    function saveDeviceData() {
                        var cust = findCustomerByPhone(phone);
                        if (!cust) {
                            cust = { id: uid(), name: name, phone: phone, createdAt: Date.now() };
                            customers.push(cust);
                            saveCustomers();
                        } else {
                            cust.name = name;
                            saveCustomers();
                        }

                        var finalPrice = null,
                            partsCost = 0,
                            deliveredDate = null,
                            priceBeforeDiscount = null,
                            discountPct = 0;
                        if (selectedStatus === 'delivered') {
                            priceBeforeDiscount = Number(document.getElementById('f-final').value) || 0;
                            discountPct = Number(document.getElementById('f-discount').value) || 0;
                            finalPrice = Number(document.getElementById('f-final-calc').value);
                            if (isNaN(finalPrice) || finalPrice < 0) finalPrice = priceBeforeDiscount;
                            partsCost = Number(document.getElementById('f-parts').value) || 0;
                            deliveredDate = document.getElementById('f-delivered').value || todayStr();
                        }

                        var newRepairId = null;
                        var oldStatus = editing ? r.status : null;
                        if (editing) {
                            r.customerId = cust.id;
                            r.deviceType = deviceType;
                            r.imei = imei;
                            r.issue = issue;
                            r.receivedDate = receivedDate;
                            r.expectedPrice = expectedPrice;
                            r.notes = notes;

                        issueDisplay.style.display = '';
                        toast('✅ تم تحديث العطل');
                    };
                }

                // ===== تعديل الحقول المباشرة =====
                function makeInlineEdit(displayId, editRowId, inputId, saveId, cancelId, onSave) {
                    var dispEl = document.getElementById(displayId);
                    var rowEl = document.getElementById(editRowId);
                    if (!dispEl || !rowEl) return;

                    var newDisp = dispEl.cloneNode(true);
                    dispEl.parentNode.replaceChild(newDisp, dispEl);
                    dispEl = newDisp;

                    dispEl.onclick = function() {
                        dispEl.style.display = 'none';
                        rowEl.style.display = 'block';
                        var inp = document.getElementById(inputId);
                        if (inp) inp.focus();
                    };

                    var cancelBtn = document.getElementById(cancelId);
                    if (cancelBtn) {
                        var newCancel = cancelBtn.cloneNode(true);
                        cancelBtn.parentNode.replaceChild(newCancel, cancelBtn);
                        cancelBtn = newCancel;
                        cancelBtn.onclick = function() {
                            rowEl.style.display = 'none';
                            dispEl.style.display = '';
                        };
                    }

                    var saveBtn = document.getElementById(saveId);
                    if (saveBtn) {
                        var newSave = saveBtn.cloneNode(true);
                        saveBtn.parentNode.replaceChild(newSave, saveBtn);
                        saveBtn = newSave;
                        saveBtn.onclick = function() {
                            onSave();
                            rowEl.style.display = 'none';
                            dispEl.style.display = '';
                        };
                    }
                }

                if (r.status === 'delivered') {
                    makeInlineEdit('ddate-display', 'ddate-edit-row', 'ddate-inline', 'ddate-save', 'ddate-cancel',
                    function() {
                        var val = document.getElementById('ddate-inline').value;
                        if (val) {
                            r.deliveredDate = val;
                            saveRepairs();
                            var disp = document.getElementById('ddate-display');
                            if (disp) disp.textContent = fmtDate(r.deliveredDate) + ' ✏️';
                            toast('✅ تم تحديث تاريخ التسليم');
                        }
                    });

                    // ===== تعديل السعر =====
                    var fpDisp = document.getElementById('fprice-display');
                    var fpRow = document.getElementById('fprice-edit-row');
                    if (fpDisp && fpRow) {
                        var newFpDisp = fpDisp.cloneNode(true);
                        fpDisp.parentNode.replaceChild(newFpDisp, fpDisp);
                        fpDisp = newFpDisp;

                        fpDisp.onclick = function() {
                            fpDisp.style.display = 'none';
                            fpRow.style.display = 'block';
                            calcDetailPrice();
                        };

                        var fpCancel = document.getElementById('fprice-cancel');
                        if (fpCancel) {
                            var newFpCancel = fpCancel.cloneNode(true);
                            fpCancel.parentNode.replaceChild(newFpCancel, fpCancel);
                            fpCancel = newFpCancel;
                            fpCancel.onclick = function() {
                                fpRow.style.display = 'none';
                                fpDisp.style.display = '';
                            };
                        }

                        var fpSave = document.getElementById('fprice-save');
                        if (fpSave) {
                            var newFpSave = fpSave.cloneNode(true);
                            fpSave.parentNode.replaceChild(newFpSave, fpSave);
                            fpSave = newFpSave;
                            fpSave.onclick = function() {
                                var baseVal = parseFloat(document.getElementById('fprice-base').value) || 0;
                                var discPct = Math.min(100, Math.max(0, parseFloat(document.getElementById(
                                    'fprice-disc').value) || 0));
                                var finalVal = parseFloat(document.getElementById('fprice-inline').value) || 0;
                                r.priceBeforeDiscount = baseVal;
                                r.discountPct = discPct;
                                r.finalPrice = finalVal;
                                saveRepairs();
                                fpRow.style.display = 'none';
                                fpDisp.style.display = '';
                                fpDisp.textContent = money(finalVal) + ' ✏️';
                                var profEl = document.getElementById('profit-display');
                                if (profEl) profEl.textContent = money(finalVal - (Number(r.partsCost) || 0));
                                toast('✅ تم تحديث السعر' + (discPct > 0 ? ' بخصم ' + discPct + '%' : ''));
                            };
                        }
                    }

                    makeInlineEdit('parts-display', 'parts-edit-row', 'parts-inline', 'parts-save', 'parts-cancel',
                    function() {
                        var val = parseFloat(document.getElementById('parts-inline').value) || 0;
                        r.partsCost = val;
                        saveRepairs();
                        var disp = document.getElementById('parts-display');
                        if (disp) disp.textContent = money(r.partsCost) + ' ✏️';
                        var profEl = document.getElementById('profit-display');
                        if (profEl) profEl.textContent = money((Number(r.finalPrice) || 0) - (Number(r.partsCost) ||
                            0));
                        toast('✅ تم تحديث تكلفة القطع');
                    });
                }

                // ===== تعديل السعر المتوقع (للأجهزة غير المسلّمة) =====
                if (r.status !== 'delivered') {
                    var epDisp = document.getElementById('eprice-display');
                    var epRow = document.getElementById('eprice-edit-row');
                    if (epDisp && epRow) {
                        epDisp.onclick = function() {
                            epDisp.style.display = 'none';
                            epRow.style.display = 'block';
                            var inp = document.getElementById('eprice-inline');
                            if (inp) inp.focus();
                        };
                        var epCancel = document.getElementById('eprice-cancel');
                        if (epCancel) {
                            epCancel.onclick = function() {
                                epRow.style.display = 'none';
                                epDisp.style.display = '';
                            };
                        }
                        var epSave = document.getElementById('eprice-save');
                        if (epSave) {
                            epSave.onclick = function() {
                                var val = parseFloat(document.getElementById('eprice-inline').value) || 0;
                                r.expectedPrice = val;
                                saveRepairs();
                                epRow.style.display = 'none';
                                epDisp.style.display = '';
                                epDisp.textContent = money(val) + ' ✏️';
                                toast('✅ تم تحديث السعر المتوقع');
                            };
                        }
                    }
                }

                // ===== أزرار تغيير الحالة =====
                var statusActions = {
                    'wa-received': 'received',
                    'wa-progress': 'in_progress',
                    'wa-waiting': 'waiting_parts',
                    'wa-ready': 'ready',
                    'wa-delivered': 'delivered'
                };

                for (var key in statusActions) {
                    (function(key, statusVal) {
                        var btn = document.getElementById(key);
                        if (btn) {
                            var newBtn = btn.cloneNode(true);
                            btn.parentNode.replaceChild(newBtn, btn);
                            btn = newBtn;
                            btn.onclick = function() {
                                var label = STATUS[statusVal] ? STATUS[statusVal].label : statusVal;
                                if (confirm('تأكيد تغيير الحالة إلى "' + label + '"؟')) {
                                    r.status = statusVal;
                                    if (statusVal === 'delivered') {
                                        r.deliveredDate = todayStr();
                                        r.finalPrice = r.expectedPrice || 0;
                                    }
                                    saveRepairs();
                                    toast('✅ تم تحديث الحالة إلى ' + label);
                                    if (statusVal === 'ready') {
                                        var notifC = getCustomer(r.customerId);
                                        sendNativeNotification(
                                            '📱 جهاز جاهز للتسليم',
                                            (r.deviceType || 'جهاز') + ' — ' + (notifC ? notifC.name : ''),
                                            r.id
                                        );
                                    }
                                    closeSheet();
                                    renderAll();
                                    setTimeout(function() {
                                        sendStatusWhatsApp(repairId, statusVal);
                                    }, 300);
                                }
                            };
                        }
                    })(key, statusActions[key]);
                }

                // ===== ربط زر التعديل الكامل (بعد كل عمليات cloneNode) =====
                var editBtn = document.getElementById('device-edit');
                if (editBtn) {
                    var newEditBtn = editBtn.cloneNode(true);
                    editBtn.parentNode.replaceChild(newEditBtn, editBtn);
                    newEditBtn.onclick = function() {
                        closeSheet();
                        setTimeout(function() { openDeviceForm(repairId); }, 200);
                    };
                }
            }
