                        printLabelViaUSB(item, size);
                    };
                }

                loadJsBarcodeLib(function() {
                    try {
                        JsBarcode('#barcode-label-svg', item.barcode, {
                            format: 'CODE128',
                            lineColor: '#000000',
                            width: 2,
                            height: 50,
                            fontSize: 12,
                            margin: 6
                        });
                    } catch (e) {
                        toast('⚠️ تعذّر إنشاء الباركود، تحقق من صيغة الرمز');
                    }
                });

                document.getElementById('print-barcode-label').onclick = function() {
                    var sizeKey = document.getElementById('barcode-label-size').value;
                    var rotate = document.getElementById('barcode-label-rotate').checked;
                    localStorage.setItem('barcodeLabelSize', sizeKey);
                    localStorage.setItem('barcodeLabelRotate180', rotate ? '1' : '0');

                    var size = BARCODE_LABEL_SIZES.filter(function(s) { return s.key === sizeKey; })[0] || BARCODE_LABEL_SIZES[0];
                    var content = document.getElementById('barcode-label-content');
                    if (content) content.style.transform = rotate ? 'rotate(180deg)' : '';

                    // نلغي حواف/عرض نافذة الـ sheet وقت الطباعة فقط، ونجعل عرض الملصق يملأ الورقة الفعلية
                    // بالكامل بدل عرض ثابت (280px) كان يتسبب بقص جزء من الباركود على المقاسات الصغيرة
                    var extraCss = '#print-body-wrap, .sheet-overlay, .sheet { padding: 0 !important; margin: 0 !important; width: 100% !important; }' +
                        '#barcode-label-content { width: 100% !important; max-width: 100% !important; box-sizing: border-box !important; padding: 1mm !important; }' +
                        '#barcode-label-svg { width: 100% !important; height: auto !important; }';

                    // "80mm auto" ليست قيمة CSS صحيحة لخاصية @page size (لا يمكن دمج قياس ثابت مع
                    // الكلمة auto)، فيتجاهل المتصفح الحجم المخصص بالكامل ويطبع على مقاس الصفحة
                    // الافتراضي (A4/Letter عمودي) — وهذا هو سبب ظهور الملصق "طويلاً" عند الطباعة.
                    // الحل: نحسب الارتفاع الفعلي للملصق بالمليمتر من حجمه المعروض ونستخدمه بدل auto.
                    var heightCss = size.h;
                    if (heightCss === 'auto' && content) {
                        var pxHeight = content.getBoundingClientRect().height;
                        var mmHeight = Math.ceil((pxHeight / 96) * 25.4) + 4; // + هامش أمان بسيط
                        heightCss = mmHeight + 'mm';
                    }
                    withPrintPageSize(size.w + ' ' + heightCss, function() { window.print(); }, extraCss);
                };
            }

            /* ====================== طباعة مباشرة عبر USB (بدون نافذة طباعة المتصفح) ======================
               تستخدم WebUSB لإرسال أوامر TSPL خام مباشرة لطابعة الملصقات (مثل Xprinter XP-365B)
               بدون المرور بنافذة طباعة كروم/بريف نهائياً - هيك ما في اعتماد على مقاس الورق أو
               الهوامش أو "Fit to page" أو أي إعداد تاني بالمتصفح.
               ملاحظة مهمة (مرة واحدة فقط لكل جهاز): الطابعة لازم يكون تعريفها بويندوز مبدّل
               إلى WinUSB/libusbK عبر برنامج Zadig المجاني، لأن الويب لا يقدر يوصل مباشرة لجهاز
               USB لسا مرتبط بتعريف طابعة عادي. بعد التبديل مرة وحدة، الطباعة المباشرة رح تشتغل
               دايماً بدون أي نافذة أو إعدادات إضافية. */
            var usbPrinterDevice = null;
            var usbPrinterEndpoint = null;
            var usbPrinterInterface = null;

            function isUsbPrintSupported() {
                return !!(navigator.usb);
            }

            function setUsbStatus(text) {
                var el = document.getElementById('usb-printer-status');
                if (el) el.textContent = text;
            }

            // يحاول إعادة الاتصال بصمت بطابعة سبق وتم منح إذن الوصول لها (بدون نافذة اختيار جهاز)
            function tryAutoReconnectUsbPrinter() {
                if (!navigator.usb) return;
                navigator.usb.getDevices().then(function(devices) {
                    if (devices && devices.length > 0) {
                        openUsbDevice(devices[0]).catch(function() { usbPrinterDevice = null; });
                    }
                }).catch(function() {});
            }

            async function openUsbDevice(device) {
                await device.open();
                if (device.configuration === null) {
                    await device.selectConfiguration(1);
                }
                var iface = null;
                var epNumber = null;
                for (var c = 0; c < device.configuration.interfaces.length; c++) {
                    var alt = device.configuration.interfaces[c].alternates[0];
                    var outEp = alt.endpoints.filter(function(e) { return e.direction === 'out'; })[0];
                    if (outEp) {
                        iface = device.configuration.interfaces[c].interfaceNumber;
                        epNumber = outEp.endpointNumber;
                        break;
                    }
                }
                if (iface === null || epNumber === null) {
                    throw new Error('لم يتم العثور على منفذ إخراج (endpoint) على الطابعة');
                }
                await device.claimInterface(iface);
                usbPrinterDevice = device;
                usbPrinterEndpoint = epNumber;
                usbPrinterInterface = iface;
                device.addEventListener('disconnect', function() {
                    usbPrinterDevice = null;
                    usbPrinterEndpoint = null;
                    setUsbStatus('⚪ انقطع الاتصال بالطابعة، اضغط "طباعة مباشرة" لإعادة التوصيل');
                });
                return device;
            }

            async function connectUsbPrinter() {
                if (!navigator.usb) {
                    toast('⚠️ متصفحك لا يدعم WebUSB (استخدم كروم أو بريف على كمبيوتر)');
                    return null;
                }
                try {
                    var device = await navigator.usb.requestDevice({ filters: [] });
                    await openUsbDevice(device);
                    return device;
                } catch (e) {
                    if (e && e.name === 'NotFoundError') {
                        // المستخدم أغلق نافذة اختيار الجهاز
                        return null;
                    }
                    toast('⚠️ تعذّر الاتصال بالطابعة عبر USB: ' + (e && e.message ? e.message : 'خطأ غير معروف'));
                    return null;
                }
            }

            async function ensureUsbPrinter() {
                if (usbPrinterDevice && usbPrinterDevice.opened) return usbPrinterDevice;
                setUsbStatus('⏳ جارٍ الاتصال بالطابعة...');
                var device = await connectUsbPrinter();
                if (device) setUsbStatus('🟢 الطابعة متصلة');
                else setUsbStatus('⚪ لم يتم توصيل الطابعة');
                return device;
            }

            // يبني أوامر TSPL خام لطباعة ملصق باركود (اسم الصنف + باركود CODE128 + السعر)
            function buildTsplLabel(item, size) {
                var widthMm = parseFloat(size.w) || 50;
                var heightMm = (size.h === 'auto') ? 40 : (parseFloat(size.h) || 30);
                // تحويل المليمتر لنقاط (dots) بدقة 203dpi (الشائعة بطابعات XP-365B): 1mm ≈ 8 dots
                var dotsPerMm = 8;
                var wDots = Math.round(widthMm * dotsPerMm);
                var name = String(item.name || '').replace(/"/g, "'").slice(0, 40);
                var code = String(item.barcode || '');
                var priceText = item.price ? money(item.price).replace(/"/g, "'") : '';

                var cmds = [];
                cmds.push('SIZE ' + widthMm + ' mm,' + heightMm + ' mm');
                cmds.push('GAP 2 mm,0 mm');
                cmds.push('DIRECTION 1');
                cmds.push('REFERENCE 0,0');
                cmds.push('CLS');
                cmds.push('TEXT 8,8,"3",0,1,1,"' + name + '"');
                cmds.push('BARCODE 8,32,"128",50,1,0,2,2,"' + code + '"');
                if (priceText) {
                    cmds.push('TEXT 8,' + (heightMm * dotsPerMm - 24) + ',"3",0,1,1,"' + priceText + '"');
                }
                cmds.push('PRINT 1,1');
                return cmds.join('\r\n') + '\r\n';
            }

            async function printLabelViaUSB(item, size) {
                if (!item || !item.barcode) { toast('⚠️ لا يوجد باركود لهذا الصنف'); return; }
                var device = await ensureUsbPrinter();
                if (!device) return;
                try {
                    var tspl = buildTsplLabel(item, size);
                    var data = new TextEncoder().encode(tspl);
                    var result = await device.transferOut(usbPrinterEndpoint, data);
                    if (result && result.status === 'ok') {
                        toast('✅ تم إرسال الملصق للطابعة مباشرة');
                    } else {
                        toast('⚠️ لم تكتمل عملية الإرسال للطابعة، حاول مجدداً');
                    }
                } catch (e) {
                    usbPrinterDevice = null;
                    usbPrinterEndpoint = null;
                    setUsbStatus('⚪ فشل الإرسال، اضغط لإعادة المحاولة');
                    toast('⚠️ خطأ أثناء الطباعة عبر USB: ' + (e && e.message ? e.message : 'خطأ غير معروف'));
                }
            }

            /* ====================== BARCODE SCANNER (CAMERA) ====================== */
            var barcodeLibLoading = false;
            var activeScanner = null;

            function loadBarcodeLib(cb) {
                if (window.Html5Qrcode) { cb(); return; }
                if (barcodeLibLoading) {
                    var waitTimer = setInterval(function() {
                        if (window.Html5Qrcode) { clearInterval(waitTimer); cb(); }
                    }, 150);
                    return;
                }
                barcodeLibLoading = true;
                var s = document.createElement('script');
                s.src = 'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';
                s.onload = function() { barcodeLibLoading = false; cb(); };
                s.onerror = function() {
                    barcodeLibLoading = false;
                    toast('⚠️ تعذّر تحميل مكتبة الباركود، تحقق من اتصال الإنترنت');
                };
                document.head.appendChild(s);
            }

            // يفتح شاشة كاميرا كاملة فوق أي واجهة مفتوحة (بدون التأثير على sheet الحالي)
            // onDetected(code) تُستدعى عند كل قراءة ناجحة. القارئ يبقى يعمل حتى يُستدعى closeBarcodeOverlay أو يُوقفه المستدعي.
            function showBarcodeErrorOverlay(title, message) {
                var overlay = document.getElementById('barcode-overlay');
                if (!overlay) {
                    overlay = document.createElement('div');
                    overlay.id = 'barcode-overlay';
                    overlay.style.cssText = 'position:fixed;inset:0;z-index:500;background:#000;display:flex;flex-direction:column';
                    document.body.appendChild(overlay);
                }
                overlay.innerHTML =
                    '<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#0c0f14;border-bottom:1px solid #222">' +
                    '<h3 style="color:#fff;font-size:15px;margin:0;font-family:inherit">📷 مسح الباركود</h3>' +
                    '<button id="barcode-overlay-close" style="background:none;border:none;color:#fff;font-size:24px;line-height:1;cursor:pointer;padding:4px 8px">×</button>' +
                    '</div>' +
                    '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center">' +
                    '<div style="font-size:40px;margin-bottom:14px">⚠️</div>' +
                    '<div style="color:#fff;font-size:16px;font-weight:800;margin-bottom:10px">' + esc(title) + '</div>' +
                    '<div style="color:#9aa3b2;font-size:13.5px;line-height:1.9;max-width:340px">' + message + '</div>' +
                    '</div>' +
                    '<div style="padding:14px 16px;background:#0c0f14;border-top:1px solid #222">' +
                    '<button id="barcode-error-close" class="btn btn-primary" style="width:100%">حسناً</button>' +
                    '</div>';
                var close = function() {
                    var ov = document.getElementById('barcode-overlay');
                    if (ov) ov.remove();
                };
                document.getElementById('barcode-overlay-close').onclick = close;
                document.getElementById('barcode-error-close').onclick = close;
            }

            function isLocalFileContext() {
                // كل من file:// وcontent:// (فتح الملف من تطبيق الملفات/دواونلود مباشرة على أندرويد) تُعتبر سياق محلي غير آمن للكاميرا
                return location.protocol === 'file:' || location.protocol === 'content:' || !window.isSecureContext;
            }

            function friendlyCameraError(err) {
                var name = (err && err.name) || '';
                var msg = String(err || '');
                if (isLocalFileContext()) {
                    return 'الكاميرا لا تعمل عند فتح الملف مباشرة على الجهاز (سواء من رابط file:// أو من تطبيق الملفات/دواونلود عبر content://) — المتصفح يمنعها لأسباب أمنية.<br><br>✅ الحل: افتح التطبيق عبر رابط الاستضافة (https://) بدل فتح الملف مباشرة، مثل رابط GitHub Pages الذي رفعت عليه الموقع، ثم أعد المحاولة.';
                }
                if (name === 'NotAllowedError' || msg.indexOf('Permission') !== -1) {
                    return 'تم رفض إذن الوصول للكاميرا. افتح إعدادات الموقع في المتصفح (أيقونة القفل 🔒 بجانب الرابط) واسمح بالكاميرا، ثم أعد فتح الماسح.';
                }
                if (name === 'NotFoundError' || name === 'OverconstrainedError') {
                    return 'لم يتم العثور على كاميرا مناسبة في هذا الجهاز.';
                }
                if (name === 'NotReadableError') {
                    return 'الكاميرا مستخدمة حالياً من تطبيق آخر. أغلق أي تطبيق يستخدم الكاميرا وحاول مجدداً.';
                }
                if (!window.isSecureContext) {
                    return 'الكاميرا تحتاج اتصال آمن (HTTPS). تأكد من فتح التطبيق عبر رابط https وليس رابط عادي (http) أو ملف محلي.';
                }
                if (name === 'TimeoutError') {
                    return 'الكاميرا لم تبدأ خلال وقت معقول. أغلق أي تطبيق آخر يستخدم الكاميرا، وتأكد أن التطبيق مفتوح عبر رابط https:// وليس ملفاً محلياً، ثم حاول مجدداً.';
                }
                return 'تعذّر تشغيل الكاميرا لسبب غير معروف. تأكد من أن المتصفح محدّث (Chrome أو Safari) وأن إذن الكاميرا مفعّل لهذا الموقع.';
            }

            function openBarcodeOverlay(title, onDetected) {
                if (isLocalFileContext()) {
                    showBarcodeErrorOverlay('لا يمكن فتح الكاميرا', friendlyCameraError(null));
                    return;
                }
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    showBarcodeErrorOverlay('المتصفح لا يدعم الكاميرا', 'جرّب فتح التطبيق من متصفح Chrome أو Safari محدّث.');
                    return;
                }
                loadBarcodeLib(function() {
                    if (!window.Html5Qrcode) {
                        showBarcodeErrorOverlay('تعذّر تحميل مكتبة الباركود', 'تحقق من اتصال الإنترنت وحاول مجدداً.');
                        return;
                    }
                    if (document.getElementById('barcode-overlay')) return;
                    var overlay = document.createElement('div');
                    overlay.id = 'barcode-overlay';
                    overlay.style.cssText =
                        'position:fixed;inset:0;z-index:500;background:#000;display:flex;flex-direction:column';
                    overlay.innerHTML =
                        '<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#0c0f14;border-bottom:1px solid #222">' +
                        '<h3 style="color:#fff;font-size:15px;margin:0;font-family:inherit">📷 ' + esc(title) + '</h3>' +
                        '<button id="barcode-overlay-close" style="background:none;border:none;color:#fff;font-size:24px;line-height:1;cursor:pointer;padding:4px 8px">×</button>' +
                        '</div>' +
                        '<div id="barcode-reader" style="flex:1;min-height:260px"></div>' +
                        '<div id="barcode-hint" style="padding:12px 16px;background:#0c0f14;color:#9aa3b2;font-size:12.5px;text-align:center;border-top:1px solid #222">⏳ جارٍ تشغيل الكاميرا...</div>' +
                        '<div id="barcode-result-panel"></div>';
                    document.body.appendChild(overlay);

                    document.getElementById('barcode-overlay-close').onclick = function() { closeBarcodeOverlay(); };

                    var config = {
                        fps: 10,
                        qrbox: function(vw, vh) {
                            var w = Math.min(vw, vh) * 0.82;
                            return { width: Math.round(w), height: Math.round(w * 0.5) };
                        }
                    };
                    if (window.Html5QrcodeSupportedFormats) {
                        config.formatsToSupport = [
                            Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.EAN_8,
                            Html5QrcodeSupportedFormats.UPC_A, Html5QrcodeSupportedFormats.UPC_E,
                            Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.CODE_39,
                            Html5QrcodeSupportedFormats.CODABAR, Html5QrcodeSupportedFormats.ITF,
                            Html5QrcodeSupportedFormats.QR_CODE
                        ];
                    }

                    activeScanner = new Html5Qrcode('barcode-reader');

                    var onScanSuccess = function(decodedText) {
                        if (navigator.vibrate) navigator.vibrate(80);
                        onDetected(decodedText);
                    };
                    var onScanFail = function() { /* تجاهل أخطاء المسح لكل إطار */ };

                    var scanStarted = false;
                    // حارس زمني: إن لم تبدأ الكاميرا فعلياً خلال 9 ثوانٍ (تعليق صامت بدل خطأ صريح)، نعرض رسالة بدل شاشة سوداء دائمة
                    var startWatchdog = setTimeout(function() {
                        if (!scanStarted) {
                            fatalError({ name: 'TimeoutError' });
                        }
                    }, 9000);

                    function markReady() {
                        scanStarted = true;
                        clearTimeout(startWatchdog);
                        var hint = document.getElementById('barcode-hint');
                        if (hint) hint.textContent = 'وجّه الكاميرا نحو الباركود — سيتم الالتقاط تلقائياً';
                    }

                    function fatalError(err) {
                        clearTimeout(startWatchdog);
                        closeBarcodeOverlay();
                        showBarcodeErrorOverlay('تعذّر تشغيل الكاميرا', friendlyCameraError(err));
                    }

                    // محاولة أولى: الكاميرا الخلفية
                    activeScanner.start({ facingMode: 'environment' }, config, onScanSuccess, onScanFail)
                        .then(markReady)
                        .catch(function(err1) {
                            // محاولة ثانية: أي كاميرا متاحة (مفيد لأجهزة/متصفحات لا تدعم قيد facingMode)
                            Html5Qrcode.getCameras().then(function(devices) {
                                if (!devices || !devices.length) { fatalError(err1); return; }
                                var camId = devices[devices.length - 1].id;
                                activeScanner.start(camId, config, onScanSuccess, onScanFail)
                                    .then(markReady)
                                    .catch(function(err2) { fatalError(err2); });
                            }).catch(function() { fatalError(err1); });
                        });
                });
            }

            function pauseBarcodeOverlay() { if (activeScanner) { try { activeScanner.pause(true); } catch(e) {} } }
            function resumeBarcodeOverlay() { if (activeScanner) { try { activeScanner.resume(); } catch(e) {} } }

            function closeBarcodeOverlay() {
                var overlay = document.getElementById('barcode-overlay');
                if (activeScanner) {
                    var sc = activeScanner;
                    activeScanner = null;
                    sc.stop().then(function() {
                        try { sc.clear(); } catch(e) {}
                        if (overlay) overlay.remove();
                    }).catch(function() { if (overlay) overlay.remove(); });
                } else if (overlay) {
                    overlay.remove();
                }
            }

            function findInventoryByBarcode(code) {
                var c = String(code).trim();
                for (var i = 0; i < inventory.length; i++) {
                    if (inventory[i].barcode && String(inventory[i].barcode).trim() === c) return inventory[i];
                }
                return null;
            }

            // يولّد رقم باركود داخلي فريد (بادئة 20 = نطاق الاستخدام الداخلي حسب معايير GS1)
            // ويتأكد أنه غير مستخدم لأي صنف آخر بالمخزون قبل إرجاعه
            function generateUniqueBarcode() {
                var code, attempts = 0;
                do {
                    code = '20' + String(Date.now()).slice(-7) + String(Math.floor(Math.random() * 100)).padStart(2, '0');
                    attempts++;
                } while (findInventoryByBarcode(code) && attempts < 20);
                return code;
            }

            // مسح سريع لمرة واحدة لتعبئة حقل (رقم باركود) ثم إغلاق الكاميرا تلقائياً
            function scanOnceInto(callback) {
                var handled = false;
                openBarcodeOverlay('مسح الباركود', function(code) {
                    if (handled) return;
                    handled = true;
                    closeBarcodeOverlay();
                    callback(code);
                });
            }

            // ===== وضع الجرد بالباركود (مسح متتابع) =====
            function openStocktakeScanner() {
                var busy = false;
                openBarcodeOverlay('وضع الجرد بالباركود', function(code) {
                    if (busy) return;
                    busy = true;
                    pauseBarcodeOverlay();
                    showStocktakeResultPanel(code, function() {
                        busy = false;
                        resumeBarcodeOverlay();
                    });
                });
            }

            function showStocktakeResultPanel(code, onDone) {
                var panel = document.getElementById('barcode-result-panel');
                var hint = document.getElementById('barcode-hint');
                if (!panel) return;
                if (hint) hint.style.display = 'none';

                var item = findInventoryByBarcode(code);
                var html = '<div style="background:var(--surface);border-top:1px solid var(--border);padding:16px;max-height:60vh;overflow:auto">';

                if (item) {
                    var curQty = Number(item.qty) || 0;
                    html += '<div style="font-size:11px;color:var(--text-faint);margin-bottom:4px">تم العثور على الصنف ✅</div>';
                    html += '<div style="font-size:16px;font-weight:800;color:var(--text);margin-bottom:10px">' + esc(item.name) + '</div>';
                    html += '<div style="font-size:12.5px;color:var(--text-dim);margin-bottom:10px">الكمية المسجّلة حالياً: <b style="color:var(--text)">' + curQty + '</b></div>';
                    html += '<div class="field" style="margin-bottom:10px"><label>الكمية الفعلية بعد الجرد</label><input type="number" id="stocktake-qty" min="0" value="' + curQty + '" style="font-size:16px;font-weight:800"></div>';
                    html += '<div style="display:flex;gap:8px">';
                    html += '<button class="btn btn-ghost btn-sm" id="stocktake-skip" style="flex:1">تخطي</button>';
                    html += '<button class="btn btn-primary btn-sm" id="stocktake-confirm" style="flex:2">✅ تحديث الكمية ومتابعة المسح</button>';
                    html += '</div>';
                } else {
                    html += '<div style="font-size:11px;color:var(--danger);margin-bottom:4px">⚠️ باركود غير مسجل</div>';
                    html += '<div style="font-size:13px;color:var(--text-dim);margin-bottom:12px">الرمز: <b style="color:var(--text);font-family:monospace">' + esc(code) + '</b></div>';
                    html += '<div style="display:flex;gap:8px">';
                    html += '<button class="btn btn-ghost btn-sm" id="stocktake-skip" style="flex:1">تخطي</button>';
                    html += '<button class="btn btn-primary btn-sm" id="stocktake-add" style="flex:2">➕ إضافة صنف جديد بهذا الباركود</button>';
                    html += '</div>';
                }
                html += '</div>';
                panel.innerHTML = html;

                var skipBtn = document.getElementById('stocktake-skip');
                if (skipBtn) skipBtn.onclick = function() {
                    panel.innerHTML = '';
                    if (hint) hint.style.display = '';
                    onDone();
                };

                var confirmBtn = document.getElementById('stocktake-confirm');
                if (confirmBtn) confirmBtn.onclick = function() {
                    var newQty = parseInt(document.getElementById('stocktake-qty').value, 10);
                    if (isNaN(newQty) || newQty < 0) newQty = 0;
                    var diff = newQty - (Number(item.qty) || 0);
                    item.qty = newQty;
                    item.updatedAt = Date.now();
                    saveInventory();
                    toast('✅ ' + item.name + ': الكمية الآن ' + newQty + (diff !== 0 ? (diff > 0 ? ' (+' + diff + ')' : ' (' + diff + ')') : ''));
                    var lvl = invLevel(item);
                    if (lvl === 'low' || lvl === 'out') {
                        setTimeout(function() { toast('⚠️ تنبيه: "' + item.name + '" بكمية منخفضة (' + item.qty + ')'); }, 900);
                    }
                    panel.innerHTML = '';
                    if (hint) hint.style.display = '';
                    onDone();
                };

                var addBtn = document.getElementById('stocktake-add');
                if (addBtn) addBtn.onclick = function() {
                    closeBarcodeOverlay();
                    openInventoryItemForm(null, code);
                };
            }

            /* ====================== شاشة البيع المنفصلة (POS) ====================== */
            var saleCart = [];
            var saleSearchTerm = '';
            var saleLastCode = null;
            var saleLastScanTime = 0;
            var saleType = 'retail'; // 'retail' = بيع داخل المحل | 'wholesale' = بيع جملة
            var saleCustomerId = ''; // معرّف عميل الجملة المرتبط بفاتورة البيع الحالية (اختياري)

            function saleCartTotal() {
                return saleCart.reduce(function(sum, l) { return sum + (l.price * l.qty); }, 0);
            }

            function findSaleCartLine(itemId) {
                return saleCart.find(function(l) { return l.itemId === itemId; });
            }

            // إضافة صنف للسلة (يُستخدم من المسح بالباركود ومن الإضافة اليدوية بالبحث)
            function addItemToSaleCart(item, qtyToAdd) {
                qtyToAdd = qtyToAdd || 1;
                var available = Number(item.qty) || 0;
                var line = findSaleCartLine(item.id);
                var currentInCart = line ? line.qty : 0;
                if (currentInCart + qtyToAdd > available) {
                    toast('🚫 الكمية غير كافية من "' + item.name + '" (المتوفر: ' + available + ')');
                    return false;
                }
                if (line) {
                    line.qty += qtyToAdd;
                } else {
                    saleCart.push({ itemId: item.id, barcode: item.barcode, name: item.name, price: Number(item.price) || 0, qty: qtyToAdd, available: available });
                }
                return true;
            }

            // إعادة رسم شاشة البيع فقط إن كانت هي الشاشة الحالية (تُستدعى بعد كل تعديل على السلة)
            function refreshSalesScreenIfActive() {
                if (currentView !== 'sales') return;
                var main = document.getElementById('app-main');
                var searchInput = document.getElementById('sale-search');
                var caret = searchInput ? searchInput.selectionStart : null;
                var hadFocus = document.activeElement && document.activeElement.id === 'sale-search';
                main.innerHTML = renderSalesScreen();
                attachMainListeners();
                if (hadFocus) {
                    var newInput = document.getElementById('sale-search');
                    if (newInput) { newInput.focus(); if (caret !== null) newInput.setSelectionRange(caret, caret); }
                }
            }

            function flashSaleHint(msg, isError) {
                var hint = document.getElementById('barcode-hint');
                if (!hint) return;
                hint.textContent = msg;
                hint.style.color = isError ? 'var(--danger)' : 'var(--accent-2)';
                clearTimeout(hint._resetTimer);
                hint._resetTimer = setTimeout(function() {
                    hint.textContent = 'وجّه الكاميرا نحو الباركود — سيتم الالتقاط تلقائياً';
                    hint.style.color = '';
                }, 1300);
            }

            // مسح متتابع بالكاميرا: كل باركود يُضاف مباشرة للسلة دون توقف
            function openSaleScanner() {
                saleLastCode = null;
                saleLastScanTime = 0;
                openBarcodeOverlay('🛒 مسح صنف للبيع', function(code) { handleSaleScan(code); });
            }

            function handleSaleScan(code) {
                var now = Date.now();
                if (code === saleLastCode && (now - saleLastScanTime) < 1500) return; // منع تكرار نفس المسح خلال 1.5 ثانية
                saleLastCode = code;
                saleLastScanTime = now;

                var item = findInventoryByBarcode(code);
                if (!item) {
                    flashSaleHint('⚠️ باركود غير مسجل: ' + code, true);
                    return;
                }
                var ok = addItemToSaleCart(item, 1);
                if (ok) {
                    flashSaleHint('✅ أُضيف: ' + item.name + ' — الإجمالي الآن: ' + money(saleCartTotal()), false);
                    refreshSalesScreenIfActive();
                } else {
                    flashSaleHint('🚫 الكمية غير كافية من "' + item.name + '"', true);
                }
            }

            function renderSalesScreen() {
                var html = '<div class="search-wrap">' + ICONS.search +
                    '<input class="search-input" id="sale-search" placeholder="🔍 ابحث عن صنف لإضافته يدويًا" value="' +
                    esc(saleSearchTerm) + '" aria-label="بحث لإضافة صنف للبيع"></div>';

                html += '<button class="btn btn-outline-gold" id="sale-scan-btn" style="margin:10px 0 14px;width:100%">📷 مسح باركود لإضافة صنف</button>';

                html += '<div style="margin-bottom:14px">';
                html += '<label style="font-size:12px;color:var(--text-dim);display:block;margin-bottom:5px">نوع البيع</label>';
                html += '<select id="sale-type-select" class="input" style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:13px;font-weight:700">';
                html += '<option value="retail"' + (saleType === 'retail' ? ' selected' : '') + '>🏪 بيع داخل المحل</option>';
                html += '<option value="wholesale"' + (saleType === 'wholesale' ? ' selected' : '') + '>📦 بيع جملة</option>';
                html += '</select>';
                html += '</div>';

                if (saleType === 'wholesale') {
                    html += '<div style="margin-bottom:14px">';
                    html += '<label style="font-size:12px;color:var(--text-dim);display:block;margin-bottom:5px">عميل الجملة (اختياري)</label>';
                    html += '<select id="sale-customer-select" style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:13px;font-weight:700">';
                    html += '<option value="">— بدون تحديد —</option>';
                    var wcSorted = wholesaleCustomers.slice().sort(function(a, b) { return (a.name || '').localeCompare(b.name || '', 'ar'); });
                    wcSorted.forEach(function(c) {
                        html += '<option value="' + c.id + '"' + (saleCustomerId === c.id ? ' selected' : '') + '>' + esc(c.name) + (c.phone ? ' — ' + esc(c.phone) : '') + '</option>';
                    });
                    html += '</select>';
                    html += '<button class="btn btn-ghost btn-sm" id="sale-manage-wholesale-customers" style="width:100%;margin-top:8px">👥 عملاء الجملة (' + wholesaleCustomers.length + ')</button>';
                    html += '</div>';
                }

                if (saleSearchTerm.trim()) {
                    var term = saleSearchTerm.trim().toLowerCase();
                    var matches = inventory.filter(function(it) {
                        return (Number(it.qty) || 0) > 0 && String(it.name || '').toLowerCase().indexOf(term) !== -1;
                    }).slice(0, 8);
                    html += '<div style="margin-bottom:14px">';
                    if (matches.length === 0) {
                        html += '<div style="font-size:12.5px;color:var(--text-faint);text-align:center;padding:10px 0">لا توجد أصناف متوفرة مطابقة</div>';
                    } else {
                        matches.forEach(function(it) {
                            html += '<div class="sale-add-result" data-add-item="' + it.id + '" style="display:flex;align-items:center;gap:8px;background:var(--surface-2);border-radius:10px;padding:9px 12px;margin-bottom:6px;cursor:pointer">';
                            html += '<div style="flex:1;min-width:0">';
                            html += '<div style="font-size:12.5px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(it.name) + '</div>';
                            html += '<div style="font-size:11px;color:var(--text-faint)">' + money(it.price || 0) + ' • المتوفر: ' + (Number(it.qty) || 0) + '</div>';
                            html += '</div>';
                            html += '<span style="color:var(--accent);font-size:20px;font-weight:800">+</span>';
                            html += '</div>';
                        });
                    }
                    html += '</div>';
                }

                html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
                html += '<div style="font-size:13px;font-weight:800;color:var(--text)">السلة (' + saleCart.length + ' صنف)</div>';
                html += '<div style="font-size:17px;font-weight:900;color:var(--accent)">' + money(saleCartTotal()) + '</div>';
                html += '</div>';

                if (saleCart.length === 0) {
                    html += emptyState('emptyBox', 'السلة فارغة', 'امسح باركود صنف أو ابحث عنه لإضافته للبيع');
                } else {
                    html += '<div class="card-list" style="margin-bottom:16px">';
                    saleCart.forEach(function(l, idx) {
                        html += '<div style="display:flex;align-items:center;gap:8px;background:var(--surface-2);border-radius:12px;padding:10px 12px;margin-bottom:8px">';
                        html += '<div style="flex:1;min-width:0">';
                        html += '<div style="font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(l.name) + '</div>';
                        html += '<div style="font-size:11.5px;color:var(--text-faint)"><span class="sale-price-edit" data-idx="' + idx + '" style="text-decoration:underline dotted;cursor:pointer">' + money(l.price) + ' ✏️</span> × ' + l.qty + ' = ' + money(l.price * l.qty) + '</div>';
                        html += '</div>';
                        html += '<div style="display:flex;align-items:center;gap:4px">';
                        html += '<button class="btn btn-ghost btn-sm sale-qty-btn" data-idx="' + idx + '" data-delta="-1" style="width:30px;height:30px;padding:0;font-size:17px">−</button>';
                        html += '<span style="min-width:22px;text-align:center;font-size:13px;font-weight:800">' + l.qty + '</span>';
                        html += '<button class="btn btn-ghost btn-sm sale-qty-btn" data-idx="' + idx + '" data-delta="1" style="width:30px;height:30px;padding:0;font-size:17px">+</button>';
                        html += '<button class="btn btn-ghost btn-sm sale-remove-btn" data-idx="' + idx + '" style="width:30px;height:30px;padding:0;color:var(--danger)">✕</button>';
                        html += '</div></div>';
                    });
                    html += '</div>';
                }

                html += '<div style="display:flex;gap:8px;margin-bottom:14px">';
                html += '<button class="btn btn-ghost" id="sale-clear-cart" style="flex:1"' + (saleCart.length === 0 ? ' disabled' : '') + '>🗑️ تفريغ السلة</button>';
                html += '<button class="btn btn-primary" id="sale-complete" style="flex:2"' + (saleCart.length === 0 ? ' disabled' : '') + '>✅ إتمام البيع (' + money(saleCartTotal()) + ')</button>';
                html += '</div>';

                html += '<button class="btn btn-ghost btn-sm" id="open-sales-history" style="width:100%;margin-bottom:8px">📋 سجل المبيعات (' + sales.length + ')</button>';
                html += '<button class="btn btn-ghost btn-sm" id="open-wholesale-customers" style="width:100%">👥 عملاء الجملة (' + wholesaleCustomers.length + ')</button>';

                return html;
            }

            function completeSale() {
                if (saleCart.length === 0) return;
                // إعادة التحقق من توفر الكمية لحظة الإتمام (قد تكون تغيّرت)
                var shortages = [];
                saleCart.forEach(function(l) {
                    var item = inventory.find(function(x) { return x.id === l.itemId; });
                    var avail = item ? (Number(item.qty) || 0) : 0;
                    if (avail < l.qty) shortages.push(l.name + ' (متوفر: ' + avail + '، مطلوب: ' + l.qty + ')');
                });
                if (shortages.length > 0) {
                    alert('⚠️ تعذّر إتمام البيع، الكمية غير كافية لـ:\n' + shortages.join('\n'));
                    return;
                }

                var total = saleCartTotal();
                var soldItems = saleCart.map(function(l) { return { itemId: l.itemId, name: l.name, barcode: l.barcode, price: l.price, qty: l.qty, lineTotal: l.price * l.qty }; });

                saleCart.forEach(function(l) {
                    var item = inventory.find(function(x) { return x.id === l.itemId; });
                    if (item) {
                        item.qty = (Number(item.qty) || 0) - l.qty;
                        item.updatedAt = Date.now();
                    }
                });
                saveInventory();

                var sale = { id: uid(), items: soldItems, total: total, saleType: saleType, customerId: saleType === 'wholesale' ? (saleCustomerId || '') : '', createdAt: Date.now() };
                sales.unshift(sale);
                saveSales();

                saleCart = [];
                saleSearchTerm = '';
                saleType = 'retail';
                saleCustomerId = '';
                renderAll();
                toast('✅ تم إتمام البيع بنجاح — الإجمالي: ' + money(total));
                showSaleReceipt(sale);
            }

            function showSaleReceipt(sale) {
                var lines = sale.items.map(function(l) {
                    return '• ' + l.name + '  × ' + l.qty + '  =  ' + money(l.lineTotal);
                }).join('\n');
                var saleTypeLabel = sale.saleType === 'wholesale' ? '📦 بيع جملة' : '🏪 بيع داخل المحل';
                var saleCustomer = sale.customerId ? getWholesaleCustomer(sale.customerId) : null;
                var receiptText =
                    '🧾 *فاتورة بيع - ' + settings.shopName + '*\n' +
                    new Date(sale.createdAt).toLocaleString('ar') + '\n' +
                    saleTypeLabel + (saleCustomer ? ' — ' + saleCustomer.name : '') + '\n\n' +
                    lines + '\n\n' +
                    '*الإجمالي: ' + money(sale.total) + '*' +
                    (SHOP_SIGNATURE || '');

                var overlay = document.createElement('div');
                overlay.style.cssText = 'position:fixed;inset:0;background:rgba(8,10,14,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px';
                var box = document.createElement('div');
                box.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px;max-width:360px;width:100%;text-align:center';
                var itemsHtml = sale.items.map(function(l) {
                    return '<div style="display:flex;justify-content:space-between;font-size:12.5px;color:var(--text-dim);padding:4px 0;border-bottom:1px dashed var(--border)"><span>' + esc(l.name) + ' × ' + l.qty + '</span><span>' + money(l.lineTotal) + '</span></div>';
                }).join('');
                box.innerHTML =
                    '<div style="font-size:15px;font-weight:800;margin-bottom:4px">🧾 تمّ البيع بنجاح</div>' +
                    '<div style="font-size:11.5px;color:var(--text-faint);margin-bottom:12px">' + saleTypeLabel + (saleCustomer ? ' — ' + esc(saleCustomer.name) : '') + '</div>' +
                    '<div style="text-align:right;margin-bottom:10px">' + itemsHtml + '</div>' +
                    '<div style="display:flex;justify-content:space-between;font-size:15px;font-weight:900;color:var(--accent);margin-bottom:18px"><span>الإجمالي</span><span>' + money(sale.total) + '</span></div>' +
                    '<div style="display:flex;gap:8px">' +
                    '<button id="receipt-wa" class="btn btn-wa" style="flex:1">' + ICONS.whatsapp + ' مشاركة</button>' +
                    '<button id="receipt-close" class="btn btn-ghost" style="flex:1">إغلاق</button>' +
                    '</div>';
                overlay.appendChild(box);
                document.body.appendChild(overlay);
                document.getElementById('receipt-wa').onclick = function() {
                    window.open('https://wa.me/?text=' + encodeURIComponent(receiptText), '_blank');
                };
                document.getElementById('receipt-close').onclick = function() {
                    document.body.removeChild(overlay);
                };
            }

            /* ====================== سجل المبيعات ====================== */
            function openSalesHistory() {
                var html = '<div class="sheet-handle"></div><div class="sheet-head"><h3>📋 سجل المبيعات</h3><button class="icon-btn" id="sheet-close" aria-label="إغلاق">' + ICONS.close + '</button></div>';
                html += '<div style="padding:0 18px 24px">';
                if (sales.length === 0) {
                    html += '<div style="text-align:center;color:var(--text-faint);padding:30px 0">لا توجد مبيعات مسجّلة بعد</div>';
                } else {
                    var totalAll = sales.reduce(function(s, x) { return s + x.total; }, 0);
                    html += '<div style="background:var(--surface-2);border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;justify-content:space-between;font-size:13px">';
                    html += '<span style="color:var(--text-dim)">إجمالي المبيعات (' + sales.length + ')</span>';
                    html += '<span style="font-weight:900;color:var(--accent)">' + money(totalAll) + '</span></div>';
                    sales.forEach(function(s) {
                        var d = new Date(s.createdAt);
                        var dateStr = d.toLocaleDateString('ar') + ' ' + d.toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' });
                        var histTypeLabel = s.saleType === 'wholesale' ? '📦 جملة' : '🏪 محل';
                        var histCustomer = s.customerId ? getWholesaleCustomer(s.customerId) : null;
                        html += '<div style="background:var(--surface-2);border-radius:12px;padding:12px 14px;margin-bottom:8px">';
                        html += '<div style="display:flex;justify-content:space-between;margin-bottom:4px">';
                        html += '<span style="font-size:12px;color:var(--text-faint)">' + dateStr + (s.editedAt ? ' <span style="color:var(--accent-3)">(معدّلة)</span>' : '') + '</span>';
                        html += '<span style="font-size:13px;font-weight:800;color:var(--accent)">' + money(s.total) + '</span></div>';
                        html += '<div style="margin-bottom:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap"><span class="badge" style="background:' + (s.saleType === 'wholesale' ? 'var(--accent-3)33;color:var(--accent-3);border-color:var(--accent-3)66' : 'var(--accent-2)33;color:var(--accent-2);border-color:var(--accent-2)66') + '">' + histTypeLabel + '</span>' + (histCustomer ? '<span style="font-size:11.5px;color:var(--text-dim)">👤 ' + esc(histCustomer.name) + '</span>' : '') + '</div>';
                        html += '<div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">' + s.items.map(function(l) { return esc(l.name) + ' ×' + l.qty; }).join('، ') + '</div>';
                        html += '<div style="display:flex;gap:8px">';
                        html += '<button class="btn btn-ghost btn-sm sale-hist-edit" data-sale-id="' + s.id + '" style="flex:1">✏️ تعديل</button>';
                        html += '<button class="btn btn-ghost btn-sm sale-hist-delete" data-sale-id="' + s.id + '" style="flex:1;color:var(--danger)">🗑️ حذف</button>';
                        html += '</div>';
                        html += '</div>';
                    });
                }
                html += '</div>';
                openSheet(html);
                document.getElementById('sheet-close').onclick = closeSheet;

                var histEditBtns = document.querySelectorAll('.sale-hist-edit');
                for (var he = 0; he < histEditBtns.length; he++) {
                    histEditBtns[he].onclick = function() {
                        var saleId = this.getAttribute('data-sale-id');
                        requirePin(function() { openEditSaleForm(saleId); }, 'تعديل الفاتورة');
                    };
                }
                var histDelBtns = document.querySelectorAll('.sale-hist-delete');
                for (var hd = 0; hd < histDelBtns.length; hd++) {
                    histDelBtns[hd].onclick = function() {
                        var id = this.getAttribute('data-sale-id');
                        requirePin(function() {
                            if (!confirm('⚠️ سيتم حذف هذه الفاتورة نهائياً وإعادة الكميات المباعة إلى المخزون. متابعة؟')) return;
                            deleteSale(id);
                        }, 'حذف الفاتورة');
                    };
                }
            }

            // حذف فاتورة بيع نهائياً مع إعادة الكميات المباعة للمخزون
            function deleteSale(saleId) {
                var sale = sales.find(function(s) { return s.id === saleId; });
                if (!sale) return;
                sale.items.forEach(function(l) {
                    var item = inventory.find(function(x) { return x.id === l.itemId; });
                    if (item) { item.qty = (Number(item.qty) || 0) + (Number(l.qty) || 0); item.updatedAt = Date.now(); }
                });
                saveInventory();
                markDeleted('sales', saleId);
                sales = sales.filter(function(s) { return s.id !== saleId; });
                saveSales();
                refreshSalesScreenIfActive();
                openSalesHistory();
                toast('🗑️ تم حذف الفاتورة وإعادة الكمية للمخزون');
            }

            /* ====================== عملاء الجملة ====================== */
            var wholesaleCustomerSearch = '';

            // مبيعات عميل جملة معيّن + إجمالي مشترياته
            function salesForWholesaleCustomer(customerId) {
                return sales.filter(function(s) { return s.customerId === customerId; });
            }

            function wholesaleCustomerTotal(customerId) {
                return salesForWholesaleCustomer(customerId).reduce(function(sum, s) { return sum + (Number(s.total) || 0); }, 0);
            }

            function openWholesaleCustomers() {
                renderWholesaleCustomersSheet();
            }

                var list = wholesaleCustomers.slice().sort(function(a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });
                if (wholesaleCustomerSearch.trim()) {
                    var q = wholesaleCustomerSearch.trim().toLowerCase();
                    list = list.filter(function(c) {
                        return (c.name || '').toLowerCase().indexOf(q) !== -1 || (c.phone || '').indexOf(q) !== -1;
                    });
                }

                var html = '<div class="sheet-handle"></div><div class="sheet-head"><h3>👥 عملاء الجملة</h3><button class="icon-btn" id="sheet-close" aria-label="إغلاق">' + ICONS.close + '</button></div>';
                html += '<div style="padding:0 18px 24px">';
                html += '<div class="search-wrap">' + ICONS.search + '<input class="search-input" id="wc-search" placeholder="🔍 ابحث بالاسم أو رقم الهاتف" value="' + esc(wholesaleCustomerSearch) + '" aria-label="بحث في عملاء الجملة"></div>';
                html += '<button class="btn btn-primary" id="wc-add" style="width:100%;margin:12px 0 14px">➕ إضافة عميل جملة جديد</button>';

                if (list.length === 0) {
                    if (wholesaleCustomers.length === 0) {
                        html += '<div style="text-align:center;color:var(--text-faint);padding:20px 0">لا يوجد عملاء جملة بعد</div>';
                    } else {
                        html += '<div style="text-align:center;color:var(--text-faint);padding:20px 0">لا نتائج مطابقة</div>';
                    }
                } else {
                    html += '<div class="card-list">';
                    list.forEach(function(c) {
                        var total = wholesaleCustomerTotal(c.id);
                        var cnt = salesForWholesaleCustomer(c.id).length;
                        html += '<div class="customer-card" data-wc-open="' + c.id + '" style="cursor:pointer">';
                        html += '<div class="avatar">' + esc((c.name || '?').trim().slice(0, 1)) + '</div>';
                        html += '<div class="customer-info"><div class="customer-name">' + esc(c.name) + '</div>';
                        html += '<div class="customer-meta">' + cnt + ' فاتورة · ' + money(total) + (c.phone ? ' · ' + esc(c.phone) : '') + '</div></div>';
                        if (c.phone) html += '<a class="call-btn" href="tel:' + esc(c.phone) + '" aria-label="اتصال" onclick="event.stopPropagation()">' + ICONS.phone + '</a>';
                        html += '</div>';
                    });
                    html += '</div>';
                }
                html += '</div>';

                openSheet(html);
                document.getElementById('sheet-close').onclick = closeSheet;

                var wcSearchInput = document.getElementById('wc-search');
                if (wcSearchInput) {
                    wcSearchInput.oninput = function() {
                        wholesaleCustomerSearch = this.value;
                        renderWholesaleCustomersSheet();
                    };
                    // إبقاء التركيز والمؤشر في نهاية النص بعد إعادة الرسم
                    wcSearchInput.focus();

                    wcSearchInput.setSelectionRange(vlen, vlen);

                var wcAddBtn = document.getElementById('wc-add');
                if (wcAddBtn) wcAddBtn.onclick = function() { openWholesaleCustomerForm(); };

                var wcOpenEls = document.querySelectorAll('[data-wc-open]');
                for (var i = 0; i < wcOpenEls.length; i++) {

            // نموذج إضافة/تعديل عميل جملة
            function openWholesaleCustomerForm(customerId) {
                var c = customerId ? getWholesaleCustomer(customerId) : null;
                var html = '<div class="sheet-handle"></div><div class="sheet-head"><h3>' + (c ? '✏️ تعديل عميل الجملة' : '➕ إضافة عميل جملة') + '</h3><button class="icon-btn" id="sheet-close" aria-label="إغلاق">' + ICONS.close + '</button></div>';

                html += '<div class="field"><label>اسم العميل / المحل *</label><input id="wc-name" value="' + esc(c ? c.name : '') + '" placeholder="مثال: محل أبو أحمد للموبايلات"></div>';
                html += '<div class="field"><label>رقم الهاتف</label><input id="wc-phone" type="tel" inputmode="tel" value="' + esc(c ? c.phone : '') + '" placeholder="07xxxxxxxx"></div>';
                html += '<div class="field"><label>العنوان</label><input id="wc-address" value="' + esc(c ? c.address : '') + '" placeholder="اختياري"></div>';
                html += '<div class="field"><label>ملاحظات</label><textarea id="wc-notes" rows="3" placeholder="اختياري">' + esc(c ? c.notes : '') + '</textarea></div>';

            // تفاصيل عميل جملة: بياناته + سجل مشترياته
            function openWholesaleCustomerDetail(customerId) {
                var c = getWholesaleCustomer(customerId);
                if (!c) return;
                var cSales = salesForWholesaleCustomer(customerId).sort(function(a, b) { return b.createdAt - a.createdAt; });

                html += '<div style="display:flex;gap:8px;margin-bottom:16px">';
                html += '<button class="btn btn-ghost btn-sm" id="wc-edit" style="flex:1">✏️ تعديل البيانات</button>';
                html += '<button class="btn btn-ghost btn-sm" id="wc-delete" style="flex:1;color:var(--danger)">🗑️ حذف العميل</button>';
                html += '</div>';

                html += '<div class="section-head" style="margin:0 0 10px"><h3>سجل المشتريات</h3></div>';
                if (cSales.length === 0) {
                    html += '<div style="text-align:center;color:var(--text-faint);padding:16px 0">لا توجد فواتير بعد لهذا العميل</div>';
                } else {
                    cSales.forEach(function(s) {
                        var d = new Date(s.createdAt);
                        var dateStr = d.toLocaleDateString('ar') + ' ' + d.toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' });
                        html += '<div style="background:var(--surface-2);border-radius:12px;padding:12px 14px;margin-bottom:8px">';
                        html += '<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;color:var(--text-faint)">' + dateStr + '</span><span style="font-size:13px;font-weight:800;color:var(--accent)">' + money(s.total) + '</span></div>';
                        html += '<div style="font-size:12px;color:var(--text-dim)">' + s.items.map(function(l) { return esc(l.name) + ' ×' + l.qty; }).join('، ') + '</div>';
                        html += '</div>';
                    });
                }
                html += '</div>';

                openSheet(html);
                document.getElementById('sheet-close').onclick = closeSheet;
                document.getElementById('wc-edit').onclick = function() { openWholesaleCustomerForm(customerId); };

                    if (cSales.length > 0) {
                        if (!confirm('⚠️ لدى هذا العميل ' + cSales.length + ' فاتورة مسجّلة (لن تُحذف الفواتير، لكن سيصبح اسم العميل غير مرتبط بها). متابعة حذف العميل؟')) return;
                    } else {

                    }

            // فتح سعر صنف داخل السلة الحالية (قبل إتمام البيع) للتعديل
            function openEditCartLinePrice(idx) {

                priceInput.select();

            // فتح نموذج تعديل فاتورة بيع سابقة من السجل (تعديل الكمية/السعر/حذف صنف)
            function openEditSaleForm(saleId) {
                var sale = sales.find(function(s) { return s.id === saleId; });
                if (!sale) return;
                var original = sale.items.map(function(l) { return { itemId: l.itemId, qty: Number(l.qty) || 0 }; });
                var workingItems = sale.items.map(function(l) {
                    return { itemId: l.itemId, name: l.name, barcode: l.barcode, price: Number(l.price) || 0, qty: Number(l.qty) || 0 };
                });
                var workingSaleType = sale.saleType === 'wholesale' ? 'wholesale' : 'retail';
                var workingCustomerId = sale.customerId || '';

                function renderForm() {
                    var html = '<div class="sheet-handle"></div><div class="sheet-head"><h3>✏️ تعديل الفاتورة #' + sale.id.slice(-6) + '</h3><button class="icon-btn" id="sheet-close" aria-label="إغلاق">' + ICONS.close + '</button></div>';
                    html += '<div style="padding:0 18px 24px">';
                    html += '<div style="margin-bottom:14px"><label style="font-size:12px;color:var(--text-dim);display:block;margin-bottom:5px">نوع البيع</label>';
                    html += '<select id="sale-edit-type-select" style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:13px;font-weight:700">';
                    html += '<option value="retail"' + (workingSaleType === 'retail' ? ' selected' : '') + '>🏪 بيع داخل المحل</option>';
                    html += '<option value="wholesale"' + (workingSaleType === 'wholesale' ? ' selected' : '') + '>📦 بيع جملة</option>';
                    html += '</select></div>';
                    if (workingSaleType === 'wholesale') {
                        html += '<div style="margin-bottom:14px"><label style="font-size:12px;color:var(--text-dim);display:block;margin-bottom:5px">عميل الجملة (اختياري)</label>';
                        html += '<select id="sale-edit-customer-select" style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:13px;font-weight:700">';
                        html += '<option value="">— بدون تحديد —</option>';
                        wholesaleCustomers.slice().sort(function(a, b) { return (a.name || '').localeCompare(b.name || '', 'ar'); }).forEach(function(c) {
                            html += '<option value="' + c.id + '"' + (workingCustomerId === c.id ? ' selected' : '') + '>' + esc(c.name) + '</option>';
                        });
                        html += '</select></div>';
                    }
                    if (workingItems.length === 0) {
                        html += '<div style="text-align:center;color:var(--text-faint);padding:20px 0">لا توجد أصناف — سيتم حذف الفاتورة بالكامل عند الحفظ</div>';
                    } else {
                        workingItems.forEach(function(l, idx) {
                            html += '<div style="background:var(--surface-2);border-radius:12px;padding:12px;margin-bottom:10px">';
                            html += '<div style="font-size:13px;font-weight:700;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">' +
                                '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(l.name) + '</span>' +
                                '<button type="button" class="btn btn-ghost btn-sm" data-remove-idx="' + idx + '" style="flex:none;width:28px;height:28px;padding:0;color:var(--danger)">✕</button>' +
                                '</div>';
                            html += '<div class="field-row">';
                            html += '<div class="field"><label>الكمية</label><input type="number" min="1" data-qty-idx="' + idx + '" value="' + l.qty + '"></div>';
                            html += '<div class="field"><label>سعر الوحدة</label><input type="number" inputmode="decimal" step="0.01" min="0" data-price-idx="' + idx + '" value="' + l.price + '"></div>';
                            html += '</div></div>';
                        });
                    }
                    var newTotal = workingItems.reduce(function(s, l) { return s + l.price * l.qty; }, 0);
                    html += '<div style="display:flex;justify-content:space-between;font-size:15px;font-weight:900;color:var(--accent);margin:14px 0"><span>الإجمالي الجديد</span><span>' + money(newTotal) + '</span></div>';
                    html += '<div class="form-actions"><button type="button" class="btn btn-primary" id="sale-edit-save" style="flex:1">💾 حفظ التعديلات</button></div>';
                    html += '</div>';
                    openSheet(html);
                    document.getElementById('sheet-close').onclick = closeSheet;

                    var rmBtns = document.querySelectorAll('[data-remove-idx]');
                    for (var ri = 0; ri < rmBtns.length; ri++) {
                        rmBtns[ri].onclick = function() {
                            workingItems.splice(Number(this.getAttribute('data-remove-idx')), 1);
                            renderForm();
                        };
                    }
                    var qtyInputs = document.querySelectorAll('[data-qty-idx]');
                    for (var qi = 0; qi < qtyInputs.length; qi++) {
                        qtyInputs[qi].onchange = function() {
                            var idx = Number(this.getAttribute('data-qty-idx'));
                            workingItems[idx].qty = Math.max(1, parseInt(this.value, 10) || 1);
                            renderForm();
                        };
                    }
                    var priceInputs = document.querySelectorAll('[data-price-idx]');
                    for (var pi = 0; pi < priceInputs.length; pi++) {
                        priceInputs[pi].onchange = function() {
                            var idx = Number(this.getAttribute('data-price-idx'));
                            workingItems[idx].price = Math.max(0, parseFloat(this.value) || 0);
                            renderForm();
                        };
                    }
                    var typeSelect = document.getElementById('sale-edit-type-select');
                    if (typeSelect) {
                        typeSelect.onchange = function() { workingSaleType = this.value; renderForm(); };
                    }
                    var custSelect = document.getElementById('sale-edit-customer-select');
                    if (custSelect) {
                        custSelect.onchange = function() { workingCustomerId = this.value; };
                    }
                    var saveBtn = document.getElementById('sale-edit-save');
                    if (saveBtn) saveBtn.onclick = function() { saveEditedSale(sale, original, workingItems, workingSaleType, workingSaleType === 'wholesale' ? workingCustomerId : ''); };
                }
                renderForm();
            }

            // حفظ التعديلات على فاتورة بيع سابقة مع تصحيح كميات المخزون
            function saveEditedSale(sale, original, workingItems, newSaleType, newCustomerId) {
                // إعادة الكميات الأصلية للمخزون أولاً لحساب التوفر الصحيح
                original.forEach(function(o) {
                    var item = inventory.find(function(x) { return x.id === o.itemId; });
                    if (item) { item.qty = (Number(item.qty) || 0) + o.qty; item.updatedAt = Date.now(); }
                });
                var shortages = [];
                workingItems.forEach(function(l) {
                    var item = inventory.find(function(x) { return x.id === l.itemId; });
                    var avail = item ? (Number(item.qty) || 0) : 0;
                    if (avail < l.qty) shortages.push(l.name + ' (متوفر: ' + avail + '، مطلوب: ' + l.qty + ')');
                });
                if (shortages.length > 0) {
                    // تراجع عن إعادة الكميات لأن الحفظ فشل
                    original.forEach(function(o) {
                        var item = inventory.find(function(x) { return x.id === o.itemId; });
                        if (item) { item.qty = (Number(item.qty) || 0) - o.qty; item.updatedAt = Date.now(); }
                    });
                    alert('⚠️ تعذّر حفظ التعديل، الكمية غير كافية لـ:\n' + shortages.join('\n'));
                    return;
                }
                workingItems.forEach(function(l) {
                    var item = inventory.find(function(x) { return x.id === l.itemId; });
                    if (item) { item.qty = (Number(item.qty) || 0) - l.qty; item.updatedAt = Date.now(); }
                });
                saveInventory();

                if (workingItems.length === 0) {
                    markDeleted('sales', sale.id);
                    sales = sales.filter(function(s) { return s.id !== sale.id; });
                } else {
                    sale.items = workingItems.map(function(l) {
                        return { itemId: l.itemId, name: l.name, barcode: l.barcode, price: l.price, qty: l.qty, lineTotal: l.price * l.qty };
                    });
                    sale.total = sale.items.reduce(function(s, l) { return s + l.lineTotal; }, 0);
                    sale.saleType = newSaleType === 'wholesale' ? 'wholesale' : 'retail';
                    sale.customerId = sale.saleType === 'wholesale' ? (newCustomerId || '') : '';
                    sale.editedAt = Date.now();
                }
                saveSales();
                closeSheet();
                refreshSalesScreenIfActive();
                openSalesHistory();
                toast('✅ تم تحديث الفاتورة بنجاح');
            }

            function stepper(status) {
                var idx = STATUS_ORDER.indexOf(status);
                var html = '<div class="stepper">';
                for (var i = 0; i < STATUS_ORDER.length; i++) {
                    var s = STATUS_ORDER[i];
                    var done = i <= idx;
                    html += '<div class="stepper-step ' + (done ? 'done' : '') + '" style="--dot:' + STATUS[s].color + '">';
                    html += '<span class="stepper-dot"></span>';
                    if (i < STATUS_ORDER.length - 1) html += '<span class="stepper-line"></span>';
                    html += '</div>';
                }
                html += '</div>';
                return html;
            }

            function badge(status) {
                var s = STATUS[status];
                if (!s) return '<span class="badge">غير معروف</span>';
                return '<span class="badge" style="background:' + s.color + '33; color:' + s.color + '; border-color:' + s
                    .color + '66">' + s.label + '</span>';
            }

            function getLoyaltyBadgeHTML(visits) {
                var tier = getLoyaltyTier(visits);
                if (tier.minVisits === 0) return '';
                var tierClass = 'tier-' + tier.tier;
                return '<span class="loyalty-tier ' + tierClass + '">' + tier.emoji + ' ' + tier.label + ' ' + tier
                    .discount + '%</span>';
            }

                currentView = view;
                renderAll();
                window.scrollTo(0, 0);
            }

                var tb = document.getElementById('topbar');
                if (currentView === 'dashboard') {
                    var readyCount = 0;
                    for (var i = 0; i < repairs.length; i++) {
                        if (repairs[i].status === 'ready') readyCount++;
                    }
                    var badgeHtml = readyCount > 0 ? ' <span class="notification-dot"></span>' : '';
                    tb.innerHTML = '<div class="topbar-row"><div><p class="shop-name">' + esc(settings.shopName) +
                        '</p><p class="shop-sub">' + new Date().toLocaleDateString('ar-EG', { weekday: 'long',
                            day: 'numeric', month: 'long' }) + '</p></div><div style="display:flex;gap:8px"><button class="icon-btn" id="toggle-theme" aria-label="تغيير المظهر">🌓</button><button class="icon-btn" id="open-settings" aria-label="الإعدادات">' +
                        ICONS.gear + '</button></div></div>';
                    var themeBtn = document.getElementById('toggle-theme');
                    if (themeBtn) themeBtn.onclick = toggleTheme;

            /* ====================== CHART ====================== */
            function drawRevenueChart(data) {
                var canvas = document.getElementById('chart-revenue');
                if (!canvas) return;
                var ctx = canvas.getContext('2d');
                var rect = canvas.parentElement.getBoundingClientRect();
                var width = rect.width - 28;
                var height = 100;
                canvas.width = width;
                canvas.height = height;

                var maxVal = 1;
                for (var i = 0; i < data.length; i++) {
                    if (data[i].value > maxVal) maxVal = data[i].value;
                }
                if (maxVal === 0) maxVal = 1;

                var padding = { top: 8, bottom: 18, left: 4, right: 4 };
                var chartWidth = width - padding.left - padding.right;
                var chartHeight = height - padding.top - padding.bottom;
                var stepX = chartWidth / Math.max(data.length - 1, 1);

                ctx.clearRect(0, 0, width, height);

                var accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#ff8a3d';
                var accent3 = getComputedStyle(document.documentElement).getPropertyValue('--accent-3').trim() ||
                '#5b8def';
                var textFaint = getComputedStyle(document.documentElement).getPropertyValue('--text-faint').trim() ||
                    '#5b6372';

                for (var i = 0; i < data.length; i++) {
                    var x = padding.left + i * stepX;
                    var barWidth = Math.min(stepX * 0.6, 16);
                    var barHeight = (data[i].value / maxVal) * chartHeight;
                    var y = padding.top + chartHeight - barHeight;

                    var gradient = ctx.createLinearGradient(x, y, x, padding.top + chartHeight);
                    gradient.addColorStop(0, accent);
                    gradient.addColorStop(1, accent3);
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    var radius = 2;
                    ctx.moveTo(x - barWidth / 2 + radius, y);
                    ctx.lineTo(x + barWidth / 2 - radius, y);
                    ctx.quadraticCurveTo(x + barWidth / 2, y, x + barWidth / 2, y + radius);
                    ctx.lineTo(x + barWidth / 2, y + barHeight);
                    ctx.lineTo(x - barWidth / 2, y + barHeight);
                    ctx.lineTo(x - barWidth / 2, y + radius);
                    ctx.quadraticCurveTo(x - barWidth / 2, y, x - barWidth / 2 + radius, y);
                    ctx.fill();

                    ctx.fillStyle = textFaint;
                    ctx.font = '8px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(data[i].label, x, padding.top + chartHeight + 12);
                }
            }

                    r.discountPct + '%</span>' : '';

                    .expectedPrice) : '');

                var deliveredClass = r.status === 'delivered' ? 'delivered-card' : '';

                var pinnedIcon = r.pinned ?

                // عرض المدة المنقضية
                var daysSince = '';
                if (r.receivedDate) {
                    var received = new Date(r.receivedDate);
                    var now = new Date();
                    var diff = Math.floor((now - received) / (1000 * 60 * 60 * 24));
                    if (diff > 0) daysSince = ' · ' + diff + ' يوم';
                }

                // بطاقات إضافية
                var techHtml = r.technician ? ' <span class="tech-badge">👨‍🔧 ' + esc(r.technician) + '</span>' : '';
                var promiseDateHtml = '';

                    var isLate = promiseD < nowD;
                    var promiseFmt = r.promiseDate.split('-').reverse().join('/');
                    promiseDateHtml = ' <span class="promise-date ' + (isLate ? 'overdue' : '') + '">' + (isLate ? '⚠️ تأخر' : '📅') + ' ' + promiseFmt + '</span>';
                }

                    var nd = new Date();
                    var dif = Math.floor((nd - rd) / (1000*60*60*24));
                    var maxD = r.estimatedDays ? parseInt(r.estimatedDays) : 10;
                    if (dif > maxD) overdueHtml = '<span class="overdue-badge">⚠️ تأخر ' + dif + ' يوم</span>';
                }
