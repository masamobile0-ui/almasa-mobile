<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#11151c">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>متابعة الصيانة - الماسة موبايل v2.1</title>
    <!-- 
    ═══════════════════════════════════════════════
    الماسة موبايل - نظام إدارة الصيانة v2.1
    تحديثات v2.1:
    ✅ حماية بالرقم السري لتعديل/حذف/زيادة/إنقاص كمية القطع وتسجيل المرتجع والتالف ووضع الجرد
    ✅ دمج تقرير المخزون وتقرير المرتجعات والتوالف داخل شاشة التقارير الموحّدة
    التحسينات المضافة سابقاً:
    ✅ 1. دعم Firebase للحفظ السحابي
    ✅ 2. PWA - تثبيت كتطبيق على الجوال
    ✅ 3. حقل الفني المسؤول لكل جهاز
    ✅ 4. تاريخ الوعد مع تنبيه التأخر
    ✅ 5. ملاحظة داخلية للفني (لا تظهر للزبون)
    ✅ 6. تنبيه أسبوعي للنسخ الاحتياطي
    ✅ 7. إشعارات حقيقية عند جاهزية الجهاز
    ✅ 8. تنبيه الأجهزة المتأخرة في الداشبورد
    ✅ 9. إدارة أسماء الفنيين من الإعدادات
    ✅ 10. إضافة هاتف وعنوان المحل للإعدادات والفاتورة
    ✅ 11. زر مشاركة التطبيق
    ✅ 12. رسالة واتساب محسّنة تشمل الفني وموعد التسليم
    ═══════════════════════════════════════════════
    -->
    <link rel="manifest" id="pwa-manifest">
    <meta name="apple-mobile-web-app-title" content="الماسة موبايل">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23ff8a3d'/><text y='.9em' font-size='80' x='10'>📱</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ========== ROOT VARIABLES ========== */
        :root {
            --bg: #11151c;
            --surface: #1a1f28;
            --surface-2: #222834;
            --surface-3: #2a313d;
            --border: #2e3543;
            --text: #f2efe9;
            --text-dim: #8b93a3;
            --text-faint: #5b6372;
            --accent: #ff8a3d;
            --accent-ink: #1a1006;
            --accent-2: #3ddc84;
            --accent-3: #5b8def;
            --accent-4: #8b93a3;
            --danger: #ef5b5b;
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow: 0 8px 24px rgba(0, 0, 0, .35);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-top: env(safe-area-inset-top, 0px);
            --whatsapp: #25D366;
            --delivered-bg: rgba(61, 220, 132, 0.08);
            --delivered-border: rgba(61, 220, 132, 0.25);
            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
            --loyalty-1: #cd7f32;
            --loyalty-2: #c0c0c0;
            --loyalty-3: #ffd700;
            --loyalty-4: #b9f2ff;
        }

        /* ========== LIGHT MODE ========== */
        .light-mode {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --surface-2: #e8ecf0;
            --surface-3: #d5dbe3;
            --border: #c8ced6;
            --text: #1a1a2e;
            --text-dim: #5a6270;
            --text-faint: #8a92a0;
            --shadow: 0 8px 24px rgba(0, 0, 0, .12);
            --delivered-bg: rgba(61, 220, 132, 0.12);
            --delivered-border: rgba(61, 220, 132, 0.3);
        }

        @media (prefers-color-scheme: light) {
            :root:not(.light-mode):not(.dark-mode) {
                --bg: #f0f2f5;
                --surface: #ffffff;
                --surface-2: #e8ecf0;
                --surface-3: #d5dbe3;
                --border: #c8ced6;
                --text: #1a1a2e;
                --text-dim: #5a6270;
                --text-faint: #8a92a0;
                --shadow: 0 8px 24px rgba(0, 0, 0, .12);
                --delivered-bg: rgba(61, 220, 132, 0.12);
                --delivered-border: rgba(61, 220, 132, 0.3);
            }
        }

        .dark-mode {
            --bg: #11151c;
            --surface: #1a1f28;
            --surface-2: #222834;
            --surface-3: #2a313d;
            --border: #2e3543;
            --text: #f2efe9;
            --text-dim: #8b93a3;
            --text-faint: #5b6372;
            --shadow: 0 8px 24px rgba(0, 0, 0, .35);
            --delivered-bg: rgba(61, 220, 132, 0.08);
            --delivered-border: rgba(61, 220, 132, 0.25);
        }

        /* ========== RESET & BASE ========== */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html,
        body {
            height: 100%;
        }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Roboto, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            min-height: 100%;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }
        button,
        input,
        textarea,
        select {
            font-family: inherit;
        }
        button {
            cursor: pointer;
        }
        ::selection {
            background: var(--accent);
            color: var(--accent-ink);
        }
        ::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        /* ========== APP CONTAINER ========== */
        #app {
            max-width: 560px;
            margin: 0 auto;
            min-height: 100%;
            position: relative;
            padding-bottom: calc(86px + var(--safe-bottom));
        }

        /* ========== TOPBAR ========== */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            padding: calc(16px + var(--safe-top)) 18px 14px;
            background: linear-gradient(180deg, var(--bg) 70%, rgba(17, 21, 28, 0));
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .topbar-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .shop-name {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: .2px;
            margin: 0;
            background: linear-gradient(135deg, var(--accent), #ff6b1a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .shop-sub {
            font-size: 12.5px;
            color: var(--text-dim);
            margin: 2px 0 0;
        }
        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            flex: none;
            transition: all 0.15s ease;
        }
        .icon-btn:active {
            transform: scale(0.94);
            background: var(--surface-2);
        }
        .icon-btn svg {
            width: 18px;
            height: 18px;
        }

        .view-title-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 4px 18px 10px;
        }
        .view-title-row h2 {
            font-size: 19px;
            margin: 0;
            font-weight: 800;
        }
        .back-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            transition: all 0.15s ease;
        }
        .back-btn:active {
            transform: scale(0.92);
        }
        .back-btn svg {
            width: 17px;
            height: 17px;
        }

        main {
            padding: 0 18px 8px;
        }

        /* ========== STATS GRID ========== */
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 18px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 14px 14px 12px;
            position: relative;
            overflow: hidden;
            transition: transform 0.15s ease;
        }
        .stat-card:active {
            transform: scale(0.98);
        }
        .stat-card .bar {
            position: absolute;
            inset-inline-start: 0;
            top: 0;
            bottom: 0;
            width: 3px;
        }
        .stat-num {
            font-size: 24px;
            font-weight: 800;
            line-height: 1.1;
        }
        .stat-label {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 6px 2px 10px;
        }
        .section-head h3 {
            font-size: 15px;
            margin: 0;
            font-weight: 800;
            color: var(--text);
        }
        .section-head a {
            font-size: 12.5px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
        }

        .card-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ========== DEVICE CARD ========== */
        .device-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 13px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.3s ease;
            cursor: pointer;
            position: relative;
        }
        .device-card:active {
            transform: scale(0.98);
        }
        .device-card.delivered-card {
            border-color: var(--accent-2);
            background: var(--delivered-bg);
        }
        .device-card.delivered-card::after {
            content: "✅";
            position: absolute;
            top: 8px;
            left: 12px;
            font-size: 14px;
            opacity: 0.6;
        }
        .device-card.waiting-parts {
            border-color: var(--accent-3);
            border-style: dashed;
        }
        .device-card.pinned {
            border-color: var(--gold);
            border-width: 2px;
        }
        .device-card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }
        .device-title {
            font-size: 15px;
            font-weight: 800;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .device-title .delivered-icon {
            font-size: 14px;
            color: var(--accent-2);
        }
        .device-title .pinned-icon {
            font-size: 12px;
            color: var(--gold);
        }
        .device-customer {
            font-size: 12.5px;
            color: var(--text-dim);
            margin-top: 2px;
        }
        .badge {
            font-size: 11px;
            font-weight: 800;
            padding: 4px 9px;
            border-radius: 999px;
            white-space: nowrap;
            border: 1px solid transparent;
        }
        .device-issue {
            font-size: 12.5px;
            color: var(--text-dim);
            line-height: 1.5;
            margin: 0;
        }
        .device-foot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 2px;
        }
        .device-date {
            font-size: 11px;
            color: var(--text-faint);
        }
        .device-price {
            font-size: 13px;
            font-weight: 800;
            color: var(--accent);
        }
        .device-card.delivered-card .device-price {
            color: var(--accent-2);
        }

        /* ========== STEPPER ========== */
        .stepper {
            display: flex;
            align-items: center;
        }
        .stepper-step {
            display: flex;
            align-items: center;
        }
        .stepper-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--surface-3);
            border: 1px solid var(--border);
            display: block;
            transition: all 0.3s ease;
        }
        .stepper-step.done .stepper-dot {
            background: var(--dot);
            border-color: var(--dot);
            transform: scale(1.15);
        }
        .stepper-line {
            width: 16px;
            height: 2px;
            background: var(--surface-3);
            margin: 0 1px;
            transition: all 0.3s ease;
        }
        .stepper-step.done .stepper-line {
            background: var(--dot);
        }

        /* ========== CUSTOMER CARD ========== */
        .customer-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 13px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: transform 0.15s ease;
        }
        .customer-card:active {
            transform: scale(0.98);
        }
        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            flex: none;
            background: linear-gradient(135deg, var(--accent), #b85a1f);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: var(--accent-ink);
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.15s ease;
            position: relative;
        }
        .avatar:active {
            transform: scale(0.92);
        }
        .avatar .loyalty-ring {
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 2.5px solid var(--gold);
        }
        .customer-info {
            flex: 1;
            min-width: 0;
            cursor: pointer;
        }
        .customer-name {
            font-size: 14.5px;
            font-weight: 800;
        }
        .customer-meta {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 2px;
        }
        .call-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-2);
            flex: none;
            transition: all 0.15s ease;
            text-decoration: none;
        }
        .call-btn:active {
            transform: scale(0.9);
        }
        .call-btn svg {
            width: 16px;
            height: 16px;
        }

        /* ========== EMPTY STATE ========== */
        .empty-state {
            text-align: center;
            padding: 54px 20px;
            color: var(--text-dim);
        }
        .empty-state .em-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 14px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-faint);
        }
        .empty-state .em-icon svg {
            width: 24px;
            height: 24px;
        }
        .empty-state h4 {
            color: var(--text);
            font-size: 15px;
            margin: 0 0 6px;
        }
        .empty-state p {
            font-size: 12.5px;
            margin: 0 0 16px;
            line-height: 1.6;
        }

        /* ========== SEARCH & FILTERS ========== */
        .search-wrap {
            position: relative;
            margin-bottom: 12px;
        }
        .search-wrap svg {
            position: absolute;
            inset-inline-start: 13px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--text-faint);
        }
        .search-input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 11px 40px 11px 14px;
            color: var(--text);
            font-size: 13.5px;
            transition: border-color 0.2s ease;
        }
        .search-input::placeholder {
            color: var(--text-faint);
        }
        .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .chip-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            margin-bottom: 14px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .chip-row::-webkit-scrollbar {
            display: none;
        }
        .chip {
            flex: none;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 12.5px;
            font-weight: 700;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-dim);
            transition: all 0.15s ease;
            cursor: pointer;
        }
        .chip:active {
            transform: scale(0.95);
        }
        .chip.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--accent-ink);
        }

        /* ========== BUTTONS ========== */
        .btn {
            border: none;
            border-radius: var(--radius-md);
            padding: 13px 16px;
            font-size: 14px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            transition: all 0.15s ease;
            cursor: pointer;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn svg {
            width: 16px;
            height: 16px;
        }
        .btn-primary {
            background: var(--accent);
            color: var(--accent-ink);
        }
        .btn-primary:active {
            filter: brightness(.9);
        }
        .btn-ghost {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-danger {
            background: rgba(239, 91, 91, .12);
            color: var(--danger);
            border: 1px solid rgba(239, 91, 91, .3);
        }
        .btn-sm {
            padding: 9px 12px;
            font-size: 12.5px;
            width: auto;
        }
        .btn-wa {
            background: rgba(37, 211, 102, .12);
            color: var(--whatsapp);
            border: 1px solid rgba(37, 211, 102, .3);
        }
        .btn-sms {
            background: rgba(91, 141, 239, .12);
            color: var(--accent-3);
            border: 1px solid rgba(91, 141, 239, .3);
        }
        .btn-success {
            background: var(--accent-2);
            color: #1a1a2e;
        }
        .msg-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .msg-options .btn {
            flex: 1;
            min-width: 120px;
        }
        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .btn-gold {
            background: var(--gold);
            color: #1a1a2e;
        }
        .btn-outline-gold {
            background: transparent;
            color: var(--gold);
            border: 1.5px solid var(--gold);
        }

        /* ========== BOTTOM NAV ========== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            inset-inline: 0;
            z-index: 30;
            max-width: 560px;
            margin: 0 auto;
            background: rgba(26, 31, 40, .92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            padding: 8px 10px calc(8px + var(--safe-bottom));
            display: flex;
            align-items: center;
            justify-content: space-around;
        }
        .nav-btn {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            color: var(--text-faint);
            font-size: 9.5px;
            font-weight: 700;
            padding: 4px 4px;
            flex: 1;
            min-width: 0;
            transition: color 0.15s ease;
            cursor: pointer;
        }
        .nav-btn span {
            white-space: nowrap;
        }
        .nav-btn svg {
            width: 20px;
            height: 20px;
        }
        .nav-btn.active {
            color: var(--accent);
        }
        .fab {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-ink);
            box-shadow: 0 8px 18px rgba(255, 138, 61, .35);
            margin-top: -30px;
            flex: none;
            transition: all 0.15s ease;
            cursor: pointer;
            position: relative;
        }
        .fab svg {
            width: 24px;
            height: 24px;
        }
        .fab:active {
            transform: scale(0.92);
            filter: brightness(.9);
        }
        .fab .badge-count {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        /* ========== SHEET / MODAL ========== */
        .sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(8, 10, 14, .6);
            z-index: 40;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s ease;
        }
        .sheet-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        .sheet {
            width: 100%;
            max-width: 560px;
            max-height: 88vh;
            overflow-y: auto;
            background: var(--surface);
            border-radius: 22px 22px 0 0;
            border: 1px solid var(--border);
            border-bottom: none;
            padding: 10px 18px calc(22px + var(--safe-bottom));
            transform: translateY(20px);
            transition: transform .3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .sheet-overlay.open .sheet {
            transform: translateY(0);
        }
        .sheet-handle {
            width: 38px;
            height: 4px;
            background: var(--surface-3);
            border-radius: 99px;
            margin: 6px auto 14px;
        }
        .sheet-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .sheet-head h3 {
            margin: 0;
            font-size: 16.5px;
            font-weight: 800;
        }

        /* ========== FORM FIELDS ========== */
        .field {
            margin-bottom: 13px;
        }
        .field label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-dim);
            margin-bottom: 6px;
        }
        .field input,
        .field textarea,
        .field select {
            width: 100%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 11px 13px;
            color: var(--text);
            font-size: 14px;
            transition: border-color 0.2s ease;
        }
        .field input:focus,
        .field textarea:focus,
        .field select:focus {
            outline: none;
            border-color: var(--accent);
        }
        .field textarea {
            resize: vertical;
            min-height: 64px;
            line-height: 1.5;
        }
        .field-row {
            display: flex;
            gap: 10px;
        }
        .field-row .field {
            flex: 1;
        }
        .field input[type="file"] {
            padding: 8px;
            background: var(--surface-2);
        }

        /* ========== STATUS CHIPS ========== */
        .status-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .status-chip {
            flex: 1;
            min-width: 80px;
            text-align: center;
            padding: 10px 8px;
            border-radius: var(--radius-md);
            background: var(--surface-2);
            border: 1.5px solid var(--border);
            font-size: 12px;
            font-weight: 800;
            color: var(--text-dim);
            transition: all 0.15s ease;
            cursor: pointer;
        }
        .status-chip:active {
            transform: scale(0.95);
        }
        .status-chip.sel {
            color: var(--accent-ink);
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 18px 0;
        }
        .sub-label {
            font-size: 12.5px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 10px;
            display: block;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .detail-row:last-child {
            border-bottom: none;
        }
        .detail-row .k {
            font-size: 12.5px;
            color: var(--text-dim);
        }
        .detail-row .v {
            font-size: 13.5px;
            font-weight: 700;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }

        /* ========== REPORTS ========== */
        .report-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px;
            margin-bottom: 14px;
        }
        .report-big {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .report-big .num {
            font-size: 26px;
            font-weight: 800;
        }
        .report-big .lbl {
            font-size: 12px;
            color: var(--text-dim);
        }
        .bar-row {
            margin-bottom: 11px;
        }
        .bar-row:last-child {
            margin-bottom: 0;
        }
        .bar-row-top {
            display: flex;
            justify-content: space-between;
            font-size: 12.5px;
            margin-bottom: 5px;
        }
        .bar-row-top .nm {
            font-weight: 700;
            color: var(--text);
        }
        .bar-row-top .ct {
            color: var(--text-dim);
        }
        .bar-track {
            height: 8px;
            background: var(--surface-2);
            border-radius: 99px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 99px;
            background: var(--accent);
            transition: width 0.6s ease;
        }

        .period-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .period-row .chip {
            flex: 1;
            text-align: center;
        }

        /* ========== CHART ========== */
        .chart-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 14px;
            margin-bottom: 14px;
        }
        .chart-container canvas {
            width: 100% !important;
            height: 100px !important;
        }

        /* ========== TOAST ========== */
        .toast {
            position: fixed;
            bottom: calc(96px + var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--surface-3);
            color: var(--text);
            padding: 11px 20px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 700;
            box-shadow: var(--shadow);
            z-index: 60;
            opacity: 0;
            transition: all .25s ease;
            pointer-events: none;
            white-space: nowrap;
            border: 1px solid var(--border);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ========== SETTINGS ========== */
        .settings-list .s-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 13px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .settings-list .s-item:active {
            background: var(--surface-2);
        }
        .settings-list .s-item:last-child {
            border-bottom: none;
        }
        .s-item-l {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .s-item-l .ic {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--surface-2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            flex: none;
        }
        .s-item-l .ic svg {
            width: 17px;
            height: 17px;
        }
        .s-item-l .tx .t1 {
            font-size: 13.5px;
            font-weight: 700;
        }
        .s-item-l .tx .t2 {
            font-size: 11.5px;
            color: var(--text-dim);
            margin-top: 1px;
        }

        /* ========== LOYALTY BADGE ========== */
        .loyalty-tier {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px 2px 8px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 700;
        }
        .loyalty-tier.tier-bronze {
            background: rgba(205, 127, 50, .2);
            color: var(--bronze);
            border: 1px solid rgba(205, 127, 50, .3);
        }
        .loyalty-tier.tier-silver {
            background: rgba(192, 192, 192, .2);
            color: var(--silver);
            border: 1px solid rgba(192, 192, 192, .3);
        }
        .loyalty-tier.tier-gold {
            background: rgba(255, 215, 0, .2);
            color: var(--gold);
            border: 1px solid rgba(255, 215, 0, .3);
        }
        .loyalty-tier.tier-platinum {
            background: rgba(185, 242, 255, .15);
            color: #b9f2ff;
            border: 1px solid rgba(185, 242, 255, .25);
        }

        /* ========== NOTIFICATION BADGE ========== */
        .notification-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--danger);
            display: inline-block;
            margin-right: 4px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width:380px) {
            .stat-grid {
                grid-template-columns: 1fr 1fr;
                gap: 6px;
            }
            .stat-card {
                padding: 10px;
            }
            .stat-num {
                font-size: 18px;
            }
            .field-row {
                flex-direction: column;
                gap: 0;
            }
            .status-chip {
                min-width: 60px;
                padding: 8px 4px;
                font-size: 10px;
            }
        }

        @media (min-width:561px) {
            .bottom-nav {
                border-radius: 18px 18px 0 0;
            }
            .sheet {
                border-radius: 22px 22px 18px 18px;
                border: 1px solid var(--border);
                margin-bottom: 12px;
            }
            .sheet-overlay {
                align-items: center;
            }
        }

        /* ========== OVERDUE BADGE ========== */
        .overdue-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 2px 8px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 700;
            background: rgba(239,91,91,.15);
            color: var(--danger);
            border: 1px solid rgba(239,91,91,.3);
            margin-top: 2px;
        }

        /* ========== TECHNICIAN BADGE ========== */
        .tech-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 99px;
            font-size: 10.5px;
            font-weight: 700;
            background: rgba(91,141,239,.12);
            color: var(--accent-3);
            border: 1px solid rgba(91,141,239,.25);
        }

        /* ========== PROMISE DATE ========== */
        .promise-date {
            font-size: 11px;
            color: var(--accent-3);
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .promise-date.overdue {
            color: var(--danger);
        }

        /* ========== FIREBASE STATUS ========== */
        .sync-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent-2);
            display: inline-block;
            margin-left: 4px;
        }
        .sync-dot.syncing {
            background: var(--accent);
            animation: pulse 1s infinite;
        }
        .sync-dot.offline {
            background: var(--danger);
        }
        .sync-status {
            font-size: 10.5px;
            color: var(--text-faint);
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 99px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            cursor: pointer;
        }

        /* ========== PRINT STYLES ========== */
        @media print {
            /* أخفِ واجهة التطبيق الرئيسية بالكامل، ولا تُخفِ نافذة الـ sheet
               لأنها هي التي تحتوي على محتوى الطباعة (الفاتورة أو ملصق الباركود) */
            #app, .toast { display: none !important; }
            .btn, .form-actions, .sheet-handle, .sheet-head { display: none !important; }
            body { background: #fff !important; color: #000 !important; }
            .sheet-overlay {
                position: fixed !important;
                inset: 0 !important;
                background: #fff !important;
                display: block !important;
                padding: 0 !important;
            }
            .sheet {
                box-shadow: none !important;
                border: none !important;
                max-height: none !important;
                overflow: visible !important;
                background: #fff !important;
                color: #000 !important;
                width: 100% !important;
                margin: 0 !important;
                border-radius: 0 !important;
            }
        }
        #print-area { display: none; }

        /* ========== FIREBASE SETUP SCREEN ========== */
        .firebase-setup {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }
        .firebase-setup h2 {
            font-size: 20px;
            font-weight: 900;
            margin: 16px 0 8px;
            color: var(--text);
        }
        .firebase-setup p {
            font-size: 13px;
            color: var(--text-dim);
            margin: 0 0 20px;
            line-height: 1.6;
        }
        .firebase-icon {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            background: linear-gradient(135deg, #ff8a3d, #ff6b1a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 4px;
        }

        /* ========== INTERNAL NOTES ========== */
        .internal-note {
            background: rgba(255,138,61,.06);
            border: 1px dashed rgba(255,138,61,.3);
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 12px;
            color: var(--text-dim);
            margin: 6px 0;
            position: relative;
        }
        .internal-note::before {
            content: '🔒 ملاحظة داخلية';
            display: block;
            font-size: 10px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 3px;
        }

        /* ========== BRANCH/TECH SELECTOR ========== */
        .tech-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .tech-chip {
            flex: none;
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text-dim);
            cursor: pointer;
            transition: all .15s ease;
        }
        .tech-chip.selected {
            background: rgba(91,141,239,.2);
            border-color: var(--accent-3);
            color: var(--accent-3);
        }
    </style>
</head>
<body>

        <div class="topbar" id="topbar"></div>
        <main id="app-main"></main>
        <div class="bottom-nav" role="navigation" aria-label="القائمة الرئيسية">
            <button class="nav-btn active" data-nav="dashboard" aria-label="الرئيسية">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h5v-6h4v6h5V10"/></svg>

            <button class="nav-btn" data-nav="devices" aria-label="الأجهزة">

            </button>

                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

                <span>المخزون</span>

                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 20c0-3.3 2.9-5.6 6.2-5.6"/><circle cx="17" cy="9" r="2.4"/><path d="M13.5 20c.3-2.6 1.8-4.3 4-4.7"/></svg>

                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="20" x2="5" y2="13"/><line x1="10.3" y1="20" x2="10.3" y2="7"/><line x1="15.6" y1="20" x2="15.6" y2="15"/><line x1="21" y1="20" x2="21" y2="10"/></svg>
                <span>التقارير</span>
            </button>
        </div>
    </div>

    <div id="sheet-root"></div>
    <div class="toast" id="toast"></div>

    <script>
        // ========================================================================
        // دوال عامة
        // ========================================================================

        function calcFinalPrice() {
            var baseEl = document.getElementById('f-final');
            var discEl = document.getElementById('f-discount');
            var calcEl = document.getElementById('f-final-calc');
            var prevEl = document.getElementById('discount-preview');
            if (!baseEl || !discEl || !calcEl) return;
            var base = parseFloat(baseEl.value) || 0;
            var pct = Math.min(100, Math.max(0, parseFloat(discEl.value) || 0));
            var disc = Math.round(base * pct / 100);
            var final = base - disc;
            calcEl.value = final > 0 ? final : (base > 0 ? 0 : '');
            if (prevEl) prevEl.textContent = disc > 0 ? ('خصم: ' + disc + ' د.أ') : '';
        }

        function calcDetailPrice() {
            var base = parseFloat((document.getElementById('fprice-base') || { value: 0 }).value) || 0;
            var pct = Math.min(100, Math.max(0, parseFloat((document.getElementById('fprice-disc') || { value: 0 }).value) ||
            0));
            var disc = Math.round(base * pct / 100);
            var fin = base - disc;
            var calcEl = document.getElementById('fprice-inline');
            if (calcEl) calcEl.value = fin >= 0 ? fin : 0;
            var prev = document.getElementById('detail-disc-preview');
            if (prev) prev.textContent = disc > 0 ? ('خصم: ' + disc + ' د.أ') : '';
        }

        // ========================================================================
        // الكود الرئيسي للتطبيق
        // ========================================================================

        (function() {
            "use strict";

            /* ====================== ICONS ====================== */
            const ICONS = {

                phone: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h3.6l1.6 4.2-2.1 1.6a11.4 11.4 0 005.1 5.1l1.6-2.1L19 14.4V18a2 2 0 01-2.2 2A15.6 15.6 0 013 5.2 2 2 0 015 4z"/></svg>',

                trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 6.5h17"/><path d="M8.5 6.5v-2h7v2"/><path d="M18.5 6.5L17.7 20h-11.4L5.5 6.5"/></svg>',

                search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.4" y2="16.4"/></svg>',
                gear: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 13.6a7.7 7.7 0 000-3.2l1.9-1.6-2-3.4-2.3.8a7.7 7.7 0 00-2.7-1.6L13.8 2h-3.6l-.5 2.6a7.7 7.7 0 00-2.7 1.6l-2.3-.8-2 3.4 1.9 1.6a7.7 7.7 0 000 3.2l-1.9 1.6 2 3.4 2.3-.8c.8.7 1.7 1.3 2.7 1.6l.5 2.6h3.6l.5-2.6c1-.3 1.9-.9 2.7-1.6l2.3.8 2-3.4z"/></svg>',
                download: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12.5"/><polyline points="6.5 11 12 16.5 17.5 11"/><path d="M4.5 20.5h15"/></svg>',
                upload: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V7.5"/><polyline points="6.5 12 12 6.5 17.5 12"/><path d="M4.5 3.5h15"/></svg>',
                wipe: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 6.5h17"/><path d="M8.5 6.5v-2h7v2"/><path d="M18.5 6.5L17.7 20h-11.4L5.5 6.5"/></svg>',

            /* ====================== STATE / STORAGE ====================== */
            const KEYS = { customers: 'rt_customers', repairs: 'rt_repairs', settings: 'rt_settings', inventory: 'rt_inventory', sales: 'rt_sales', wholesaleCustomers: 'rt_wholesale_customers', stockLog: 'rt_stock_log', deletedLog: 'rt_deleted_log' };
            const LOW_STOCK_DEFAULT = 3;
            const INVENTORY_TYPES = ['شاشة', 'بطارية', 'كاميرا أمامية', 'كاميرا خلفية', 'سماعة داخلية', 'سماعة خارجية', 'منفذ الشحن', 'فيلكس / كيبل', 'زجاج خلفي', 'إطار / شاسيه', 'بورد / لوحة أم', 'أزرار', 'مايك', 'شاحن ووصلات', 'إكسسوارات', 'أخرى'];

            function load(key, fb) {
                try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fb; } catch (e) { return fb; }
            }

            function persist(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {} }

            let customers = load(KEYS.customers, []);
            let repairs = load(KEYS.repairs, []);
            let settings = load(KEYS.settings, { shopName: 'الماسة موبايل', currency: 'د.أ', theme: 'auto', securityPin: '' });
            let inventory = load(KEYS.inventory, []);
            let sales = load(KEYS.sales, []);
            let wholesaleCustomers = load(KEYS.wholesaleCustomers, []);
            let stockLog = load(KEYS.stockLog, []);
            // سجل "شواهد الحذف" (tombstones): يوثّق أي عنصر تم حذفه عمداً حتى لا تتم إعادته
            // من جهاز آخر أو من نسخة قديمة بالسحابة عند المزامنة
            let deletedLog = load(KEYS.deletedLog, []); // [{ collection, id, deletedAt }]

            function saveCustomers() { persist(KEYS.customers, customers); }

            function saveRepairs() { persist(KEYS.repairs, repairs); }

            function saveSettings() { persist(KEYS.settings, settings); }

            function saveInventory() { persist(KEYS.inventory, inventory); }

            function saveSales() { persist(KEYS.sales, sales); }

            function saveWholesaleCustomers() { persist(KEYS.wholesaleCustomers, wholesaleCustomers); }

            function saveDeletedLog() { persist(KEYS.deletedLog, deletedLog); }

            // ينادى دائماً قبل حذف أي عنصر من أي قسم (مخزون/زبائن/صيانات/مبيعات/جملة)
            // collection: اسم القسم كنص، id: معرف العنصر المحذوف
            function markDeleted(collection, id) {
                deletedLog = deletedLog.filter(function(d) { return !(d.collection === collection && d.id === id); });
                deletedLog.push({ collection: collection, id: id, deletedAt: Date.now() });
                saveDeletedLog();
            }

            function saveStockLog() { persist(KEYS.stockLog, stockLog); }

            function getWholesaleCustomer(id) {
                for (var i = 0; i < wholesaleCustomers.length; i++) {
                    if (wholesaleCustomers[i].id === id) return wholesaleCustomers[i];
                }
                return null;
            }

            function uid() { return Date.now() + '-' + Math.random().toString(36).slice(2, 9); }

            function todayStr() {
                const d = new Date();
                const off = d.getTimezoneOffset();
                const local = new Date(d.getTime() - off * 60000);
                return local.toISOString().slice(0, 10);
            }

            function fmtDate(s) { if (!s) return '—'; const parts = s.split('-'); return parts[2] + '/' + parts[1] + '/' +
                parts[0]; }

            function money(n) { return (Number(n) || 0).toLocaleString('en-US') + ' ' + settings.currency; }

            function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) { return ({ '&': '&amp;',
                        '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]; }); }

            /* ========== VALIDATION ========== */
            function validatePhone(phone) {
                var clean = String(phone).replace(/[^0-9]/g, '');
                return clean.length >= 7 && clean.length <= 12;
            }

            /* ========== STATUS ========== */
            var STATUS = {
                received: { label: 'مستلم', color: 'var(--accent-3)' },
                in_progress: { label: 'قيد العمل', color: 'var(--accent)' },
                waiting_parts: { label: 'بانتظار القطع', color: 'var(--accent-4)' },
                ready: { label: 'جاهز للتسليم', color: 'var(--accent-2)' },
                delivered: { label: 'تم التسليم', color: 'var(--accent-4)' }
            };
            var STATUS_ORDER = ['received', 'in_progress', 'waiting_parts', 'ready', 'delivered'];

            /* ========== LOYALTY SYSTEM ========== */
            var LOYALTY_TIERS = [
                { minVisits: 0, discount: 0, label: 'زبون جديد', tier: 'none', emoji: '👤' },
                { minVisits: 3, discount: 5, label: 'برونزي', tier: 'bronze', emoji: '🥉' },
                { minVisits: 6, discount: 10, label: 'فضي', tier: 'silver', emoji: '🥈' },
                { minVisits: 10, discount: 15, label: 'ذهبي', tier: 'gold', emoji: '🥇' },
                { minVisits: 15, discount: 20, label: 'ماسي', tier: 'platinum', emoji: '💎' }
            ];

            function getLoyaltyTier(visits) {
                var result = LOYALTY_TIERS[0];
                for (var i = LOYALTY_TIERS.length - 1; i >= 0; i--) {
                    if (visits >= LOYALTY_TIERS[i].minVisits) {
                        result = LOYALTY_TIERS[i];
                        break;
                    }
                }
                return result;
            }

            function getDeliveredCount(customerId, excludeRepairId) {
                var count = 0;
                for (var i = 0; i < repairs.length; i++) {
                    if (repairs[i].customerId === customerId && repairs[i].status === 'delivered' && repairs[i].id !==
                        excludeRepairId) count++;
                }
                return count;
            }

            /* ========== THEME ========== */
            function applyTheme() {
                var theme = settings.theme || 'auto';
                document.body.classList.remove('light-mode', 'dark-mode');
                if (theme === 'light') {
                    document.body.classList.add('light-mode');
                } else if (theme === 'dark') {
                    document.body.classList.add('dark-mode');
                }
                // auto mode handled by CSS media query
            }

            /* ========== TOAST ========== */
            var toastTimer = null;

            function toast(msg) {
                var el = document.getElementById('toast');
                el.textContent = msg;
                el.classList.add('show');
                clearTimeout(toastTimer);
                toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2200);
            }

            /* ====================== ICONS (continued) ====================== */
            const ICONS_EXTRA = {
                waiting: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
                ready: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'
            };

            /* ====================== VARIABLES ====================== */
            var currentView = 'dashboard';
            var deviceFilter = 'all';
            var deviceSearch = '';
            var customerSearch = '';
            var reportPeriod = 'month';
            var isSubmitting = false;
            var inventorySearch = '';
            var inventoryTypeFilter = '';

            /* ====================== HELPERS ====================== */
            function getCustomer(id) {
                for (var i = 0; i < customers.length; i++) {
                    if (customers[i].id === id) return customers[i];
                }
                return null;
            }

            function repairsForCustomer(id) {
                var result = [];
                for (var i = 0; i < repairs.length; i++) {
                    if (repairs[i].customerId === id) result.push(repairs[i]);
                }
                result.sort(function(a, b) { return b.createdAt - a.createdAt; });
                return result;
            }

            function findCustomerByPhone(phone) {
                var p = String(phone).trim();
                for (var i = 0; i < customers.length; i++) {
                    if (customers[i].phone.trim() === p) return customers[i];
                }
                return null;
            }

            /* ====================== INVENTORY HELPERS ====================== */
            function getInventoryItem(id) {
                for (var i = 0; i < inventory.length; i++) {
                    if (inventory[i].id === id) return inventory[i];
                }
                return null;
            }

            function invMinQty(item) { return (item.minQty !== undefined && item.minQty !== null && item.minQty !== '') ? Number(item.minQty) : LOW_STOCK_DEFAULT; }

            function invLevel(item) {
                var qty = Number(item.qty) || 0;
                var min = invMinQty(item);
                if (qty <= 0) return 'out';
                if (qty <= min) return 'low';
                if (qty <= min * 2) return 'warn';
                return 'ok';
            }

            function invLowStockList() {
                var out = [];
                for (var i = 0; i < inventory.length; i++) {
                    var lvl = invLevel(inventory[i]);
                    if (lvl === 'low' || lvl === 'out') out.push(inventory[i]);
                }
                return out;
            }

            // تعديل الكمية (سالب = خصم/سحب/بيع، موجب = توريد)، مع تنبيه عند وصول الكمية لحد التنبيه
            function adjustInventoryQty(itemId, delta, silent) {
                var item = getInventoryItem(itemId);
                if (!item) return null;
                var newQty = (Number(item.qty) || 0) + delta;
                if (newQty < 0) newQty = 0;
                item.qty = newQty;
                item.updatedAt = Date.now();
                saveInventory();
                if (!silent) {
                    var lvl = invLevel(item);
                    if (lvl === 'out') {
                        toast('⛔ نفدت الكمية من "' + item.name + '" في المخزون');
                    } else if (lvl === 'low') {
                        toast('⚠️ تنبيه: كمية "' + item.name + '" وصلت إلى ' + item.qty + ' فقط');
                    }
                }
                return item;
            }

            /* ====================== الحماية بالرقم السري ====================== */
            // ينفّذ action مباشرة إن لم يكن هناك رقم سري مفعّل، وإلا يطلب إدخاله أولاً
            function requirePin(action, label) {
                if (!settings.securityPin) { action(); return; }
                showPinPrompt(label, function(entered) {
                    if (entered === null) return; // تم الإلغاء
                    if (entered === settings.securityPin) {
                        action();
                    } else {
                        toast('🚫 رقم سري غير صحيح');
                    }
                });
            }

            function showPinPrompt(label, onSubmit) {
                var overlay = document.createElement('div');
                overlay.style.cssText = 'position:fixed;inset:0;background:rgba(8,10,14,.75);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px';
                var box = document.createElement('div');
                box.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:24px 22px;max-width:320px;width:100%;text-align:center';
                box.innerHTML =
                    '<div style="font-size:32px;margin-bottom:8px">🔒</div>' +
                    '<div style="font-size:15px;font-weight:800;margin-bottom:4px">أدخل الرقم السري</div>' +
                    '<div style="font-size:12px;color:var(--text-faint);margin-bottom:14px">' + esc(label || '') + '</div>' +
                    '<input type="password" inputmode="numeric" id="pin-prompt-input" placeholder="••••" autocomplete="off" style="width:100%;box-sizing:border-box;text-align:center;font-size:22px;letter-spacing:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:12px;color:var(--text);margin-bottom:14px">' +
                    '<div style="display:flex;gap:8px">' +
                    '<button id="pin-prompt-cancel" class="btn btn-ghost" style="flex:1">إلغاء</button>' +
                    '<button id="pin-prompt-confirm" class="btn btn-primary" style="flex:1">تأكيد</button>' +
                    '</div>';
                overlay.appendChild(box);
                document.body.appendChild(overlay);
                var input = document.getElementById('pin-prompt-input');
                setTimeout(function() { input.focus(); }, 50);
                var done = false;
                function finish(val) {
                    if (done) return;
                    done = true;
                    if (overlay.parentNode) document.body.removeChild(overlay);
                    onSubmit(val);
                }
                document.getElementById('pin-prompt-cancel').onclick = function() { finish(null); };
                document.getElementById('pin-prompt-confirm').onclick = function() { finish(input.value.trim()); };
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') finish(input.value.trim());
                    else if (e.key === 'Escape') finish(null);
                });
                overlay.addEventListener('click', function(e) { if (e.target === overlay) finish(null); });
            }

            /* يضبط مقاس الصفحة (@page) مؤقتاً وقت الطباعة فقط، ليلائم عرض ورق الطابعة الحرارية
               (لا يؤثر على طباعة الفاتورة العادية لأنه يُزال فور انتهاء الطباعة) */
            function withPrintPageSize(sizeCss, cb, extraCss) {
                var styleTag = document.createElement('style');
                styleTag.id = 'dynamic-print-page-size';
                styleTag.textContent = '@page { size: ' + sizeCss + '; margin: 2mm; }' + (extraCss || '');
                document.head.appendChild(styleTag);
                var cleanup = function() {
                    var t = document.getElementById('dynamic-print-page-size');
                    if (t) t.remove();
                    window.removeEventListener('afterprint', cleanup);
                };
                window.addEventListener('afterprint', cleanup);
                cb();
                // شبكة أمان في حال لم يُطلق المتصفح afterprint (نادراً)
                setTimeout(cleanup, 5000);
            }

            /* ====================== طباعة ملصق باركود ====================== */
            var jsBarcodeLibLoading = false;

            function loadJsBarcodeLib(cb) {
                if (window.JsBarcode) { cb(); return; }
                if (jsBarcodeLibLoading) {
                    var waitTimer = setInterval(function() {
                        if (window.JsBarcode) { clearInterval(waitTimer); cb(); }
                    }, 150);
                    return;
                }
                jsBarcodeLibLoading = true;
                var s = document.createElement('script');
                s.src = 'https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js';
                s.onload = function() { jsBarcodeLibLoading = false; cb(); };
                s.onerror = function() {
                    jsBarcodeLibLoading = false;
                    toast('⚠️ تعذّر تحميل مكتبة الباركود، تحقق من اتصال الإنترنت');
                };
                document.head.appendChild(s);
            }

            // يفتح نافذة صغيرة تحتوي فقط على ملصق باركود الصنف (اسم + رمز الباركود) وتطبعه عند الضغط على زر الطباعة
            // لا تتم طباعة أي شيء آخر من التطبيق لأن ورقة الطباعة (@media print) تُخفي واجهة التطبيق بالكامل
            // وتُبقي فقط محتوى نافذة الـ sheet هذه ظاهراً
            // مقاسات ملصقات شائعة لطابعات الباركود الحرارية (مثل Xprinter XP-365B: عرض ورق 20-82مم)
            var BARCODE_LABEL_SIZES = [
                { key: '50x30', label: '50×30مم (شائع لملصقات الجوالات)', w: '50mm', h: '30mm' },
                { key: '40x30', label: '40×30مم', w: '40mm', h: '30mm' },
                { key: '40x20', label: '40×20مم', w: '40mm', h: '20mm' },
                { key: '58x40', label: '58×40مم', w: '58mm', h: '40mm' },
                { key: '80auto', label: '80مم (لفة كاملة الطول التلقائي)', w: '80mm', h: 'auto' }
            ];

            function printInventoryBarcode(item) {
                if (!item || !item.barcode) { toast('⚠️ لا يوجد باركود لهذا الصنف'); return; }
                var savedSize = localStorage.getItem('barcodeLabelSize') || '50x30';
                var savedRotate = localStorage.getItem('barcodeLabelRotate180') === '1';

                var sizeOptions = BARCODE_LABEL_SIZES.map(function(s) {
                    return '<option value="' + s.key + '"' + (s.key === savedSize ? ' selected' : '') + '>' + s.label + '</option>';
                }).join('');

                var html = '<div class="sheet-handle"></div>' +
                    '<div class="sheet-head"><h3>🏷️ ملصق الباركود</h3><button class="icon-btn" id="sheet-close" aria-label="إغلاق">' + ICONS.close + '</button></div>' +
                    '<div id="barcode-label-content" style="background:#fff;border-radius:12px;padding:10px 6px;text-align:center;max-width:280px;margin:0 auto' + (savedRotate ? ';transform:rotate(180deg)' : '') + '">' +
                    '<div style="font-size:12px;font-weight:800;color:#000;margin-bottom:4px;word-break:break-word">' + esc(item.name) + '</div>' +
                    '<svg id="barcode-label-svg" style="max-width:100%"></svg>' +
                    (item.price ? '<div style="font-size:11px;color:#000;margin-top:2px">' + money(item.price) + '</div>' : '') +
                    '</div>' +
                    '<div class="field" style="margin-top:14px"><label for="barcode-label-size">مقاس الملصق</label><select id="barcode-label-size">' + sizeOptions + '</select></div>' +
                    '<label style="display:flex;align-items:center;gap:8px;margin-top:10px;font-size:13px;color:var(--text-dim)"><input type="checkbox" id="barcode-label-rotate"' + (savedRotate ? ' checked' : '') + ' style="width:auto"> الملصق يخرج مقلوباً من الطابعة (تدوير 180°)</label>' +
                    (isUsbPrintSupported() ?
                        '<div style="display:flex;gap:8px;margin-top:14px"><button class="btn btn-primary print-btn" id="print-barcode-usb" style="flex:1">⚡ طباعة مباشرة (USB)</button></div>' +
                        '<div id="usb-printer-status" style="margin-top:6px;font-size:11.5px;color:var(--text-faint);text-align:center">' + (usbPrinterDevice ? '🟢 الطابعة متصلة' : '⚪ اضغط "طباعة مباشرة" لتوصيل الطابعة (مرة واحدة فقط)') + '</div>' +
                        '<div style="display:flex;gap:8px;margin-top:10px"><button class="btn btn-ghost btn-sm" id="print-barcode-label" style="flex:1;font-size:12px">🖨️ طباعة عبر المتصفح (احتياطي)</button><button class="btn btn-ghost btn-sm" id="close-barcode-label" style="flex:1;font-size:12px">إغلاق</button></div>'
                        :

                    );

                openSheet(html);

                function applyRotatePreview() {

                var usbBtn = document.getElementById('print-barcode-usb');
                if (usbBtn) {
                    usbBtn.onclick = function() {

                        localStorage.setItem('barcodeLabelSize', sizeKey);
