            function renderCustomers() {
                if (!isUnlocked) return '<div class="empty-state"><div class="empty-icon">🔒</div><h4>مقفل</h4><p>أدخل الرقم السري للوصول</p></div>';
                let html = `<div class="section-head"><h3>👤 الزبائن (${DATA.customers.length})</h3></div>`;
                if (DATA.customers.length) {
                    html += '<div class="card-list">';
                    DATA.customers.forEach(c => {
                        const count = DATA.repairs.filter(r => r.customerId === c.id).length;
                        html += `<div class="device-card" data-customer-id="${c.id}">
                            <div><span style="font-weight:800">${esc(c.name)}</span>
                            <div style="font-size:11px;color:var(--text-dim)">📞 ${esc(c.phone)} · ${count} جهاز</div></div>
                        </div>`;
                    });
                    html += '</div>';
                } else {
                    html += '<div class="empty-state"><div class="empty-icon">👤</div><h4>لا يوجد زبائن</h4></div>';
                }
                return html;
            }

            // ===== REPORTS =====
            function renderReports() {
                if (!isUnlocked) return '<div class="empty-state"><div class="empty-icon">🔒</div><h4>مقفل</h4><p>أدخل الرقم السري للوصول</p></div>';
                const delivered = DATA.repairs.filter(r => r.status === 'delivered');
                const revenue = delivered.reduce((s, r) => s + (Number(r.finalPrice) || 0), 0);
                let totalDebts = 0;
                DATA.repairs.forEach(r => {
                    if (r.status === 'delivered' && r.paidAmount !== undefined) {
                        const debt = (Number(r.finalPrice) || 0) - (Number(r.paidAmount) || 0);
                        if (debt > 0) totalDebts += debt;
                    }
                });
                const totalSales = DATA.sales.reduce((s, sale) => s + (Number(sale.total) || 0), 0);
                const totalExpenses = DATA.expenses.reduce((s, e) => s + (Number(e.amount) || 0), 0);
                const isManagerRole = isManager();

                let html = `<div class="stat-grid">
                    <div class="stat-card"><span class="bar" style="background:#3fb950"></span><div class="stat-num">${delivered.length}</div><div class="stat-label">✅ تم التسليم</div></div>
                    <div class="stat-card"><span class="bar" style="background:#f0883e"></span><div class="stat-num">${money(revenue)}</div><div class="stat-label">💰 الإيرادات</div></div>
                    <div class="stat-card"><span class="bar" style="background:#f85149"></span><div class="stat-num">${money(totalDebts)}</div><div class="stat-label">⚠️ الديون</div></div>
                    <div class="stat-card"><span class="bar" style="background:#58a6ff"></span><div class="stat-num">${money(totalSales)}</div><div class="stat-label">🧾 مبيعات المخزون</div></div>
                    <div class="stat-card"><span class="bar" style="background:#d29922"></span><div class="stat-num">${money(totalExpenses)}</div><div class="stat-label">📊 المصاريف</div></div>
                    <div class="stat-card"><span class="bar" style="background:${revenue - totalExpenses >= 0 ? '#3fb950' : '#f85149'}"></span><div class="stat-num" style="color:${revenue - totalExpenses >= 0 ? 'var(--text)' : 'var(--danger)'}">${money(revenue - totalExpenses)}</div><div class="stat-label">📈 صافي الربح</div></div>
                </div>`;

                html += `<div class="chip-row" id="report-period">
                    ${['today','week','month','quarter','all'].map((p,i) => `<button class="chip${i===2?' active':''}" data-period="${p}">${p==='today'?'اليوم':p==='week'?'أسبوع':p==='month'?'شهر':p==='quarter'?'ربع سنة':'الكل'}</button>`).join('')}
                </div>`;

                html += `<div style="margin-bottom:12px">
                    <div class="report-grid" style="margin-bottom:8px">
                        <button class="btn btn-ghost" id="export-csv">📥 CSV</button>
                        <button class="btn btn-ghost" id="export-pdf">📄 PDF</button>
                    </div>
                    <div class="report-grid" style="margin-bottom:8px">
                        <button class="btn btn-primary" id="view-sales-invoices">🧾 فواتير البيع</button>
                        <button class="btn btn-success" id="view-repair-invoices">📋 فواتير الصيانة</button>
                    </div>
                    ${isManagerRole ? `<div style="background:rgba(210,153,34,0.05);border:1px solid rgba(210,153,34,0.15);border-radius:12px;padding:10px;margin-bottom:8px">
                        <div style="font-size:10px;color:var(--gold);margin-bottom:6px">👨‍💼 أدوات المدير</div>
                        <div class="report-grid">
                            <button class="btn btn-manager" id="open-tech">👨‍🔧 الفنيين</button>
                            <button class="btn btn-manager" id="open-coupons">🎫 كوبونات</button>
                            <button class="btn btn-manager" id="open-expenses">🧾 مصاريف</button>
                            <button class="btn btn-manager" id="open-suppliers">🏢 موردون</button>
                            <button class="btn btn-manager" id="open-debts">⚠️ الديون</button>
                            <button class="btn btn-manager" id="open-restock">🚚 التزويد</button>
                        </div>
                    </div>` : ''}
                    <div style="background:rgba(88,166,255,0.05);border:1px solid rgba(88,166,255,0.15);border-radius:12px;padding:10px;margin-bottom:8px">
                        <div style="font-size:10px;color:var(--accent-3);margin-bottom:6px">🧑‍💼 أدوات الكاشير</div>
                        <div class="report-grid">
                            <button class="btn btn-cashier" id="view-sales-invoices-cashier">🧾 فواتير البيع</button>
                            <button class="btn btn-cashier" id="view-repair-invoices-cashier">📋 فواتير الصيانة</button>
                            <button class="btn btn-cashier" id="print-daily-report">📊 تقرير اليوم</button>
                            <button class="btn btn-cashier" id="open-sales-history">📋 سجل المبيعات</button>
                        </div>
                    </div>
                    <div style="font-size:10px;color:var(--text-faint);text-align:center;margin-top:4px">
                        صلاحيتك الحالية محددة تلقائياً حسب الرقم السري الذي دخلت فيه: <b>${isManagerRole ? '👨‍💼 مدير' : '🧑‍💼 كاشير'}</b>
                    </div>
                    <button class="btn btn-sm btn-ghost" id="change-pin-btn" style="margin-top:6px">🔑 الإعدادات وأرقام الدخول</button>
                </div>`;
                return html;
            }

            // ===== SALES =====
            function renderSales() {
                if (!isUnlocked) return '<div class="empty-state"><div class="empty-icon">🔒</div><h4>مقفل</h4><p>أدخل الرقم السري للوصول</p></div>';
                let html = '';
                html += `<div class="field-row" style="margin-bottom:10px">
                    <div class="field" style="margin-bottom:0">
                        <label>نوع البيع</label>
                        <select id="sale-type-select" style="font-weight:800">
                            <option value="retail" ${saleType==='retail'?'selected':''}>🏪 بيع داخل المحل</option>
                            <option value="wholesale" ${saleType==='wholesale'?'selected':''}>📦 بيع جملة</option>
                        </select>
                    </div>
                    <div class="field" style="margin-bottom:0" id="wholesale-customer-field" style="display:${saleType==='wholesale'?'block':'none'}">
                        <label>عميل الجملة</label>
                        <select id="wholesale-customer-select">
                            <option value="">— بدون تحديد —</option>
                            ${DATA.wholesaleCustomers.map(wc => `<option value="${wc.id}">${esc(wc.name)}${wc.phone ? ' ('+esc(wc.phone)+')' : ''}</option>`).join('')}
                        </select>
                    </div>
                </div>`;

                html += `<div style="display:flex;gap:6px;margin-bottom:10px">
                    <select id="add-item-select" style="flex:3;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text);font-size:12px">
                        <option value="">🔍 اختر صنف...</option>
                        ${DATA.inventory.slice().sort((a,b)=> (a.name||'').localeCompare(b.name||'', 'ar')).map(item => {
                            const qty = Number(item.qty) || 0;
                            return `<option value="${item.id}"${qty<=0?' disabled':''}>${esc(item.name)} (المتوفر: ${qty})${item.price ? ' - '+money(item.price) : ''}</option>`;
                        }).join('')}
                    </select>
                    <div class="field" style="margin-bottom:0;flex:1">
                        <input type="number" id="add-item-qty" value="1" min="1" style="text-align:center;font-weight:800;width:100%;padding:8px 6px">
                    </div>
                    <button class="btn btn-primary btn-sm" id="add-to-cart-btn" style="flex:none;padding:8px 14px;width:auto">➕</button>
                </div>`;

                html += `<div style="margin-bottom:10px">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
                        <span style="font-weight:800;font-size:13px">🛒 السلة (${saleCart.length} صنف)</span>
                        <span style="font-size:12px;color:var(--text-dim)">${saleType==='wholesale'?'📦 جملة':'🏪 محل'}</span>
                    </div>`;
                if (saleCart.length === 0) {
                    html += '<div class="empty-state" style="padding:20px 0"><div class="empty-icon">🛒</div><h4>السلة فارغة</h4><p>أضف أصنافاً للبيع</p></div>';
                } else {
                    let total = 0;
                    html += '<div id="cart-items">';
                    saleCart.forEach((item, i) => {
                        const lineTotal = item.price * item.qty;
                        total += lineTotal;
                        html += `<div class="cart-item" data-cart-index="${i}">
                            <span class="item-name">${esc(item.name)}</span>
                            <div class="item-actions">
                                <button class="cart-qty-btn" data-index="${i}" data-delta="-1">−</button>
                                <span class="item-qty">${item.qty}</span>
                                <button class="cart-qty-btn" data-index="${i}" data-delta="1">+</button>
                            </div>
                            <span class="item-price">${money(lineTotal)}</span>
                            <button class="cart-remove-btn" data-index="${i}">✕</button>
                        </div>`;
                    });
                    html += '</div>';
                    html += `<div class="cart-total"><span class="total-label">الإجمالي</span><span class="total-amount">${money(total)}</span></div>`;
                }
                html += '</div>';

                html += `<div style="display:flex;gap:6px">
                    <button class="btn btn-danger" id="clear-cart-btn" ${saleCart.length===0?'disabled':''} style="flex:1">🗑️ تفريغ</button>
                    <button class="btn btn-success" id="complete-sale-btn" ${saleCart.length===0?'disabled':''} style="flex:2">✅ إتمام البيع</button>
                </div>`;
                html +=
                    `<button class="btn btn-outline-gold btn-sm" id="scan-barcode-sale-btn" style="margin-top:8px;width:100%">📷 مسح باركود لإضافة صنف</button>`;
                html +=
                    `<button class="btn btn-ghost btn-sm" id="manage-wholesale-btn" style="margin-top:6px;width:100%">👥 إدارة عملاء الجملة (${DATA.wholesaleCustomers.length})</button>`;
                return html;
            }

            // ===== INVENTORY =====
            function renderInventory() {
                if (!isUnlocked) return '<div class="empty-state"><div class="empty-icon">🔒</div><h4>مقفل</h4><p>أدخل الرقم السري للوصول</p></div>';
                let html =
                    `<div class="section-head"><h3>📦 المخزون (${DATA.inventory.length})</h3>${isManager() ? '<a id="add-inventory-btn">➕ إضافة</a>' : ''}</div>`;
                html +=
                    `<button class="btn btn-outline-gold" id="scan-barcode-btn" style="margin-bottom:10px">📷 مسح الباركود (كاميرا)</button>`;

                const lowItems = DATA.inventory.filter(it => (Number(it.qty) || 0) <= (it.minQty || 3));
                if (lowItems.length) {
                    html += `<div style="background:rgba(248,81,73,0.08);border:1px solid rgba(248,81,73,0.25);border-radius:12px;padding:8px 12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
                        <span style="font-size:12px;color:var(--danger)">⚠️ ${lowItems.length} صنف بكمية منخفضة</span>
                        ${isManager() ? `<button class="btn btn-sm btn-primary" id="export-restock-btn" style="padding:4px 10px;font-size:10px;width:auto">🚚 تصدير الناقص</button>` : ''}
                    </div>`;
                }

                html +=
                    `<button class="btn btn-sm btn-ghost" id="open-restock-btn" style="margin-bottom:10px;width:auto;padding:6px 14px">📋 قائمة التزويد (${DATA.restockList.length})</button>`;

                if (DATA.inventory.length) {
                    html += '<div class="card-list">';
                    DATA.inventory.forEach(it => {
                        const qty = Number(it.qty) || 0;
                        const color = qty <= 0 ? 'var(--danger)' : (qty <= (it.minQty || 3) ? 'var(--accent)' :
                            'var(--text)');
                        const hasBarcode = !!it.barcode;
                        html += `<div class="device-card" data-inv-item="${it.id}">
                            <div style="display:flex;justify-content:space-between;align-items:center">
                                <span style="font-weight:800">${esc(it.name)}</span>
                                <span style="font-weight:800;color:${color}">${qty}</span>
                            </div>
                            <div style="display:flex;gap:6px;flex-wrap:wrap;font-size:11px;color:var(--text-dim)">
                                ${it.price ? money(it.price) : ''}
                                ${it.type ? `<span style="color:var(--accent-3)">${esc(it.type)}</span>` : ''}
                                ${hasBarcode ? `<span style="font-family:monospace;background:var(--surface-2);padding:1px 6px;border-radius:4px">🏷️ ${esc(it.barcode)}</span>` : `<span style="color:var(--danger)">⚠️ لا يوجد باركود</span>`}
                            </div>
                            ${isManager() ? `<div style="display:flex;gap:4px;margin-top:4px;flex-wrap:wrap">
                                <button class="btn btn-sm btn-ghost" data-inv-minus="${it.id}" style="flex:1;min-width:36px">−</button>
                                <button class="btn btn-sm btn-ghost" data-inv-plus="${it.id}" style="flex:1;min-width:36px">+</button>
                                <button class="btn btn-sm btn-ghost" data-inv-edit="${it.id}" style="flex:1;min-width:50px">✏️ تعديل</button>
                                ${hasBarcode ? `<button class="btn btn-sm btn-primary" data-inv-print-dialog="${it.id}" style="flex:1;min-width:60px">🖨️ طباعة</button>` : `<button class="btn btn-sm btn-gold" data-inv-generate-barcode="${it.id}" style="flex:1;min-width:50px">➕🏷️</button>`}
                                <button class="btn btn-sm btn-danger" data-inv-delete="${it.id}" style="flex:none;min-width:36px">🗑️</button>
                            </div>` : `<div style="font-size:10px;color:var(--text-faint);margin-top:4px">🔒 تعديل المخزون متاح للمدير فقط</div>`}
                        </div>`;
                    });
                    html += '</div>';
                } else {
                    html += '<div class="empty-state"><div class="empty-icon">📦</div><h4>المخزون فارغ</h4><p>أضف أول صنف</p></div>';
                }
                return html;
            }

            // ============================================================
            //  MAIN RENDER
            // ============================================================
            function renderAll() {
                if (!isUnlocked) {
                    document.getElementById('topbar').innerHTML = '';
                    document.getElementById('app-main').innerHTML =
                        '<div class="empty-state"><div class="empty-icon">🔒</div><h4>التطبيق مقفل</h4><p>أدخل الرقم السري للوصول</p></div>';
                    return;
                }
                renderTopbar();
                const main = document.getElementById('app-main');
                switch (currentView) {
                    case 'dashboard':
                        main.innerHTML = renderDashboard();
                        break;
                    case 'devices':
                        main.innerHTML = renderDevices();
                        break;
                    case 'customers':
                        main.innerHTML = renderCustomers();
                        break;
                    case 'reports':
                        main.innerHTML = renderReports();
                        break;
                    case 'sales':
                        main.innerHTML = renderSales();
                        break;
                    case 'inventory':
                        main.innerHTML = renderInventory();
                        break;
                    default:
                        main.innerHTML = renderDashboard();
                }
                attachListeners();

                // Update device badge
                const ready = DATA.repairs.filter(r => r.status === 'ready').length;
                const badge = document.getElementById('devices-badge');
                if (badge) {
                    if (ready > 0) { badge.style.display = 'block';
                        badge.textContent = ready; } else { badge.style.display = 'none'; }
                }
            }

            // ============================================================
            //  ATTACH LISTENERS
            // ============================================================
            function attachListeners() {
                // Device cards
                document.querySelectorAll('[data-device-id]').forEach(el => {
                    el.onclick = function() { openDeviceDetail(this.getAttribute('data-device-id')); };
                });
                document.querySelectorAll('[data-customer-id]').forEach(el => {
                    el.onclick = function() { openCustomerDetail(this.getAttribute('data-customer-id')); };
                });

                // Navigation
                document.getElementById('see-all-devices')?.addEventListener('click', () => navigate('devices'));
                document.getElementById('add-device-btn')?.addEventListener('click', () => { if (requireAuth('manager'))
                        openDeviceForm(); });
                document.getElementById('add-inventory-btn')?.addEventListener('click', () => { if (requireAuth(
                        'manager')) openInventoryForm(); });

                // Reports
                document.getElementById('export-csv')?.addEventListener('click', exportCSVReport);
                document.getElementById('export-pdf')?.addEventListener('click', exportPDFReport);
                document.getElementById('view-sales-invoices')?.addEventListener('click', openSalesInvoices);
                document.getElementById('view-repair-invoices')?.addEventListener('click', openRepairInvoices);
                document.getElementById('view-sales-invoices-cashier')?.addEventListener('click', openSalesInvoices);
                document.getElementById('view-repair-invoices-cashier')?.addEventListener('click', openRepairInvoices);
                document.getElementById('open-tech')?.addEventListener('click', openTechniciansSheet);
                document.getElementById('open-coupons')?.addEventListener('click', openCouponsSheet);
                document.getElementById('open-expenses')?.addEventListener('click', openExpensesSheet);
                document.getElementById('open-suppliers')?.addEventListener('click', openSuppliersSheet);
                document.getElementById('open-debts')?.addEventListener('click', openDebtsSheet);
                document.getElementById('open-restock')?.addEventListener('click', openRestockList);
                document.getElementById('open-sales-history')?.addEventListener('click', openSalesHistory);
                document.getElementById('print-daily-report')?.addEventListener('click', printDailyReport);
                document.getElementById('change-pin-btn')?.addEventListener('click', openSettingsSheet);

                // Period filters
                document.querySelectorAll('#report-period .chip').forEach(btn => {
                    btn.onclick = function() {
                        document.querySelectorAll('#report-period .chip').forEach(b => b.classList.toggle(
                            'active', b === this));
                        toast('📅 تم تغيير الفترة إلى: ' + this.textContent);
                    };
                });

                // Device filters
                document.querySelectorAll('#device-filters .chip').forEach(btn => {
                    btn.onclick = function() {
                        const filter = this.getAttribute('data-filter');
                        document.querySelectorAll('#device-filters .chip').forEach(b => b.classList.toggle(
                            'active', b.getAttribute('data-filter') === filter));
                        document.querySelectorAll('[data-device-id]').forEach(el => {
                            const id = el.getAttribute('data-device-id');
                            const r = DATA.repairs.find(x => x.id === id);
                            if (r) el.style.display = (filter === 'all' || r.status === filter) ? '' :
                                'none';
                        });
                    };
                });

                // Inventory actions
                document.querySelectorAll('[data-inv-plus]').forEach(el => {
                    el.onclick = function(e) {
                        if (!requireAuth('manager')) return;
                        e.stopPropagation();
                        const id = this.getAttribute('data-inv-plus');
                        const item = getInventoryItem(id);
                        if (item) { item.qty = (Number(item.qty) || 0) + 1;
                            item.updatedAt = Date.now();
                            saveCollection('inventory', DATA.inventory);
                            renderAll();
                            toast('✅ تمت الزيادة'); }
                    };
                });
                document.querySelectorAll('[data-inv-minus]').forEach(el => {
                    el.onclick = function(e) {
                        if (!requireAuth('manager')) return;
                        e.stopPropagation();
                        const id = this.getAttribute('data-inv-minus');
                        const item = getInventoryItem(id);
                        if (item) {
                            let qty = (Number(item.qty) || 0) - 1;
                            item.qty = qty < 0 ? 0 : qty;
                            item.updatedAt = Date.now();
                            saveCollection('inventory', DATA.inventory);
                            renderAll();
                            if (item.qty <= 0) toast('⚠️ نفدت كمية "' + item.name + '"');
                            else toast('✅ تم النقص');
                        }
                    };
                });
                document.querySelectorAll('[data-inv-delete]').forEach(el => {
                    el.onclick = function(e) {
                        if (!requireAuth('manager')) return;
                        e.stopPropagation();
                        const id = this.getAttribute('data-inv-delete');
                        if (confirm('حذف هذا الصنف؟')) {
                            recordTombstone('inventory', id);
                            DATA.inventory = DATA.inventory.filter(x => x.id !== id);
                            DATA.restockList = DATA.restockList.filter(r => r.itemId !== id);
                            saveCollection('inventory', DATA.inventory);
                            saveCollection('restockList', DATA.restockList);
                            renderAll();
                            toast('🗑️ تم الحذف');
                        }
                    };
                });
                document.querySelectorAll('[data-inv-edit]').forEach(el => {
                    el.onclick = function(e) {
                        if (!requireAuth('manager')) return;
                        e.stopPropagation();
                        const item = getInventoryItem(this.getAttribute('data-inv-edit'));
                        if (item) openInventoryForm(null, item);
                    };
                });
                document.querySelectorAll('[data-inv-print-dialog]').forEach(el => {
                    el.onclick = function(e) {
                        if (!requireAuth('manager')) return;
                        e.stopPropagation();
                        const item = getInventoryItem(this.getAttribute('data-inv-print-dialog'));
                        if (item) openBarcodePrintDialog(item);
                    };
                });
                document.querySelectorAll('[data-inv-generate-barcode]').forEach(el => {
                    el.onclick = function(e) {
                        if (!requireAuth('manager')) return;
                        e.stopPropagation();
                        const item = getInventoryItem(this.getAttribute('data-inv-generate-barcode'));
                        if (item) { generateBarcode(item);
                            renderAll();
                            toast('✅ تم إنشاء الباركود: ' + item.barcode); }
                    };
                });
                document.getElementById('scan-barcode-btn')?.addEventListener('click', openInventoryBarcodeScanner);
                document.getElementById('export-restock-btn')?.addEventListener('click', () => { if (requireAuth(
                        'manager')) exportLowStockToRestock(); });
                document.getElementById('open-restock-btn')?.addEventListener('click', () => { if (requireAuth(
                        'manager')) openRestockList(); });

                // Sales listeners
                attachSalesListeners();
            }

            // ============================================================
            //  SALES LISTENERS
            // ============================================================
            function attachSalesListeners() {
                document.getElementById('sale-type-select')?.addEventListener('change', function() {
                    saleType = this.value;
                    const wcField = document.getElementById('wholesale-customer-field');
                    if (wcField) wcField.style.display = saleType === 'wholesale' ? 'block' : 'none';
                    renderSalesScreen();
                });
                document.getElementById('wholesale-customer-select')?.addEventListener('change', function() {
                    selectedWholesaleCustomer = this.value;
                });
                document.getElementById('add-to-cart-btn')?.addEventListener('click', function() {
                    const select = document.getElementById('add-item-select');
                    const qtyInput = document.getElementById('add-item-qty');
                    const itemId = select.value;
                    const qty = parseInt(qtyInput.value) || 1;
                    if (!itemId) { toast('⚠️ اختر صنفاً'); return; }
                    if (qty < 1) { toast('⚠️ أدخل كمية صحيحة'); return; }
                    addToCart(itemId, qty);
                });
                document.querySelectorAll('.cart-qty-btn').forEach(el => {
                    el.onclick = function() {
                        const idx = parseInt(this.getAttribute('data-index'));
                        const delta = parseInt(this.getAttribute('data-delta'));
                        updateCartQty(idx, delta);
                    };
                });
                document.querySelectorAll('.cart-remove-btn').forEach(el => {
                    el.onclick = function() {
                        const idx = parseInt(this.getAttribute('data-index'));
                        removeFromCart(idx);
                    };
                });
                document.getElementById('clear-cart-btn')?.addEventListener('click', clearCart);
                document.getElementById('complete-sale-btn')?.addEventListener('click', completeSale);
                document.getElementById('scan-barcode-sale-btn')?.addEventListener('click', openSaleBarcodeScanner);
                document.getElementById('manage-wholesale-btn')?.addEventListener('click', openWholesaleCustomersSheet);
            }

            // ============================================================
            //  SALE FUNCTIONS
            // ============================================================
            function addToCart(itemId, qty) {
                const item = getInventoryItem(itemId);
                if (!item) { toast('⚠️ الصنف غير موجود'); return false; }
                const available = Number(item.qty) || 0;
                if (available < qty) { toast('🚫 الكمية غير كافية. المتوفر: ' + available); return false; }
                const existing = saleCart.find(c => c.itemId === itemId);
                if (existing) {
                    if (existing.qty + qty > available) { toast('🚫 الكمية غير كافية. المتوفر: ' + available); return false; }
                    existing.qty += qty;
                } else {
                    saleCart.push({ itemId: item.id, name: item.name, price: Number(item.price) || 0, qty: qty,
                        barcode: item.barcode || '' });
                }
                toast('✅ تم إضافة ' + qty + ' × ' + item.name);
                renderSalesScreen();
                return true;
            }

            function removeFromCart(index) {
                if (index >= 0 && index < saleCart.length) { saleCart.splice(index, 1);
                    renderSalesScreen(); }
            }

            function updateCartQty(index, delta) {
                if (index >= 0 && index < saleCart.length) {
                    const item = saleCart[index];
                    const newQty = item.qty + delta;
                    if (newQty <= 0) { removeFromCart(index); return; }
                    const invItem = getInventoryItem(item.itemId);
                    if (invItem && newQty > (Number(invItem.qty) || 0)) { toast('🚫 الكمية غير كافية. المتوفر: ' + (
                            Number(invItem.qty) || 0)); return; }
                    item.qty = newQty;
                    renderSalesScreen();
                }
            }

            function clearCart() {
                if (saleCart.length === 0) return;
                if (confirm('⚠️ تفريغ السلة بالكامل؟')) { saleCart = [];
                    renderSalesScreen();
                    toast('🗑️ تم تفريغ السلة'); }
            }

            function completeSale() {
                if (saleCart.length === 0) { toast('⚠️ السلة فارغة'); return; }
                for (const item of saleCart) {
                    const invItem = getInventoryItem(item.itemId);
                    if (!invItem) { toast('⚠️ الصنف "' + item.name + '" غير موجود في المخزون'); return; }
                    if ((Number(invItem.qty) || 0) < item.qty) { toast('🚫 الكمية غير كافية لـ "' + item.name +
                            '". المتوفر: ' + (Number(invItem.qty) || 0)); return; }
                }
                const total = saleCart.reduce((s, item) => s + (item.price * item.qty), 0);
                let customerName = '';
                if (saleType === 'wholesale' && selectedWholesaleCustomer) {
                    const wc = DATA.wholesaleCustomers.find(c => c.id === selectedWholesaleCustomer);
                    if (wc) customerName = ' (' + wc.name + ')';
                }
                if (!confirm('تأكيد إتمام البيع?\nنوع البيع: ' + (saleType === 'wholesale' ? '📦 جملة' : '🏪 محل') +
                        customerName + '\nالإجمالي: ' + money(total) + '\nعدد الأصناف: ' + saleCart.length)) return;

                const saleItems = [];
                for (const cartItem of saleCart) {
                    const invItem = getInventoryItem(cartItem.itemId);
                    if (invItem) {
                        invItem.qty = (Number(invItem.qty) || 0) - cartItem.qty;
                        invItem.updatedAt = Date.now();
                        saleItems.push({ itemId: invItem.id, name: invItem.name, barcode: invItem.barcode || '',
                            price: cartItem.price, qty: cartItem.qty, lineTotal: cartItem.price * cartItem
                            .qty });
                    }
                }
                saveCollection('inventory', DATA.inventory);

                const sale = { id: uid(), items: saleItems, total: total, saleType: saleType, customerId: saleType ===
                        'wholesale' ? selectedWholesaleCustomer : '', createdAt: Date.now() };
                DATA.sales.unshift(sale);
                saveCollection('sales', DATA.sales);

                saleCart = [];
                renderSalesScreen();
                toast('✅ تم إتمام البيع بنجاح! الإجمالي: ' + money(total));
                showSaleReceipt(sale);
            }

            function showSaleReceipt(sale) {
                const lines = sale.items.map(l => '• ' + l.name + '  × ' + l.qty + '  =  ' + money(l.lineTotal)).join(
                '\n');
                const saleTypeLabel = sale.saleType === 'wholesale' ? '📦 بيع جملة' : '🏪 بيع داخل المحل';
                let customerName = '';
                if (sale.customerId) {
                    const wc = DATA.wholesaleCustomers.find(c => c.id === sale.customerId);
                    if (wc) customerName = ' — ' + wc.name;
                }
                const receiptText = '🧾 *فاتورة بيع - ' + DATA.settings.shopName + '*\n' +
                    new Date(sale.createdAt).toLocaleString('ar') + '\n' +
                    saleTypeLabel + customerName + '\n\n' +
                    lines + '\n\n' +
                    '*الإجمالي: ' + money(sale.total) + '*';

                const overlay = document.createElement('div');
                overlay.style.cssText =
                    'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px';
                const box = document.createElement('div');
                box.style.cssText =
                    'background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;max-width:340px;width:100%;text-align:center;max-height:80vh;overflow-y:auto';
                const itemsHtml = sale.items.map(l =>
                    '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-dim);padding:3px 0;border-bottom:1px dashed var(--border)"><span>' +
                    esc(l.name) + ' × ' + l.qty + '</span><span>' + money(l.lineTotal) + '</span></div>'
                ).join('');
                box.innerHTML =
                    '<div style="font-size:15px;font-weight:800;margin-bottom:4px">🧾 تمّ البيع بنجاح</div>' +
                    '<div style="font-size:11px;color:var(--text-faint);margin-bottom:10px">' + saleTypeLabel +
                    customerName + '</div>' +
                    '<div style="text-align:right;margin-bottom:8px">' + itemsHtml + '</div>' +
                    '<div style="display:flex;justify-content:space-between;font-size:15px;font-weight:900;color:var(--accent);margin-bottom:14px"><span>الإجمالي</span><span>' +
                    money(sale.total) + '</span></div>' +
                    '<div style="display:flex;gap:6px"><button id="receipt-wa" class="btn btn-wa" style="flex:1">📱 واتساب</button><button id="receipt-close" class="btn btn-ghost" style="flex:1">إغلاق</button></div>';
                overlay.appendChild(box);
                document.body.appendChild(overlay);

                document.getElementById('receipt-wa').onclick = () => {
                    window.open('https://wa.me/?text=' + encodeURIComponent(receiptText), '_blank');
                };
                document.getElementById('receipt-close').onclick = () => { document.body.removeChild(overlay); };
                overlay.onclick = e => { if (e.target === overlay) document.body.removeChild(overlay); };
            }

            function renderSalesScreen() {
                document.getElementById('app-main').innerHTML = renderSales();
                attachSalesListeners();
            }

                    DATA.wholesaleCustomers.push({ id: uid(), name: name.trim(), phone: phone.trim(), address: address

            // ============================================================
            //  BARCODE SCANNER - SALE
            // ============================================================
            function openSaleBarcodeScanner() {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { toast('⚠️ الكاميرا غير مدعومة'); return; }
                if (window.location.protocol === 'file:' || window.location.protocol === 'content:') { toast(
                        '⚠️ الكاميرا لا تعمل عند فتح الملف مباشرة'); return; }
                if (typeof Html5Qrcode === 'undefined') {
                    toast('⚠️ جارٍ تحميل مكتبة الباركود...');
                    const script = document.createElement('script');
                    script.src = 'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';
                    script.onload = () => openSaleBarcodeScanner();
                    script.onerror = () => toast('⚠️ تعذّر تحميل مكتبة الباركود');
                    document.head.appendChild(script);
                    return;
                }

                const overlay = document.createElement('div');
                overlay.className = 'barcode-scanner-overlay';
                overlay.id = 'scanner-overlay';
                overlay.innerHTML =
                    `<div class="scanner-header"><h3>📷 مسح باركود للبيع</h3><button id="scanner-close">✕</button></div>
                    <div id="scanner-reader"></div>
                    <div class="scanner-hint" id="scanner-hint">⏳ جارٍ تشغيل الكاميرا...</div>
                    <div class="scanner-result" id="scanner-result"></div>`;
                document.body.appendChild(overlay);

                document.getElementById('scanner-close').onclick = closeSaleScanner;

                const scanner = new Html5Qrcode('scanner-reader');
                window._saleScanner = scanner;
                const config = { fps: 10, qrbox: function(vw, vh) { const w = Math.min(vw, vh) * 0.8; return { width: Math
                            .round(w), height: Math.round(w * 0.5) }; } };
                let scanStarted = false;
                const startWatchdog = setTimeout(() => {
                    if (!scanStarted) document.getElementById('scanner-hint').textContent =
                        '⚠️ تعذّر تشغيل الكاميرا. تأكد من منح الإذن.';
                }, 10000);

                function markReady() { scanStarted = true;
                    clearTimeout(startWatchdog);
                    document.getElementById('scanner-hint').textContent = '📷 وجّه الكاميرا نحو الباركود'; }

                function onScanSuccess(decodedText) { if (navigator.vibrate) navigator.vibrate(80);
                    handleSaleScan(decodedText); }

                function handleSaleScan(code) {
                    const resultEl = document.getElementById('scanner-result');
                    const item = DATA.inventory.find(x => x.barcode === code);
                    if (item) {
                        const qty = Number(item.qty) || 0;
                        resultEl.innerHTML =
                            `<div style="background:rgba(63,185,80,0.12);border:1px solid var(--accent-2);border-radius:10px;padding:10px">
                            <div style="font-size:10px;color:var(--accent-2);margin-bottom:2px">✅ تم العثور على الصنف</div>
                            <div style="font-size:15px;font-weight:800;color:var(--text)">${esc(item.name)}</div>
                            <div style="font-size:12px;color:var(--text-dim)">المتوفر: <b style="color:var(--text)">${qty}</b></div>
                            <div style="display:flex;gap:6px;margin-top:6px">
                                <button class="btn btn-sm btn-success" onclick="window.saleScannerAdd('${item.id}',1)" style="flex:1">➕ 1</button>
                                <button class="btn btn-sm btn-success" onclick="window.saleScannerAdd('${item.id}',2)" style="flex:1">➕ 2</button>
                                <button class="btn btn-sm btn-ghost" onclick="window.closeSaleScanner()" style="flex:1">إغلاق</button>
                            </div>
                        </div>`;
                    } else {
                        resultEl.innerHTML =
                            `<div style="background:rgba(248,81,73,0.12);border:1px solid var(--danger);border-radius:10px;padding:10px">
                            <div style="font-size:10px;color:var(--danger);margin-bottom:2px">⚠️ باركود غير مسجل</div>
                            <div style="font-size:12px;color:var(--text-dim)">الرمز: <b style="color:var(--text);font-family:monospace">${esc(code)}</b></div>
                            <button class="btn btn-sm btn-primary" style="margin-top:6px" onclick="window.closeSaleScanner()">إغلاق</button>
                        </div>`;
                    }
                }

                window.saleScannerAdd = function(itemId, qty) { addToCart(itemId, qty);
                    closeSaleScanner(); };
                window.closeSaleScanner = function() {
                    const overlay = document.getElementById('scanner-overlay');
                    if (window._saleScanner) {
                        window._saleScanner.stop().then(() => { window._saleScanner.clear();
                            window._saleScanner = null; if (overlay) overlay.remove(); }).catch(() => { if (
                                overlay) overlay.remove(); });
                    } else { if (overlay) overlay.remove(); }
                };

                Html5Qrcode.getCameras().then(devices => {
                    if (!devices || !devices.length) { document.getElementById('scanner-hint').textContent =
                            '⚠️ لم يتم العثور على كاميرا'; return; }
                    const camId = devices[devices.length - 1].id;
                    scanner.start(camId, config, onScanSuccess, () => {}).then(markReady).catch(() => {
                        document.getElementById('scanner-hint').textContent =
                        '⚠️ تعذّر تشغيل الكاميرا';
                    });
                }).catch(() => { document.getElementById('scanner-hint').textContent =
                        '⚠️ تعذّر الوصول للكاميرا'; });
            }

            function closeSaleScanner() {
                const overlay = document.getElementById('scanner-overlay');
                if (window._saleScanner) {
                    window._saleScanner.stop().then(() => { window._saleScanner.clear();
                        window._saleScanner = null; if (overlay) overlay.remove(); }).catch(() => { if (overlay)
                            overlay.remove(); });
                } else { if (overlay) overlay.remove(); }
            }

                    if (item) {
                        let newQty = (Number(item.qty) || 0) + delta;

                        item.updatedAt = Date.now();

                    const item = getInventoryItem(id);
                    if (item) { closeInventoryScanner();
                        setTimeout(() => openBarcodePrintDialog(item), 300); }
                };

                window.invScannerAddItem = function(code) {
                    if (!isManager()) { toast('⚠️ هذه الميزة متاحة للمدير فقط'); return; }
                    closeInventoryScanner();
                    setTimeout(() => openInventoryForm(code), 300);

                    if (window._invScanner) {

                            window._invScanner = null; if (overlay) overlay.remove(); }).catch(() => { if (
                                overlay) overlay.remove(); });
                    } else { if (overlay) overlay.remove(); }
                };

                Html5Qrcode.getCameras().then(devices => {
                    if (!devices || !devices.length) { document.getElementById('scanner-hint').textContent =
                            '⚠️ لم يتم العثور على كاميرا'; return; }
                    const camId = devices[devices.length - 1].id;
                    scanner.start(camId, config, onScanSuccess, () => {}).then(markReady).catch(() => {
                        document.getElementById('scanner-hint').textContent =
                        '⚠️ تعذّر تشغيل الكاميرا';
                    });
                }).catch(() => { document.getElementById('scanner-hint').textContent =
                        '⚠️ تعذّر الوصول للكاميرا'; });

                            overlay.remove(); });
                } else { if (overlay) overlay.remove(); }
            }

                } else {
                    partsUsed.forEach((p, i) => {
                        html += `<div class="cart-item" data-part-index="${i}">
                            <span class="item-name">${esc(p.name)}</span>

                        </div>`;

                }
                html += `</div>`;

                html += `<div style="display:flex;gap:6px;margin-top:6px">
                    <select id="add-part-select" style="flex:3;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text);font-size:12px">
                        <option value="">🔍 اختر قطعة...</option>
                        ${DATA.inventory.slice().sort((a,b)=> (a.name||'').localeCompare(b.name||'', 'ar')).map(item => {
                            const qty = Number(item.qty) || 0;
                            return `<option value="${item.id}"${qty<=0?' disabled':''}>${esc(item.name)} (المتوفر: ${qty})${item.price ? ' - '+money(item.price) : ''}</option>`;

                    <div class="field" style="margin-bottom:0;flex:1">

                function revertUnsavedInventory() {
                    if (formSubmitted || inventoryDeltas.length === 0) return;
                    for (const d of inventoryDeltas) {
                        const it = getInventoryItem(d.itemId);
                        if (it) { it.qty = (Number(it.qty) || 0) - d.delta;
                            it.updatedAt = Date.now(); }
                    }
                    saveCollection('inventory', DATA.inventory);
                    inventoryDeltas = [];

                openSheet(html, revertUnsavedInventory);
                document.getElementById('sheet-close').onclick = closeSheet;

                function renderPartsList() {
                    const listEl = document.getElementById('parts-list');
                    if (!listEl) return;
                    if (currentParts.length === 0) {
                        listEl.innerHTML =
                            '<div style="font-size:11px;color:var(--text-faint);padding:6px 0">لا توجد قطع مسحوبة لهذا الجهاز</div>';
                        return;

                    let h = '';
                    currentParts.forEach((p, i) => {

                            <span class="item-qty">×${p.qty}</span>

                                saveCollection('inventory', DATA.inventory);

                            document.getElementById('f-parts-used').value = JSON.stringify(currentParts);

                document.getElementById('add-part-btn').onclick = function() {
                    const select = document.getElementById('add-part-select');
                    const qtyInput = document.getElementById('add-part-qty');
                    const itemId = select.value;
                    const qty = parseInt(qtyInput.value) || 1;
                    if (!itemId) { toast('⚠️ اختر قطعة'); return; }
                    if (qty < 1) { toast('⚠️ أدخل كمية صحيحة'); return; }
                    const invItem = getInventoryItem(itemId);
                    if (!invItem) { toast('⚠️ الصنف غير موجود'); return; }
                    if ((Number(invItem.qty) || 0) < qty) { toast('🚫 الكمية غير كافية. المتوفر: ' + (Number(invItem
                            .qty) || 0)); return; }
                    const existing = currentParts.find(p => p.itemId === itemId);
                    if (existing) {
                        if (existing.qty + qty > (Number(invItem.qty) || 0)) { toast('🚫 الكمية غير كافية'); return; }
                        existing.qty += qty;
                    } else {
                        currentParts.push({ itemId: invItem.id, name: invItem.name, qty: qty, price: invItem
                            .price || 0 });
                    }
                    invItem.qty = (Number(invItem.qty) || 0) - qty;
                    invItem.updatedAt = Date.now();
                    saveCollection('inventory', DATA.inventory);
                    inventoryDeltas.push({ itemId: invItem.id, delta: -qty });
                    document.getElementById('f-parts-used').value = JSON.stringify(currentParts);
                    renderPartsList();
                    toast('✅ تم سحب ' + qty + ' × ' + invItem.name);

                        const newQty = Number(invItem.qty) || 0;

                    const technician = document.getElementById('f-tech').value.trim();
                    const status = document.getElementById('f-status').value;
                    const partsData = JSON.parse(document.getElementById('f-parts-used').value || '[]');

                    if (!name || !phone || !deviceType || !issue) { toast('⚠️ الرجاء ملء جميع الحقول المطلوبة'); return; }

                    let cust = DATA.customers.find(x => x.phone === phone);
                    if (!cust) {
                        cust = { id: uid(), name: name, phone: phone, createdAt: Date.now() };
                        DATA.customers.push(cust);
                        saveCollection('customers', DATA.customers);
                    } else { cust.name = name;
                        saveCollection('customers', DATA.customers); }

                    const finalPrice = status === 'delivered' ? Number(document.getElementById('f-final').value) ||
                        0 : null;
                    const paidAmount = status === 'delivered' ? Number(document.getElementById('f-paid').value) ||
                        finalPrice : null;

                    if (editing) {
                        r.customerId = cust.id;
                        r.deviceType = deviceType;
                        r.issue = issue;
                        r.expectedPrice = expectedPrice;
                        r.technician = technician;
                        r.status = status;
                        r.finalPrice = finalPrice;
                        r.paidAmount = paidAmount;
                        r.partsUsed = partsData;
                        r.updatedAt = Date.now();
                        if (status === 'delivered' && !r.deliveredDate) r.deliveredDate = todayStr();
                    } else {
                        DATA.repairs.push({
                            id: uid(),
                            customerId: cust.id,
                            deviceType: deviceType,
                            issue: issue,
                            expectedPrice: expectedPrice,
                            technician: technician,
                            status: status,
                            finalPrice: finalPrice,
                            paidAmount: paidAmount,
                            partsUsed: partsData,
                            receivedDate: todayStr(),
                            deliveredDate: status === 'delivered' ? todayStr() : null,
                            createdAt: Date.now(),
                            updatedAt: Date.now()
                        });
                    }
                    saveCollection('repairs', DATA.repairs);
                    formSubmitted = true;
                    closeSheet();
                    renderAll();
                    toast(editing ? '✅ تم التعديل' : '✅ تمت الإضافة');
                };

                if (isManager()) {
                    document.getElementById('delete-device-btn')?.addEventListener('click', function() {
                        if (confirm('حذف هذا الجهاز نهائياً؟')) {
                            for (const p of currentParts) {
                                const invItem = getInventoryItem(p.itemId);
                                if (invItem) { invItem.qty = (Number(invItem.qty) || 0) + p.qty;
                                    invItem.updatedAt = Date.now(); }
                            }
                            saveCollection('inventory', DATA.inventory);
                            formSubmitted = true;
                            recordTombstone('repairs', id);
                            DATA.repairs = DATA.repairs.filter(x => x.id !== id);
                            saveCollection('repairs', DATA.repairs);
                            closeSheet();
                            renderAll();
                            toast('🗑️ تم الحذف وإعادة القطع للمخزون');
                        }
                    });
                }
                renderPartsList();
            }

                    <div class="field-row">

                        <div style="display:flex;gap:6px">
                            <input id="inv-barcode" placeholder="اتركه فارغاً للتوليد التلقائي" value="${esc((editItem ? editItem.barcode : presetBarcode) || '')}" style="flex:1">

                                .now() });
                        saveCollection('inventory', DATA.inventory);
                        closeSheet();
                        renderAll();
                        toast('✅ تم إضافة الصنف مع باركود: ' + barcode);
                    }
                };

            // ============================================================
            //  BARCODE HELPERS
            // ============================================================
            function generateUniqueBarcode() {
                let code, attempts = 0;
                do {
                    code = '20' + String(Date.now()).slice(-7) + String(Math.floor(Math.random() * 100)).padStart(2,
                    '0');
                    attempts++;
                } while (DATA.inventory.some(item => item.barcode === code) && attempts < 20);
                return code;
            }

            function printBarcodeWindow(item, count, perPage) {
                if (!item) return;
                count = count || 1;
                perPage = perPage || 2;
                const code = generateBarcode(item);

                const printArea = document.getElementById('barcode-print-area');
                printArea.style.display = 'block';
                printArea.innerHTML = '';

                const container = document.createElement('div');
                container.style.cssText =
                    `display:grid;grid-template-columns:repeat(${perPage},1fr);gap:8px;padding:10px;max-width:800px;margin:0 auto;`;

                for (let i = 0; i < count; i++) {
                    const box = document.createElement('div');
                    box.style.cssText =
                        'text-align:center;padding:8px;background:white;font-family:Arial,sans-serif;direction:ltr;border:1px solid #eee;border-radius:4px;';

                    const nameEl = document.createElement('div');
                    nameEl.style.cssText = 'font-size:11px;font-weight:700;color:#000;margin-bottom:2px;';
                    nameEl.textContent = item.name;
                    box.appendChild(nameEl);

                    const svgContainer = document.createElement('div');
                    svgContainer.style.cssText = 'display:flex;justify-content:center;margin:2px 0;';
                    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                    svg.setAttribute('id', 'barcode-print-svg-' + i);
                    svg.setAttribute('style', 'max-width:100%;height:auto;');
                    svgContainer.appendChild(svg);
                    box.appendChild(svgContainer);

                    if (item.price) {
                        const priceEl = document.createElement('div');
                        priceEl.style.cssText = 'font-size:10px;color:#000;margin-top:2px;';
                        priceEl.textContent = money(item.price);
                        box.appendChild(priceEl);
                    }

                    const codeEl = document.createElement('div');
                    codeEl.style.cssText = 'font-size:8px;color:#666;margin-top:2px;font-family:monospace;';
                    codeEl.textContent = code;
                    box.appendChild(codeEl);

                    container.appendChild(box);
                }

                printArea.appendChild(container);

                setTimeout(() => {
                    try {
                        if (typeof JsBarcode !== 'undefined') {
                            for (let i = 0; i < count; i++) {
                                JsBarcode('#barcode-print-svg-' + i, code, { format: 'CODE128',
                                    lineColor: '#000000', width: 1.5, height: 35, fontSize: 10,
                                    margin: 3, displayValue: false });
                            }
                        }
                    } catch (e) { console.warn('Barcode generation error:', e); }
                }, 100);

                toast('🖨️ جاري فتح نافذة الطباعة (' + count + ' نسخة)...');

                setTimeout(() => {
                    try {
                        window.print();
                        const afterPrint = function() {
                            printArea.style.display = 'none';
                            printArea.innerHTML = '';
                            window.removeEventListener('afterprint', afterPrint);
                        };
                        window.addEventListener('afterprint', afterPrint);
                        setTimeout(() => {
                            if (printArea.style.display !== 'none') {
                                printArea.style.display = 'none';
                                printArea.innerHTML = '';
                            }
                        }, 10000);
                    } catch (e) {
                        toast('⚠️ تعذّر فتح الطباعة: ' + e.message);
                        printArea.style.display = 'none';
                        printArea.innerHTML = '';
                    }
                }, 500);
            }

            function exportCSVReport() {
                if (!requireAuth()) return;
                const headers = ['التاريخ', 'الجهاز', 'الزبون', 'العطل', 'الحالة', 'السعر', 'الفني', 'القطع المستخدمة'];
                const rows = DATA.repairs.map(r => {
                    const c = getCustomer(r.customerId);
                    const partsStr = r.partsUsed ? r.partsUsed.map(p => p.name + ' ×' + p.qty).join(', ') : '';
                    return [r.receivedDate || '', r.deviceType || '', c ? c.name : '—', r.issue || '', STATUS[r
                        .status] ? STATUS[r.status].label : r.status, r.finalPrice || r.expectedPrice || 0,
                        r.technician || '', partsStr
                    ];
                });
                const csv = headers.join(',') + '\n' + rows.map(row => row.map(v => '"' + v + '"').join(',')).join(
                '\n');
                const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'تقرير-الصيانة-' + todayStr() + '.csv';
                link.click();
                URL.revokeObjectURL(link.href);
                toast('✅ تم تصدير CSV');
            }

            function exportLowStockToRestock() {
                if (!requireAuth('manager')) return;
                const lowItems = DATA.inventory.filter(item => (Number(item.qty) || 0) <= (item.minQty || 3));
                if (lowItems.length === 0) { toast('✅ لا توجد أصناف ناقصة'); return; }
                let added = 0;
                lowItems.forEach(item => {
                    if (!DATA.restockList.some(r => r.itemId === item.id)) {
                        const min = item.minQty || 3;
                        const qty = Number(item.qty) || 0;
                        const needed = Math.max(1, min - qty + 2);
                        DATA.restockList.push({ id: uid(), itemId: item.id, name: item.name, currentQty: qty,
                            neededQty: needed, addedAt: Date.now() });
                        added++;
                    }
                });
                saveCollection('restockList', DATA.restockList);
                toast('🚚 تم نقل ' + added + ' صنف إلى قائمة التزويد');
                renderAll();
            }

                    html +=
                        `<div style="background:rgba(63,185,80,0.08);border:1px solid rgba(63,185,80,0.2);border-radius:10px;padding:8px 12px;margin-bottom:8px;font-size:12px;color:var(--accent-2)">
                            ✅ متصل بـ Firebase<br>📁 المشروع: <b>${esc(config.projectId)}</b>
                        </div>
                        <button class="btn btn-danger btn-sm" id="fb-disconnect" style="width:auto;padding:6px 14px">🔌 قطع الاتصال</button>
                        <button class="btn btn-ghost btn-sm" id="fb-sync-now" style="width:auto;padding:6px 14px;margin-top:6px">🔄 مزامنة الآن</button>`;
                } else {
                    html += `<div class="fb-info-box">
                        🔥 <strong>المزامنة السحابية</strong> تحفظ بياناتك على السحابة وتزامنها بين الأجهزة.<br><br>
                        📌 <strong>كيفية الحصول على بيانات Firebase:</strong><br>
                        1️⃣ اذهب إلى <a href="https://console.firebase.google.com/" target="_blank" style="color:var(--accent-3)">Firebase Console</a><br>
                        2️⃣ أنشئ مشروعاً جديداً<br>
                        3️⃣ أضف تطبيق ويب (Web App)<br>
                        4️⃣ انسخ <strong>Project ID</strong> و <strong>API Key</strong>
                    </div>
                    <div class="field"><label>Project ID</label><input id="fb-project" placeholder="my-project-12345" value="${esc(config.projectId||'')}" style="direction:ltr"></div>
                    <div class="field"><label>API Key</label><input id="fb-apikey" placeholder="AIzaSy..." value="${esc(config.apiKey||'')}" style="direction:ltr"></div>
                    <button class="btn btn-firebase" id="fb-save">🔥 ربط Firebase</button>`;
                }

                // USB direct printing (TSPL)
                html += `<div class="divider"></div>
                    <div class="section-head"><h3>🖨️ طباعة الباركود المباشرة (USB)</h3></div>
                    <div style="font-size:11px;color:var(--text-faint);margin-bottom:8px">
                        لطابعات الليبل الحرارية (مثل Xprinter XP-365B) — إرسال أوامر طباعة مباشرة عبر USB بدون نافذة طباعة المتصفح. يعمل على Chrome/Edge على كمبيوتر فقط، ويتطلب تعريف الطابعة عبر Zadig (WinUSB) مرة واحدة.
                    </div>
                    <div style="font-size:12px;margin-bottom:8px">
                        حالة الطابعة: <b id="usb-printer-status" style="color:${usbPrinterDevice ? 'var(--accent-2)' : 'var(--text-faint)'}">${usbPrinterDevice ? '✅ متصلة' : 'غير متصلة'}</b>
                    </div>
                    <button class="btn btn-ghost btn-sm" id="usb-printer-connect" style="width:auto;padding:6px 14px">🔌 ${usbPrinterDevice ? 'إعادة اتصال' : 'اتصال بالطابعة'}</button>
                    <div class="field-row" style="margin-top:10px">
                        <div class="field"><label>عرض الليبل (mm)</label><input type="number" id="set-label-w" value="${DATA.settings.labelWidthMm || 40}" style="text-align:center"></div>
                        <div class="field"><label>ارتفاع الليبل (mm)</label><input type="number" id="set-label-h" value="${DATA.settings.labelHeightMm || 30}" style="text-align:center"></div>
                        <div class="field"><label>الفجوة (mm)</label><input type="number" id="set-label-gap" value="${DATA.settings.labelGapMm != null ? DATA.settings.labelGapMm : 2}" style="text-align:center"></div>
                    </div>
                    <button class="btn btn-primary btn-sm" id="set-label-save" style="width:auto;padding:6px 14px;margin-top:6px">💾 حفظ مقاسات الليبل</button>`;

                // Backup
                html += `<div class="divider"></div>
                    <button class="btn btn-ghost" id="export-data">📤 تصدير نسخة احتياطية</button>
                    <button class="btn btn-danger" id="wipe-data" style="margin-top:6px">🗑️ مسح جميع البيانات</button>`;

                openSheet(html);
                document.getElementById('sheet-close').onclick = closeSheet;

                // Install from settings
                document.getElementById('install-from-settings')?.addEventListener('click', function() {
                    if (deferredPrompt) { deferredPrompt.prompt();
                        closeSheet(); } else { toast('📱 استخدم قائمة المتصفح > "تثبيت التطبيق"');
                        closeSheet(); }
                });

                // Save settings
                document.getElementById('set-save').onclick = function() {
                    DATA.settings.shopName = document.getElementById('set-shop').value.trim() || 'الماسة موبايل';
                    DATA.settings.currency = document.getElementById('set-currency').value.trim() || 'د.أ';
                    saveCollection('settings', DATA.settings);
                    closeSheet();
                    renderAll();
                    toast('✅ تم حفظ الإعدادات');
                };

                document.getElementById('usb-printer-connect')?.addEventListener('click', async function() {
                    const device = await connectUsbPrinter();
                    const statusEl = document.getElementById('usb-printer-status');
                    if (device && statusEl) {
                        toast('✅ تم الاتصال بالطابعة');
                        statusEl.textContent = '✅ متصلة';
                        statusEl.style.color = 'var(--accent-2)';
                    }
                });
                document.getElementById('set-label-save')?.addEventListener('click', function() {
                    DATA.settings.labelWidthMm = parseFloat(document.getElementById('set-label-w').value) || 40;
                    DATA.settings.labelHeightMm = parseFloat(document.getElementById('set-label-h').value) || 30;
                    const gapVal = parseFloat(document.getElementById('set-label-gap').value);
                    DATA.settings.labelGapMm = isNaN(gapVal) ? 2 : gapVal;
                    saveCollection('settings', DATA.settings);
                    toast('✅ تم حفظ مقاسات الليبل');
                });

                // Change PINs (manager only — the render above already hides
                // this whole block for non-managers, but we double-check here
                // too in case of stale DOM/markup tampering).
                document.getElementById('change-pin-save')?.addEventListener('click', function() {
                    if (!requireAuth('manager')) return;
                    const newCashierPin = document.getElementById('new-pin-cashier').value;
                    const newManagerPin = document.getElementById('new-pin-manager').value;
                    const resultEl = document.getElementById('pin-change-result');

                    if (!newCashierPin && !newManagerPin) {
                        resultEl.innerHTML = '<span style="color:var(--danger)">❌ أدخل رقماً واحداً على الأقل للتغيير</span>';
                        return;
                    }
                    if (newCashierPin && newCashierPin.length !== 6) {
                        resultEl.innerHTML = '<span style="color:var(--danger)">❌ رقم الكاشير يجب أن يكون 6 أرقام</span>';
                        return;
                    }
                    if (newManagerPin && newManagerPin.length !== 6) {
                        resultEl.innerHTML = '<span style="color:var(--danger)">❌ رقم المدير يجب أن يكون 6 أرقام</span>';
                        return;
                    }
                    const finalCashierPin = newCashierPin || DATA.settings.userPin;
                    const finalManagerPin = newManagerPin || DATA.settings.managerPin;
                    if (finalCashierPin && finalManagerPin && finalCashierPin === finalManagerPin) {
                        resultEl.innerHTML = '<span style="color:var(--danger)">❌ لا يمكن أن يكون رقما الكاشير والمدير متطابقين</span>';
                        return;
                    }
                    if (newCashierPin) DATA.settings.userPin = newCashierPin;
                    if (newManagerPin) DATA.settings.managerPin = newManagerPin;
                    saveCollection('settings', DATA.settings);
                    resultEl.innerHTML = '<span style="color:var(--accent-2)">✅ تم تحديث أرقام الدخول بنجاح</span>';
                    toast('🔑 تم تحديث أرقام الدخول');
                    setTimeout(() => closeSheet(), 1000);
                });

                // Firebase
                document.getElementById('fb-save')?.addEventListener('click', function() {
                    const pid = document.getElementById('fb-project').value.trim();
                    const akey = document.getElementById('fb-apikey').value.trim();
                    if (!pid || !akey) { toast('❌ الرجاء إدخال Project ID و API Key'); return; }
                    DATA.settings.firebaseConfig = { projectId: pid, apiKey: akey };
                    saveCollection('settings', DATA.settings);
                    closeSheet();
                    toast('🔥 تم حفظ إعدادات Firebase، جارٍ التفعيل...');
                    initFirebase();
                    renderAll();
                });

                document.getElementById('fb-disconnect')?.addEventListener('click', function() {
                    if (confirm('هل تريد قطع الاتصال بـ Firebase؟')) {
                        DATA.settings.firebaseConfig = {};
                        saveCollection('settings', DATA.settings);
                        firebaseInitialized = false;
                        firestore = null;
                        if (syncUnsubscribe) { syncUnsubscribe();
                            syncUnsubscribe = null; }
                        if (retryTimeout) { clearTimeout(retryTimeout);
                            retryTimeout = null; }
                        updateSyncStatus('offline', 'غير متصل');
                        closeSheet();
                        openSettingsSheet();
                        toast('✅ تم قطع الاتصال بـ Firebase');
                    }
                });

                document.getElementById('fb-sync-now')?.addEventListener('click', function() {
                    toast('🔄 جارٍ المزامنة...');
                    syncFromFirebase();
                });

                // Backup
                document.getElementById('export-data').onclick = function() {
                    const data = {
                        repairs: DATA.repairs,
                        customers: DATA.customers,
                        inventory: DATA.inventory,
                        sales: DATA.sales,
                        settings: DATA.settings,
                        technicians: DATA.technicians,
                        coupons: DATA.coupons,
                        expenses: DATA.expenses,
                        recurringExpenses: DATA.recurringExpenses,
                        restockList: DATA.restockList,
                        suppliers: DATA.suppliers,
                        wholesaleCustomers: DATA.wholesaleCustomers
                    };
                    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'نسخة-احتياطية-' + todayStr() + '.json';
                    a.click();
                    toast('✅ تم التصدير');
                };

                document.getElementById('wipe-data').onclick = function() {
                    if (!requireAuth('manager')) return;
                    if (confirm('⚠️ مسح كل البيانات؟')) {
                        Object.keys(COLLECTIONS).forEach(key => {
                            // Preserve login PINs and Firebase config — wiping
                            // business data should never lock the owner out of
                            // the app or drop their sync configuration.
                            DATA[key] = Array.isArray(DATA[key]) ? [] : (key === 'settings' ? {
                                shopName: DATA.settings.shopName,
                                currency: DATA.settings.currency,
                                userPin: DATA.settings.userPin,
                                managerPin: DATA.settings.managerPin,
                                firebaseConfig: DATA.settings.firebaseConfig
                            } : DATA[key]);
                            if (key !== 'settings') saveCollection(key, DATA[key]);
                        });
                        saveCollection('settings', DATA.settings);
                        closeSheet();
                        renderAll();
                        toast('🗑️ تم مسح البيانات');
                    }
                };
            }

            // ============================================================
            //  SHEET HELPERS
            // ============================================================
            let sheetCloseCallback = null;

            function openSheet(html, onClose) {
                sheetCloseCallback = onClose || null;
                const root = document.getElementById('sheet-root');
                root.innerHTML = `<div class="sheet-overlay" id="sheet-overlay"><div class="sheet">${html}</div></div>`;
                const ov = document.getElementById('sheet-overlay');
                requestAnimationFrame(() => ov.classList.add('open'));
                ov.addEventListener('click', e => { if (e.target === ov) closeSheet(); });
            }

            function closeSheet() {
                const ov = document.getElementById('sheet-overlay');
                if (!ov) return;
                if (sheetCloseCallback) {
                    try { sheetCloseCallback(); } catch (e) { console.warn('sheetCloseCallback error:', e); }
                    sheetCloseCallback = null;
                }
                ov.classList.remove('open');
                setTimeout(() => document.getElementById('sheet-root').innerHTML = '', 250);
            }

            // ============================================================
            //  THEME TOGGLE
            // ============================================================
            function toggleTheme() {
                document.body.classList.toggle('light-mode');
                toast(document.body.classList.contains('light-mode') ? '☀️ مظهر نهاري' : '🌙 مظهر ليلي');
            }

            // ============================================================
            //  NAVIGATION SETUP
            // ============================================================
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    if (!isUnlocked) { showLockScreen(); return; }
                    navigate(this.getAttribute('data-view'));
                });
            });

            document.getElementById('fab-add').addEventListener('click', function() {
                if (!isUnlocked) { showLockScreen(); return; }
                if (requireAuth('manager')) openDeviceForm();
            });

            // ============================================================
            //  INIT
            // ============================================================
            setupPinPad();
            isUnlocked = false;
            showLockScreen();

            if (!DATA.settings.userPin && !localStorage.getItem('pin_initialized')) {
                DATA.settings.userPin = '000000';
                DATA.settings.managerPin = '999999';
                saveCollection('settings', DATA.settings);
                localStorage.setItem('pin_initialized', 'true');
                toast('🔑 الأرقام الافتراضية — كاشير: 000000 / مدير: 999999. غيّرهما من الإعدادات فوراً');
            } else if (DATA.settings.userPin && !DATA.settings.managerPin) {
                // Migration for installs created before manager PINs existed:
                // give the manager a temporary distinct PIN and prompt them to
                // set a proper one, instead of silently reusing the cashier PIN
                // (which would recreate the same self-promotion problem).
                DATA.settings.managerPin = '999999';
                saveCollection('settings', DATA.settings);
                toast('⚠️ تم تفعيل نظام أرقام سرية منفصل للمدير. رقم المدير المؤقت: 999999 — غيّره فوراً من الإعدادات');
            }

            initFirebase();
            setupPWAInstall();
            renderAll();

            setTimeout(() => {
                const ready = DATA.repairs.filter(r => r.status === 'ready');
                if (ready.length && isUnlocked) toast('📢 ' + ready.length + ' جهاز جاهز للتسليم');
                if (!window.matchMedia('(display-mode: standalone)').matches &&
                    !localStorage.getItem('pwa_banner_dismissed') && !deferredPrompt) {
                    setTimeout(() => {
                        if (!localStorage.getItem('pwa_banner_dismissed')) {
                            toast('📱 يمكنك تثبيت التطبيق من قائمة المتصفح');
                        }
                    }, 5000);
                }
            }, 800);

        })();
    </script>
</body>
</html>
