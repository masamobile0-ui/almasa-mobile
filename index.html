            /* ---------- Customer Detail ---------- */
            function openCustomerDetail(customerId) {
                var c = getCustomer(customerId);
                if (!c) return;
                var rs = repairsForCustomer(customerId);
                var spent = 0;
                for (var i = 0; i < rs.length; i++) {
                    if (rs[i].status === 'delivered') spent += Number(rs[i].finalPrice) || 0;
                }

                var deliveredCount = 0;
                for (var i = 0; i < rs.length; i++) {
                    if (rs[i].status === 'delivered') deliveredCount++;
                }
                var tier = getLoyaltyTier(deliveredCount);

                var html = '<div class="sheet-handle"></div><div class="sheet-head"><h3>' + esc(c.name) + (tier
                    .minVisits > 0 ? ' ' + tier.emoji : '') + '</h3><button class="icon-btn" id="sheet-close" aria-label="إغلاق">' +
                    ICONS.close + '</button></div>';

                // ===== بطاقة الولاء =====
                if (tier.minVisits > 0) {
                    html +=
                        '<div style="background:rgba(61,220,132,.1);border:1px solid rgba(61,220,132,.3);border-radius:12px;padding:10px 14px;margin-bottom:12px;font-size:12.5px;color:var(--accent-2);display:flex;align-items:center;gap:8px"><span style="font-size:18px">' +
                        tier.emoji + '</span><div><b>عميل ' + tier.label + '</b> — ' + deliveredCount +
                        ' زيارة مكتملة<br>يستحق خصم ' + tier.discount + '% على خدماتنا</div></div>';
                } else if (deliveredCount >= 2) {
                    var nextTier = LOYALTY_TIERS[1];
                    html +=
                        '<div style="background:rgba(91,141,239,.08);border:1px solid rgba(91,141,239,.2);border-radius:12px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:var(--accent-3)">⭐ ' +
                        deliveredCount + ' زيارة — بعد ' + (nextTier.minVisits - deliveredCount) +
                        ' زيارة يستحق خصم ' + nextTier.discount + '%!</div>';
                }

                // ===== إحصائيات =====
                html += '<div class="stat-grid"><div class="stat-card"><span class="bar" style="background:var(--accent-3)"></span><div class="stat-num">' +
                    rs.length + '</div><div class="stat-label">عدد العمليات</div></div>';
                html += '<div class="stat-card"><span class="bar" style="background:var(--accent-2)"></span><div class="stat-num">' +
                    money(spent) + '</div><div class="stat-label">إجمالي ما دفعه</div></div></div>';

                // ===== أزرار =====
                html += '<div class="form-actions" style="margin-top:0;margin-bottom:18px">';
                html += '<a class="btn btn-ghost" href="tel:' + esc(c.phone) + '">' + ICONS.phone + ' اتصال</a>';
                html += '<button class="btn btn-ghost" id="customer-edit">' + ICONS.edit + ' تعديل</button>';
                html +=
                    '<button class="btn btn-danger" id="customer-delete" style="flex:none;width:48px" aria-label="حذف">' +
                    ICONS.trash + '</button>';
                html += '</div>';

                // ===== سجل الصيانة =====
                html += '<span class="sub-label">📋 سجل الصيانة</span>';
                if (rs.length) {
                    html += '<div class="card-list">';
                    for (var i = 0; i < rs.length; i++) {
                        html += deviceCardHTML(rs[i]);
                    }
                    html += '</div>';
                } else {
                    html += '<p style="font-size:12.5px;color:var(--text-dim)">لا يوجد سجل صيانة لهذا الزبون بعد.</p>';
                }

                openSheet(html);
                document.getElementById('sheet-close').onclick = closeSheet;

                var deviceLinks = document.querySelectorAll('[data-open-device]');
                for (var i = 0; i < deviceLinks.length; i++) {
                    deviceLinks[i].addEventListener('click', function() {
                        var id = this.getAttribute('data-open-device');
                        closeSheet();
                        setTimeout(function() { openDeviceDetail(id); }, 200);
                    });
                }

                document.getElementById('customer-edit').onclick = function() { openCustomerEditForm(customerId); };
                document.getElementById('customer-delete').onclick = function() {
                    var hasRepairs = rs.length > 0;
                    var msg = hasRepairs ? '⚠️ لهذا الزبون ' + rs.length +
                        ' عملية صيانة مسجلة. سيتم حذفها جميعاً مع الزبون. هل أنت متأكد؟' :
                        'هل تريد حذف هذا الزبون؟';
                    if (!confirm(msg)) return;
                    if (hasRepairs) {
                        rs.forEach(function(r) { markDeleted('repairs', r.id); });
                        repairs = repairs.filter(function(r) { return r.customerId !== customerId; });
                        saveRepairs();
                    }
                    markDeleted('customers', customerId);
                    customers = customers.filter(function(x) { return x.id !== customerId; });
                    saveCustomers();
                    closeSheet();
                    renderAll();
                    toast('🗑️ تم حذف الزبون');
                };
            }

            /* ====================== AUTO-SAVE ====================== */
            var autoSaveTimer = null;

            function startAutoSave() {
                if (autoSaveTimer) clearInterval(autoSaveTimer);
                autoSaveTimer = setInterval(function() {
                    saveCustomers();

                    saveSettings();
                    saveInventory();

            startAutoSave();

            /* ====================== FIREBASE SYNC ====================== */
            var firebaseSyncActive = false;
            var firebaseSyncInterval = null;
            function startFirebaseSync() {
                var fbCfg = settings.firebaseConfig;
                if (!fbCfg || !fbCfg.projectId || !fbCfg.apiKey) return;
                if (firebaseSyncActive) return; // تجنّب تكرار ربط الدوال أكثر من مرة
                firebaseSyncActive = true;

                // مجموعة واحدة "rt_shop_data" ومستند مستقل لكل نوع بيانات (customers/repairs/inventory)
                // المسار الصحيح يجب أن ينتهي بمُعرّف مستند (عدد زوجي من الأجزاء):
                // rt_shop_data (collection) / customers (document) -> صحيح
                var BASE_URL = 'https://firestore.googleapis.com/v1/projects/' + fbCfg.projectId + '/databases/(default)/documents/rt_shop_data';

                function fbGet(key, cb) {
                    fetch(BASE_URL + '/' + key + '?key=' + fbCfg.apiKey)
                        .then(function(r) {
                            if (r.status === 404) return { __notFound: true };
                            if (!r.ok) return r.json().then(function(j) { throw new Error((j && j.error && j.error.message) || ('HTTP ' + r.status)); });
                            return r.json();
                        })
                        .then(function(d) { cb(null, d); })
                        .catch(function(e) { cb(e); });
                }

                function fbSet(key, data) {
                    var fields = { data: { stringValue: JSON.stringify(data) }, updatedAt: { integerValue: String(Date.now()) } };
                    fetch(BASE_URL + '/' + key + '?key=' + fbCfg.apiKey, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ fields: fields })
                    }).then(function(r) {
                        if (!r.ok) return r.json().then(function(j) { throw new Error((j && j.error && j.error.message) || ('HTTP ' + r.status)); });
                    }).catch(function(e) {
                        console.warn('Firebase sync failed:', e);
                        toast('⚠️ فشل رفع البيانات إلى Firebase (' + e.message + ')');
                    });
                }

                // دمج السجلات المحلية والبعيدة بحسب id، مع تفضيل الأحدث updatedAt/createdAt
                // coll: اسم القسم (customers/repairs/inventory/sales/wholesaleCustomers) — يُستخدم
                // لمطابقة شواهد الحذف في deletedLog حتى لا يرجع عنصر تم حذفه عمداً من أي جهاز
                function mergeByIdWithTombstones(local, remote, coll) {
                    var map = {};
                    (Array.isArray(local) ? local : []).forEach(function(item) { if (item && item.id) map[item.id] = item; });
                    (Array.isArray(remote) ? remote : []).forEach(function(rItem) {
                        if (!rItem || !rItem.id) return;
                        var lItem = map[rItem.id];
                        if (!lItem) { map[rItem.id] = rItem; return; }
                        var lTime = lItem.updatedAt || lItem.createdAt || 0;
                        var rTime = rItem.updatedAt || rItem.createdAt || 0;
                        if (rTime > lTime) map[rItem.id] = rItem;
                    });
                    // إزالة أي عنصر له شاهد حذف أحدث من آخر تعديل عليه (أي أنه انحذف فعلاً ولم يُعدَّل بعدها)
                    deletedLog.forEach(function(d) {
                        if (d.collection !== coll || !map[d.id]) return;
                        var it = map[d.id];
                        var itTime = it.updatedAt || it.createdAt || 0;
                        if (itTime <= d.deletedAt) delete map[d.id];
                    });
                    return Object.keys(map).map(function(k) { return map[k]; });
                }

                // debounce بسيط لتقليل عدد الكتابات المتتالية على Firestore
                var pushTimers = {};
                function debouncedPush(key, getData) {
                    if (pushTimers[key]) clearTimeout(pushTimers[key]);
                    pushTimers[key] = setTimeout(function() { fbSet(key, getData()); }, 800);
                }

                // حفظ في Firebase عند كل save (بعد الحفظ المحلي)
                var origSaveCustomers = saveCustomers;
                saveCustomers = function() { origSaveCustomers(); debouncedPush('customers', function() { return customers; }); };
                var origSaveRepairs = saveRepairs;
                saveRepairs = function() { origSaveRepairs(); debouncedPush('repairs', function() { return repairs; }); };
                var origSaveInventory = saveInventory;
                saveInventory = function() { origSaveInventory(); debouncedPush('inventory', function() { return inventory; }); };
                var origSaveSales = saveSales;
                saveSales = function() { origSaveSales(); debouncedPush('sales', function() { return sales; }); };
                var origSaveWholesaleCustomers = saveWholesaleCustomers;
                saveWholesaleCustomers = function() { origSaveWholesaleCustomers(); debouncedPush('wholesaleCustomers', function() { return wholesaleCustomers; }); };
                // رفع شواهد الحذف فوراً (بدون تأخير) حتى تصل الأجهزة الأخرى للحذف بأسرع وقت ممكن
                var origMarkDeleted = markDeleted;
                markDeleted = function(collection, id) { origMarkDeleted(collection, id); fbSet('deletedLog', deletedLog); };

                // سحب من Firebase ودمجه مع المحلي (يعمل دائمًا، وليس فقط عندما تكون البيانات فارغة)
                function pullAndMerge(key, applyFn, label) {
                    fbGet(key, function(err, doc) {
                        if (err) {
                            console.warn('Firebase pull failed (' + key + '):', err);
                            return;
                        }
                        if (!doc || doc.__notFound || !doc.fields || !doc.fields.data) return;
                        try {
                            var remoteArr = JSON.parse(doc.fields.data.stringValue);
                            if (!Array.isArray(remoteArr)) return;
                            var changed = applyFn(remoteArr);
                            if (changed) renderAll();
                        } catch (e) {
                            console.warn('Firebase parse failed (' + key + '):', e);
                        }
                    });
                }

                // دمج سجل شواهد الحذف: اتحاد بين المحلي والبعيد، مع الاحتفاظ بأحدث deletedAt لكل عنصر
                function mergeDeletedLog(remote) {
                    if (!Array.isArray(remote) || remote.length === 0) return;
                    var map = {};
                    deletedLog.forEach(function(d) { map[d.collection + '::' + d.id] = d; });
                    remote.forEach(function(d) {
                        if (!d || !d.collection || !d.id) return;
                        var k = d.collection + '::' + d.id;
                        if (!map[k] || d.deletedAt > map[k].deletedAt) map[k] = d;
                    });
                    deletedLog = Object.keys(map).map(function(k) { return map[k]; });
                    saveDeletedLog();
                }

                function syncPull(initial) {
                    // نسحب سجل الحذف أولاً وننتظر نتيجته، ثم نتابع باقي الأقسام حتى تُطبَّق
                    // شواهد الحذف المحدّثة أثناء عملية الدمج (تمنع رجوع أي عنصر تم حذفه من جهاز آخر)
                    fbGet('deletedLog', function(err, doc) {
                        if (!err && doc && !doc.__notFound && doc.fields && doc.fields.data) {
                            try {
                                var remoteDeleted = JSON.parse(doc.fields.data.stringValue);
                                mergeDeletedLog(remoteDeleted);
                            } catch (e) { console.warn('Firebase parse failed (deletedLog):', e); }
                        }

                        pullAndMerge('customers', function(remote) {
                            var merged = mergeByIdWithTombstones(customers, remote, 'customers');
                            if (merged.length === customers.length && merged === customers) return false;
                            customers = merged;
                            persist(KEYS.customers, customers);
                            if (initial) toast('✅ تمت مزامنة ' + customers.length + ' زبون من السحابة');
                            return true;
                        });
                        pullAndMerge('repairs', function(remote) {
                            repairs = mergeByIdWithTombstones(repairs, remote, 'repairs');
                            persist(KEYS.repairs, repairs);
                            return true;
                        });
                        pullAndMerge('inventory', function(remote) {
                            inventory = mergeByIdWithTombstones(inventory, remote, 'inventory');
                            persist(KEYS.inventory, inventory);
                            return true;
                        });
                        pullAndMerge('sales', function(remote) {
                            sales = mergeByIdWithTombstones(sales, remote, 'sales');
                            sales.sort(function(a, b) { return b.createdAt - a.createdAt; });
                            persist(KEYS.sales, sales);
                            return true;
                        });
                        pullAndMerge('wholesaleCustomers', function(remote) {
                            wholesaleCustomers = mergeByIdWithTombstones(wholesaleCustomers, remote, 'wholesaleCustomers');
                            persist(KEYS.wholesaleCustomers, wholesaleCustomers);
                            return true;
                        });
                    });
                }

                // سحب أولي عند بدء التشغيل (بغض النظر عن وجود بيانات محلية أم لا)
                toast('⏳ جارٍ مزامنة البيانات مع Firebase...');
                syncPull(true);

                // سحب دوري كل 45 ثانية لالتقاط تعديلات أجهزة أخرى (بديل مبسّط لغياب real-time listener عبر REST)
                firebaseSyncInterval = setInterval(function() { syncPull(false); }, 45000);
            }
            startFirebaseSync();

            /* ====================== GLOBAL NAV BINDINGS ====================== */
            var navBtns = document.querySelectorAll('.nav-btn');
            for (var i = 0; i < navBtns.length; i++) {
                navBtns[i].addEventListener('click', function() {
                    navigate(this.getAttribute('data-nav'));
                });
            }

            document.getElementById('fab-add').addEventListener('click', function() { openDeviceForm(); });

            /* ====================== INIT ====================== */
            requestNotificationPermission();
            applyTheme();
            installPWAManifest();

            setTimeout(function() {
                var readyCount = 0;
                for (var i = 0; i < repairs.length; i++) {
                    if (repairs[i].status === 'ready') readyCount++;
                }
                if (readyCount > 0) {
                    toast('📢 ' + readyCount + ' جهاز جاهز للتسليم');
                } else {
                    // تحقق من النسخ الاحتياطي
                    var lastBackup = localStorage.getItem('rt_last_backup');
                    if (!lastBackup) {
                        if (repairs.length > 3) {
                            setTimeout(function() { toast('💡 لم تقم بأي نسخة احتياطية بعد! اذهب للإعدادات وصدّر نسخة.'); }, 2000);
                        }
                    } else {
                        var daysSinceBackup = Math.floor((Date.now() - parseInt(lastBackup)) / (1000*60*60*24));
                        if (daysSinceBackup >= 7) {
                            setTimeout(function() { toast('💾 مضى ' + daysSinceBackup + ' يوم دون نسخ احتياطي! يُنصح بحفظ نسخة.'); }, 2000);
                        }
                    }
                }
            }, 1000);

            renderAll();
            tryAutoReconnectUsbPrinter();

        })();
    </script>
</body>
</html>
